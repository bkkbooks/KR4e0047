body:
  text: 半軒集巻六明王行撰序唐律詩選序選詩者非知詩者也孔子之删詩取其既足以感發懲創又足以被夫絃歌者非以工拙計也葢工非詩之所必取而拙非詩之所必棄工而矜莊是未免夫刻畫拙而渾朴是不失其自然也茍棄其拙而取其工則是遺自然而尚刻畫豈足與言温柔敦厚之教也哉故曰選詩者非知詩者也然則是編何以選名也是編也葢有不得不然者也何也三百篇之詩非有一定之律也漢魏以來始漸為之制度其體已趋下矣降及李唐所謂律詩者出詩之體遂大變謂之律詩者以一定之律律夫詩也以一定之律律之自然葢幾希矣自然尠而律既嚴則不能不計其工拙也計其工拙又烏能不為之取舍哉故曰不得不然也雖不得不然其間固有法焉葢拙而渾朴同乎工工而刻畫同乎拙終不遺夫自然也此取舍之大要也其次乃論其言之工語之工聯屬之工篇章之工工多而拙少者取之拙多而工少者不取也均之律詩其變又有四焉曰初唐曰盛唐曰中唐曰晚唐有盛唐人而語偶近乎晚唐者晚唐人而語有似乎盛唐者晚唐似盛唐取之盛唐似晚唐不取葢亦貴夫自然也此又是編之例也例則然矣而復有説焉世之為學者未有不由規矩準繩而能至乎自然者也欲造乎自然之地而不事乎規矩準繩則將何所用其力哉惟詩學也亦然夫詩其浩博淵深如煙海也其變化運行如元氣也未易摹儗窺測也今之學者能先於其有律者求之進進不已則所謂如淵海如元氣者可以漸而入至與之俱化則自然之地綽乎其有餘裕矣温柔敦厚之教豈外是哉然則是編也於初學之士其亦有萬一之助也與洪武庚戌陽月初吉序外科新錄序外科新錄者予友沈學菴之所纂輯也學菴字起宗今年六十八矣而好學不倦方策未嘗去乎目以學菴題其燕居人因以稱焉初㑹稽徐彦純為吴學教諭其人勤敏而精實儒業之餘尤邃醫學嘗編醫經辨證圖三巻予為序之既又編醫學方論通三十巻書垂成矣惟外科一門未遑就緒而殁學菴屢與予言輙為之惋惜也方彦純編書時其叅考互訂必經學菴之手故彦純殁而學菴繼纂之以外科門目繁多别析之為十巻而以新錄命焉間出以示予曰子其為我序之予於是有以知學菴之用心也方論之出於近世者見之多矣未嘗不歎其詳於内而畧於外也意者以瘍醫所繫者輕為不足以致意與不知人身有内外之殊而氣血無分於内外未有病之失調於外而不遂戕其内者也外其果可畧哉自陳良甫精要之書行而瘍家少紓於横夭然亦未嘗不歎其詳於大而略於小也意者以病形小則所繫輕為不足以致意與不知形有小大之殊而受毒無分於小大譬疔之為病其形小矣而華元佗論其死各有期孫思邈論其死不旋踵小其果可略哉此不幸病罹於瘍而獲瘳者有不可必也特賴夫天之生才無南北古今之限劉河間而下二三君子者出論瘍為始詳至朱丹溪發揮虛實之變則益精確矣毎欲裒聚諸瘍之説冠以内經原病之㫖小大不遺類為一書以開後學而未暇也是書既成予則無庸贅矣嘗聞之學菴曰忍已之疾痛也易忍人之疾痛也難葢已之疾痛一身耳人之疾痛其有涯哉噫此新錄之所以輯與且夫已之至親者身而可疎者人也今學菴濟人之心乃切於為身則其所存可知已所存如此且不可得况復與予同志耶此予之序有不得而辭也他日新錄盛行咸承嘉惠予亦得遂其所哉尚友齋詩序人之毁譽葢不能容心於其間也有足譽者雖或忌之莫能毁也衆皆譽之我獨毁焉其能行哉介甫之不足於子瞻也久矣至論其文則稱歎不已以其實之不能没也夫人有善而我稱之稱之不足而嗟歎之嗟歎之不足而詠歌之至詠歌之則其善也必矣一人歌之猶然況至於再至於三而什伯焉其善之實也何如哉句吴鍾子常氏居練祁之吴塘通敏而和粹襟懐灑然而於交友尤盡禮意故游道益廣因題其待賓之所曰尚友齋大夫士與交者咸詩以詠歌之漸盈巻帙詠歌而盈巻帙則豈一人一詞之譽哉斯見其尚友之實矣且夫於古有尚徳焉有尚志焉而夫子稱之孟氏言之尚徳云者所以為君子尚志云者所以學為君子也然尚徳尚志其有不須友以成者乎則尚友者又所以為尚徳尚志之資也以是名齋子常之為人可知矣雖然尚友之云孟氏之書亦嘗陳之葢謂不獨友於今而必友於古友於古非所以求為君子乎然未有不能盡友於今之道而能盡友於古之道者也以是名齋子常其好學哉既披其巻三復而諷詠之矣因遂題其首云送包士謙還延陵序情之發於天性之誠而外物之不能奪之者惟篤於學者然也其或天理之發雖若粲然而昭著而害之者勝之則乍然而遽息暫逹而復堙始明焉而終以昧者不足與之言學矣今夫天倫之至親者莫如父母情之至不可為者莫如父母之殁而終不得而見之也故其書在焉而不能讀之桮棬在焉而不能飲之以夫手澤之與口澤之氣之存耳況父母之藏之邱壠耶邱壠之所在父母之所在也父母之所在而彷徨欷歔睠睠焉而不忍舍去非發於天性之誠乎當是時也吾知其妻妾之奉室家之好生産貲賄之儲聲威寵祿紛華之盛以至於艱迍險阻困踣奔迫之勞舉不足以移之也茍足以移之則雖謂之學而不謂之學矣余友包士謙氏居吴三世矣其先君子屬時之多故徙其家延陵及卒返於吴而配祔焉士謙毎歲時來吴省其父母之墓輙淹留踟躊孺慕而哀戀若欲廬焉者雖曠夫妻子之愛荒其生産之業弗顧也既而幡然曰墓之藏吾親之魄之已歸廟之主吾親之神之所憑也重離其已歸之藏而逺違其所憑之主於禮其果得耶吾之不悟也亦已久矣乃即治其歸焉方窮隂凝寒烈風氷雪之交横弗避也噫士謙之於親葢如是也夫始也愛親之心勝其誠不越乎邱壠之間終也義理之見明其誠乃繫乎在廟之主是省是守藹然發於其中而不可強之者也則其愛好之私困頓艱勤勞苦之不能奪之也宜矣士謙也其有得於學者與夫親愛之心質之美者恒由之而義理之見非學則無以明也況其外者弗能勝其中之所發者乎士謙也其有得於學者矣於其行大夫士咸詩以送之予因序其首云送吕教諭後序天台胡君伯衡之講授梁溪也今無錫教諭吕志學甫實從之遊聞胡君之季伯諒君嘗云梁溪諸生惟吕志學端慎勤厚其進葢未可量予時未接志學也歲丙午始獲締其交而胡君之言已騐越今踰十年日熟志學之所為葢學匪一修徳匪一進遊道愈廣聲聞愈著掌百里之風教邑人咸尊禮之而胡君之言大驗洪武十三年冬有舉其才者詔命下既治裝大夫士咸詩以餞之蜀人王汝玉氏既序其編矣志學又須予説焉凡師之於弟子固不能齊其資性之不齊然無不欲其明已之學以揚已之道者則其望之之心為何如耶安定先生學徒遍天下而使昭陵得聞其明體適用之學者長樂劉公也公之學見於用者多矣而賜對之時發明其師之學言甚懇至葢先生之望公者固逺而公亦可謂能副其師之望矣今志學之出必仕於顯其發明胡君之學當益力副胡君之望當益至而胡君之言當益大驗矣是言也非余之言也夫其友者之言也因以識簡末云安定先生泰州如臯人仕宋至直講天章閣待制劉公名彞善治水湖州人昭陵者仁宗也嘗賜對言其師之學送陸振文序耳之所聞目之所見薫陶漸漬之入人之深者惟習而已習於儉而不自知其為儉魏之風也習於悍而不自知其為悍秦之風也陳則習於巫而遂成其俗齊則習於遊田而自忘其過至於習於墾闢稼穡而不憚其勞則豳人為可嘉習於禮樂道義雖更變遷而流風遺俗猶有可觀則鄒魯為可尚也況儀秦之倡為遊説當時不覺而趋之何鄧之倡為清談當時不覺而尚之甚矣習俗之入人之深也如是哉醫必良於三世弓冶之子必善為箕裘亦以言其素習也一齊人傅之衆楚人咻之欲其齊語不可得引而置之莊嶽之間數年求其楚亦不可得矣吴城陸仲謙朴厚人也能尊禮四方之賢大夫士有子曰翰字振文通慧而敏自幼已翹然矣目日習乎君子之動容周旋耳日習乎君子之辨析論議而加之讀書之功問學之力既長而壯褒然儒者也今已三十餘而遊道益加廣焉以鳯陽倉曹丁家艱服闋赴天官就選大夫士咸詩以送之多至盈巻而徴予序之夫人之贊詠之多如是者必其人有可贊詠之實也觀農者不觀於歲之登而觀其深耕易耨之日觀射者不觀其鵠之中而觀其持滿審固之時振文之有善之實以致其贊詠之多葢不在於今而於其翹然之時已兆之聞見之間已化之矣則習俗之入人之深也其不信乎習尚之擇其善惡也可不慎乎董子曰習慣如自然是之謂與贈郤安仲序天能生人而不能食人非先農氏將何以養食能養人而不能己人之疾非先醫氏必多夭札之虞然先農有一定之法故天下後世皆良農先醫無一定之方故天下後世良醫恒不多也雖無一定之方而有一定之説能究於其説方斯在矣故後世因先醫之説而研窮抉摘闡明而發揮者紛紛籍籍非一家一人也用功則勤矣然各自持門户門户既多愈繁愈逺學者有莫之適從之歎宜今人之謂良醫必歸於己人之疾之多者也葢方衆論交興各是其是不於其已驗者觀之將何究其得失哉故己人之疾之多者世必謂之良也崑山邵安仲業醫三世矣已人之疾固不少其所謂良者乎同邑有浮圖相師空海瘍生頷間亦殆矣安仲為療之師姪李彦澤感其徳來求文以贈嗟夫醫之為學果無所適從也耶夫門戸不同而理無不同後世之論相乖而先醫之説已定不求於已定之説而事乎相乖之論此所以㝠行而自迷也然久晦而明理之必至故近世以來北方之醫傑然而出者相踵皆専力於先醫已定之説其所論著文或有殊本則無異誠可謂醫之良已然百年之間南方之人豈無有得其學者吾聞其人亦既彰彰矣學者於是而求之非所謂適從者乎安仲其必能味吾之言矣送吴江廖丞序自予來横山雖不忘簡編自程時暇亦徜徉水泉林木之下隴畝墟落之間往往與田翁野人語其種植耕稼之事土風鄉井之宜不自知其與之習也山雖版圖吴邑其壤地則與吴江相錯猶犬牙然故相親接者多吴江之民毎聞其民談頌其官長之賢亹亹如不足且曰真所謂父母者問之則曰吾貳令廖君廖君余因思是必士君子不然不能致是也及還城城之大夫士自吴江來者稱廖君不寘口道其實非一事問其人則曰儒者也予因自喜其臆之之有中然猶未必其果何如人也夫人之不可以力致者善聲也其尤不可致者匹夫匹婦之善之也匹夫匹婦之善之非有其實能爾乎匹夫匹婦猶可以一端而致其善大夫士則非可以一端而能致其善也大夫士之善之其實又何如哉則雖不必其果何如人其人固可必矣今年秋予友金侯徳儒致其所著贈君之文書以來告曰君儒之材者也吾文可徴矣今秩已及考將朝京師吴之以文鳴者咸詩以餞子其序於篇端嗚乎斯有以知君之果賢矣夫善聲之形於大夫士之齒頰之間且不易致況形諸文詞翰墨之間乎一二人之賦詠之且不易致況得之多士乎且金侯之文固少許可者今觀其美之至如是則君之果賢無疑矣古人之信人有見而信之者有聞而信之者豈必身親與之乎聞而信之則固因可信者之言而信之也今雖不識廖君金侯之言則可信矣遂不辭而為之序都昌送别詩序都昌送别詩者都昌之大夫士送其令俞君有立還吴之詩也初有立家居吴城南之西陬予家城東之北陬相去餘十里然而締交則舊矣葢其為人敦厚端静語言如不出諸口嗜好沖素氣度閒整而力學制行考義究古作為文章寛博而周悉與人交恂恂無忤士林之譽有古學者之風焉洪武四年秋有薦其才者用知韶之樂昌人毎自曲江來詢其為政稱善不輟口曰豈弟而嚴審慎而決其㮣如此及以父憂歸見之謙下更甚若無所能為予意向人之言未必皆然也已而在憂者例起之遂知南康之都昌有來自西江者詢之與聞於樂昌者無以異予始自愧疑之之過矣今年春其母䘮大祥間出此巻見示且曰幸為序之讀之愈益愧己之不足以知之也然復自思亦豈無其説哉葢自用之於處者是得之其家學者用之於出者是得之其師者也何也自其曽大父秋蟾先生以來三世隱居教授實深潜其輝耀者今其見於家居若是非得之於此乎其師永素陳先生文昭則尚氣自許勇於有為中至正甲午乙科進士第尹慶元之慈溪慈溪之政卓卓在人口耳今其見於為政者若是非得之於此乎惟其得之家學既如彼得之於師又如此此其不易以知之也然則其出也乃其體之發其處也又其用之藏也耶所謂有古學者之風其殆是與其殆是與贈徐孟銘序醫活人術也故操其術者恒以活人自任而用其術者亦以活人任之則醫之能活人也必矣然死生非細事要不可不自慎也毘陵徐孟銘葢所謂能自慎者予聞之矣其族祖仲清嘗僑吴城中時四方大夫士多萃吴下家惟無病病必延仲清視之仲清之名籍甚去歸其鄉今十五年矣而又聞孟銘之聲焉徐氏何多賢耶徐氏之先有以藥濟人者見於神仙家書豈其澤至今猶未冺與矧聞孟銘不獨精於醫又能讀儒家書好賦咏則其人又可知矣姑蘇包士貞嘗患失血之疾且殆已孟銘為起之士貞感其徳以他無足報迺求名人大夫士之詩以贈之多已成巻請予題其端昔道潜以詩名士大夫間龎安常嘗為之療疚潜方思所報東坡曰盍與之一轉語也則以詩酬醫有故事矣然未聞安常能自賦咏也今孟銘能自賦咏於詩不大相契乎士貞之贈豈徒然哉然則孟銘之於醫所以能慎者豈亦得於温柔敦厚之教也與是為序送錢以方序士之為學淑已而已惟其能淑夫已故有以及於人流水之為物盈科不得不行君子之於道成章不能不逹亦理之必然也哉且夫木枝之蕃者以其本之固也本固而枝蕃其䕃必廣則不期人之依其䕃而人自依之榖實之碩者以其種之美也種美而實碩其味必永則不期人之飽其味而人自飽之夫依之飽之在木與榖猶常道也而得以依得以飽者葢有非小補者矣姑蘇錢以方予同邑人也力學自修文詞精贍以明毛氏詩著聞毘陵之無錫縣學延致之訓其弟子員以方雅不自滿謙不屑就再閲歲主教席者躬致禮幣堅請之以方曰某雖審於自揆亦何敢峻絶人情也哉乃治裝行有日吴人士咸賦詩以餞以方以嘗從予遊也請為序於端噫以方從予講學時舉措特殊其倫類固知其有今日也今日而尤不自滿他日其易量耶以方之自待如是則錫山之弟子員自兹而往非徒得以依吾將見其有餘地非徒得以飽吾將見其有殘膏賸馥矣髙齋絃誦詩序髙齋絃誦詩者予友秦思尹氏之所與遊者之所賦也詩凡十二首賦者十二人思尹遊道廣矣今之賦詩者其尤相親者也一日十二人者踵予門而告曰某等之獲交於思尹非一日矣朝夕葢未嘗逺離也今思尹司訓長洲已三月某等時一造之瞻黌宫之髙明覽齋廬之嚴肅琅然洽然聞絃誦之聲未嘗輟也有不自覺其心融而意舒氣和而神暢者矣因相與賦髙齋絃誦之詩既以寫其欣慕愛樂之懐又倣像其禮樂雍容之趣詩已成巻敢請為文序之予聞思尹之家居也惟事乎讀書養親焉葢其為人平易和雅識逺慮周處物治身務思古道用其所學作為文辭整飭而舒徐縝實而華潤至於經術尤邃於詩故邑士大夫延禮之訓其學之弟子員而士林有得人之慶也方思尹從予時予固未嘗不盡夫友之之情思尹亦未嘗怠其事予之意也於時人已識之曰是足為器也已今思尹學之所至聲聞隨之朋儔之所欽承後賢之所屬望而髙堂永晝庭户清寂執經鼓箧者鴈行以相次思尹則拂徽詠歌敷巻陳義聽者開明觀者敬聳雖予亦為樂之況兹十二人者乎其形之賦詠也宜求予序之也又宜矣雖然予因是則有感焉聖人之教人必各因其才而得才以教之又君子之所樂也烏有處君子之心而不樂於教人者耶惟拒之以不信絶之以不為斯亦無如之何耳今思尹之所教既皆可成之才又有必成之志則其日侍乎几頴之前從乎杖屨之後者將復有識之而曰是足為器者已予雖衰猶未耄也尚及與賦者同見夫後賢之逺至也矣送戴伯兼還金華序予自幼以洎於壯所見業於醫者咸論病據方而用藥未有論藥制方而已疾者也嘗有誨予醫者亦曰治某病以某方某方治某疾而已然竊疑之病多變而無常方一定而有限以有限之方應無常之疾吾恐其有時而窮也既而有告予者曰欲求縁病處藥不執故方論得其情而効如其論者今王立方氏為然予聞造之聽其譚殊不類常聞也因而質焉根據深逺博而叩之援引精切予大嗟異問其所從得曰金華戴氏肅齋原禮父也問戴氏所從得曰義烏朱氏丹溪先生也丹溪之道大行於浙河之東其聲昭晰於東南而衍溢於天下然不知焉學乃如是也立方因以丹溪之所從得與其所自得肅齋之得於丹溪與自得於已者歴舉而詳陳之然後乃知委之源焉支之本焉立方之於疾所以論得其情効如其論者良有自哉立方曰欲知丹溪之教人當觀肅齋之教人肅齋教人有曰必先治已利欲之病乃可治人氣血之病徒論云乎哉誠哉是言立方之所聞如此宜其學之至於是也慨談此時殆十有五年肅齋嘗一西遊道經吴下獲承下風而接緒論矣予雖不事醫肅齋則非泥於醫者故夢寐有時而相親也今年春肅齋之子伯兼來吴觀其尚氣有為論議髙爽家學之外博及諸書予不覺興歎焉夫於肅齋固知有伯兼之為之子于伯兼益以知肅齋之為之父也時云秋矣伯兼告歸好事者為寫孫太白還山圖餞之士大夫咸詩於圖上立方謂予曰子於肅齋父子間不無情矣今伯兼歸乃無言乎噫肅齋予敬慕之矣伯兼予歆艷之矣復何言哉雖然立方之情不可虛也因書所以敬慕歆艶之者以為諸詩之引焉送陳士開序中吴古多士自宋渡南吴為三輔近地大夫士多僑寓者故文物為尤盛焉百年以來雖洊更變遷而彬彬之風比他郡猶不盡廢譬之多藏之室消歇之餘尚足副中家之假貸葢所從來者厚矣兹數年間北方之學官延禮師儒者往往趋吴吴人士應之者幾人矣徐之碭山久虛訓席其邑之大夫方懐教弛之憂而有以陳士開薦者乃具禮幣使其弟子員李某周某來吴拜士開之館而請焉士開行有日其所與遊咸賦詩送之而徵予為序予因自喜吴人士之從予遊者有司鄉邑之訓者矣有司鄰邑之訓者矣有受千里若二三千里外之聘幣者矣指固不可一二屈也今士開雖非予弟子而從予友遊又將設臯比於碭山之黌舍則謂吴邦為多士者非耶雖然人之求夫人者志於得所求耳而應其求者盡誠以畀之斯不負其求之之意也士開行矣勉之吾將見碭山之弟子員不失所求而其邑大夫之憂可釋矣是為序送沈志道序姑蘇古稱吴㑹以吴為東南都㑹也其地為㑹府其民人之蕃且庶也宜哉而城之闤闠莫盛於儒教表忠之兩坊然其民類多伎藝販沽以資農為業雖庶而不得舒於衣食奉養朝夕之贍故人皆小心勤慎莫敢少焉以自肆自佚其知讀書之家則所守彌謹讀書而生質之厚者其守愈益謹焉予友沈學菴居儒教坊今年六十七矣讀書葢未之或廢雖不拘於章句之學而自通明大義為務質性敦實而謙下葢其為人惟見人之所長而未嘗不知己之短則所謂小心勤慎愈益甚焉尤可知矣其子志道以吴邑薦其才將與㑹計者偕大夫士多賦詩以餞而徵予為序學菴予友也其子方出為世用予安得已於言乎葢夫人之欲為善者要必取法於善人焉然法於逺不若法於近法於疎不若法於親法於所聞不若法於所見也今學菴以敦實之質加之讀書之功而熟於小心勤慎之習是其善也人將有法之者矣而志道乃為之子則所謂近所謂親所謂見者兼得之也矧夫義方之訓之固有其素耶吾知志道之出其設施措置必能守夫忠厚謙下小心勤慎之家法而不違矣然則予雖不得已於言亦復奚言也哉亦復奚言也哉梁溪漁友圖詩序予友吕志學父掌教錫山聲聞著矣年六十有退休之志自號梁溪漁友梁溪其鄉里也好事者為繪之圖大夫士咸為之詠歌焉歌咏浸多裒為巻軸徵予紀其事於圖而冠於詩予不得而辭也晉宗少文志好名山而足跡不能遍至乃畫圖四壁卧以遊之以適其意今志學身處黌宫厥有職業不得時至其鄉樂其林園煙水之勝斯圖既展則神情超然邈乎自得葢似於宗少文矣或曰古稱同類曰友志學儒者也顧乃友於漁漁其類乎不然也同志曰友耳志茍同奚必論其迹哉張子同有道之士也謂誠漁耶而以漁自居漁父辭至今傳于世詎必食於漁然後為漁哉志學之所尚可見矣志學絃誦之餘毎多賦咏予時見之未嘗不喜其氣益昌意益暢詞益修而指益逺葢老而愈工久而彌篤者也則為之咏歌者無率然之作也哉求為之序葢亦宜矣且志學居吴中時吴之文人才士多與之交轉首二十年故舊凋落今為之賦漁友者當時之人十無二三使諸名勝無恙則其卷軸之富又當何如得不重予之感乎此予之文所以不得而辭也詩在巻者幾首某郡某人某郡某人好事繪為圖者黄鶴山人王蒙叔明也送丹厓唐君序丹厓唐君處敬㑹稽人也領至正己亥鄉薦為皇岡書院山長終秩轉嘉興儒學正其為人敦厚夷雅博學多聞見大夫士咸愛敬之初君為山長時以其暇日來吴客於今左轄吕公所教其子三人長守恭次守敬守忠雖年之至稚者訓之皆有法度後三閲歲而有嘉興之除三童子乃以父命更從予學觀其動容周旋則知君之教之亦至矣今年春君將覲其親以就職三童子知之依依向予告曰守恭等之侍丹厓先生之日不為不久矣慈愛訓誨不為不多矣兹携家以行先生與之交最善以有言贈之願得附姓名於卷裔使見區區之情不知于義合否幸先生教之予聞謂之曰可哉夫弟子之於師有三在之義焉一日師之終身為弟子矧三年之久乎宜其不能無戀戀也今三童子之學於予則予之弟子也弟子之質師以義小大之叩小大之鳴以諭師之道也因其得以誘之由其善以道之亦師之道也今君之徳固非三童子之所能道然其情可終冺乎所以書之者既以不冺其情又以盡予之道也杏林詩序杏林詩者美董君某甫之詩也君家暨陽以醫術著欲脩其逺祖廬山翁之業起人之疾甚衆人之輸報者君與約曰惟饒富多畜及官有祿者以金若耕桑萟圃事山澤治工技者以所出其里人之貧逺客之羈窮有甘㫖之營者勿以貲惟種杏一樹有子子種有弟弟種婦女兒童責奴種老無子家無奴者大夫之休於鄉者服道徳操文墨者毋須報約定咸遵之數年杏林蔚然矣然人徳深而報之不逮皆以為慊又重其約不故貳於是能文者始為詩以詠歌其徳焉詩既多君裒為巻及避地來姑蘇以示予而告之故復請序之予讀而歎曰君亦賢已不以世屬為疏逺而復脩其先業非賢其能乎且廬山翁之杏林要在楚君繼之今於吴焉豈必同其地哉夫楚之杏林已數百年父老相傳道翁事猶歴歴而不識當時有能詠歌如今者否然不必論也今則不知君之杏林亦能使父老相傳於數百年之後君之子孫亦能如君之復脩其業否雖然文詞於言為至精不愈於口耳相承耶是編之人豈無能顯其文於後世者則君之聲以傳又不待父老之言與杏林也矧觀君之約其人皆藹然出於忠厚者古云本之厚者枝必蕃此如可信則君之子孫必克大其業也已送金汝霖還西江序雲陽李先生之解江浙儒學提舉也寓吴之文正書院居焉先生始為名進士聲譽已聞動四方既歴清顯文章學業益為人所嚮慕故南北士大夫之過吴者必求見先生吴人士尤以獲親先生為至幸而予亦嘗得竊承下風焉及先生歸西江兵革起海内道梗棘不得通吴城旋亦陷音問遂絶矣越十有六年歲丁酉吴亦平客有西江來者余問先生所在曰永新死矣余方驚悼客笑曰使非俞總制將不得終其年兹既保全以殁尚何悼哉予究其所以客不能詳也今年秋武陵蕭鍊師偕新安金君汝霖見訪予不識金君鍊師曰永新總制俞公賓客也予因記客言問曰非活李雲陽者乎曰然子何以知予為道其故金君曰請詳以語子初永新既下俞公入城撫其民雲陽方被創仆道上公見其儒服問為誰雲陽仰應曰我李某也公久已熟其名即下馬親掖之使載歸其營手注藥合其創勅左右謹視㑹受命就以兵守是州遂館雲陽於家焉公本新安人素漸朱子之餘澤讀書明理義好學不倦乃日與雲陽講説經義論道古今人物興壞理亂是非得失之迹殊加禮遇又與之商畧重新學宫教弟子州人化之更三年而雲陽殁厚其棺歛盡禮而葬焉既葬復裒其所為文若干巻刻之猶以為未因某之東行切囑曰李先生嘗司浙江文䑓其文章必多散落浙東西者可悉心搜訪以來吾令工人削梓矣某之往來吴越者以是也予聞而興慨俞公之賢一至此也明日鍊師復來曰金君已畢事將還西江兹邦士大夫咸賦詩以寵其行願得君之文冠其編則金君之有光加矣予謂之曰以俞公若是之賢金君能副其意又如此皆可尚者予得靳於言乎且西江文物之盛由宋及元大賢君子相繼而出雖曽經亂離俞公又能作興之使愒不廢兹天下理當治平他日文章之士果能追踪前代則公今日之所為寧獨有功於李先生實有關於西江之文運也金公歸必能益贊公之作興矣予何靳於言哉贈周廷昌序姑蘇為東南㑹府九流氏咸盛於他方而醫其尤也其以女醫名家傳世久逺益昌而不替惟周氏然予嘗觀百家之能奮振于世者雖其才若學足以自致亦係其家門之氣運焉其孤寒之出勃焉而興忽焉而靡昌宗鉅族綿延以㣲腐消而澌冺者皆其氣之薄也能如深源之流愈出愈長莫可窮其紀極斯固受氣之厚然必世有人焉葢惟其家門之氣厚故世出其人其才若學足以自致已嗚乎豈易而得哉若周氏是非易得者矣周氏顯於醫自宋至今凡六傳世髙門大居閭門相接季昆叔仲冠裳濟濟稱譽交著其奕世之不復多見瑶珥瑜環照映森蔚又浸浸乎八世何其盛耶六世中有廷昌氏治業益勤聞將加顯矣非所謂家門之氣厚而世有其人者與今年秋予友陳彦良之子婦病廷昌為起之彦良來曰冢婦承祭祀病非細故也非廷昌之善治能無憂乎無徳不報敢謁文報之彦良可謂知所重矣病係一身之憂而冢婦則一家之係也為解一家之憂宜其徳之深也於焉以推則夫廷昌之業精而解人之憂亦多矣醫多隂徳後必大周氏其當益大乎故為之序以塞彦良之請而致望之之意於廷昌云送湯孟循序湯先生師言本湖南之長沙人宋嘉定間有為大理少卿者始家於吴實先生之髙祖也先生以周禮領咸淳癸酉鄉薦入元由校官仕至從仕郎某州判官先生與吾郡文正范公八代孫文英友善因為仲子郁字子文娶其女子文種學脩文辭稱聞揚著憲臺交薦兩授司訓皆不就開門授徒至今為鄉先生子文孟子述字循通敏有才氣既承父祖之基業又習外家之聞見士林之聲籍甚今年春朝廷舉賢才令下有司既薦之行有日大夫士咸詩以餞來徵余引其編端余毎承厥祖下風而復交其父可靳一言乎夫論人固不論世類也仲弓自當見用黄叔度海内所歆尚何世之論哉然瑕邱江公子孫皆為博士歐陽生至孫歙八世皆為博士是果誰之澤與今孟循家學既如此外氏又如彼瑕邱歐陽何逺哉要無愧其子孫焉爾嗚呼可不勉哉雖然行而不怠無不至者孟循行矣毋怠斯其至哉敷金嶺樵詩序敷金嶺樵者義興殷伯賢氏之所自命也嶺在義興銅官之陽土石有金色故云其下伯賢家也伯賢之先葢出商裔至唐始為吴人族世鉅大大父以儒業遺其後伯賢七歲誦書史有祖風既冠能親接大夫士無倦母疾卒伯賢哀痛踰禮饘食者一年酒脯不近口幾於病父勉之始飯處家甚睦所為恒尚篤厚縣人譽之或言之令令強出為胥復材之薦諸府府檄下辟懇求免不得乃就職以㢘勤稱有惎其善者離於法則誣致之事終白歸曰吾志遂矣即布衣草履牧畜墾田日奉㫖甘於膝下暇則入山谷與樵蘇為偶忻忻如也一旦守復召之曰汝今可史矣伯賢頓顙辭守曰人惟求舊汝何辭竟不許史職更善由胥而史今七年矣毎見人史之必曰我敷金䫈樵也果史耶大夫士髙其志者咸賦之伯賢毎得詩即躍躍以喜即拱璧不至是句吴浦長源稔交之故道其人如此噫亦賢矣長源又曰其詩已盈巻願謁文冠其端長源其忠於友已乎其果知伯賢已乎夫古人之觀人于其心不於其迹載筆於柱下待詔於公車而謂之為隠人皆不之信然其心未嘗不隱也木石之與居麋鹿之與友而謂之為仕人皆不之信然其心未嘗忘仕也若人者可不究其心乎今伯賢以身則處乎簿書之間以名則郡府之史而自命為樵人固不然君子則然之然其心也昔有樵夫之拜於髙人之庭者髙人者曰汝豈樵哉後果與人爭氣勢不相下至相噬焉則髙人固已識其心矣若人者果可信其迹耶今伯賢也長源之語之既如此大夫士之咏歌之又如彼則其果樵乎非樵乎吾不待質諸髙人而得之矣送葉公羽序長洲葉公羽以蘇學弟子員起家為燕府奉祠正迎其親之官幾年矣毎人自北平來蘇余詢公羽何如輙曰孝敬人也詢所以孝敬各有指稱或殊或同非一事也因歎曰公羽其果賢耶公羽執經時雖不𨽻余舍然觀其所為有離其倫者固已期其有賢聲矣兹以孝行聞其賢又何如哉凡人之見稱于時各以其所善也見稱以孝衆善莫之或先矣公羽其不孤予之望哉今年夏公羽衰麻來見以其父墓銘為請然後知其以外艱去任而還於鄉也既襄事復往侍其母夫人蘇之士夫咸賦詩以餞公羽又持巻來請弁其端公羽之聲其益著已乎北平之去蘇餘三千里公羽匍匐哀號扶其父櫬歸葬故邱情禮兼盡斯足稱之矣人莫不有親也其從仕逺方能如公羽之不違夫養生送死之道者幾何人哉蘇雖公羽故鄉而北平則母夫人之所在遄歸之興葢欲慰親倚門之思也鄉人賦詩以賛詠之詎不宜乎嗚呼公羽之於余友也非師弟子也而其自居若弟子者以余嘗與其師同事也其師已矣顧乃喜其不孤余之所望能不重余之感也夫洪武十八年九月朔褚園序為邊文叔謝其弟陳熈甫序予鄉有故家舉郡中無為之右者曰邊氏非無故家之右之也無詩禮相承之出其右者焉邊氏出陳留由大夫公以經笥鳴於漢而經書之源流衍者凡幾世至楚邱君楚邱而下四世得禮部君禮部當五季時登乾祐元年進士第以循吏稱廣順間自是而後世擢髙科膺寵遇為鄉邦之元而著之史傳者亦盛矣訖宋歴元雖顯晦各有其時而春秋家學無少替世麟之扁揭之堂顔炳如也禮部君來更幾世至朝奉君始居吴又幾世乃貫長洲籍又幾世至伴讀君則予嘗覿之矣伴讀即世其子文叔司黌訓於鄉邑事母夫人以孝聞母夫人年開九袠文叔之所以致其樂者日加勤慎談者謂足以見其詩書之源流衍之無窮而君子之澤未易以世數計也今年秋母夫人遘疾瀕於危殆文叔於醫禱之謀葢無餘智巳已而得舊所從遊者陳熈甫藥之而愈文叔一日來告曰母氏之疾微熈甫之庸心將何以紓不肖不孝之責乎兹縉紳逢掖胥為之喜而詩以為熈甫贈請序以冠於篇焉嗚呼是益有以見邊氏詩書之澤矣吾聞熈甫從師時其師為之講明夫義理者甚至熈甫欲報之外物曷為之報耶今而於其師致憂之時體其師事親之心竭力盡誠起師之親之危疾以釋師之憂紓師之責其善於報師者哉非其義理之明曷能若是耶義理明而若是是以其得於師者報其師矣故曰益以見其詩書之澤也然則大夫士之賦詩者非徒以為熈甫贈又將以為邊氏詩書之澤之慶也與洪武二十一年四月吉褚園某序送顔新民序長洲顔新民由新安知縣丁父憂服除將赴銓曹待選鄉人士咸賦詩送之來求言為之序予謂新民所以求言者欲予有所教戒也烏可美詞説之而不副其來意乎乃進而語之曰食人之食事人之事理之常也食焉而怠其事陪臺亦愧之況夫臨民者哉民吾等夷也一旦衣冠以臨之知其所當奉事也役之左則左役之右則右鞠躬俯首順而承之惟恐或後烏乎將誠賢於彼乎吾見其鞠躬俯首順承而恐後曰是固當然也其如吾何一切不恤焉於戯民無如吾何吾則如理何囬視吾之身可無慮夫寒也吾之腹可無慮夫飢也是果孰從而出哉盍思所以事其事焉事其事無他忠而已矣葢忠者所以報國家也所以恤民下也予聞新民在官時有政已有政必樂聞夫善道也故以是語之新民也能無怠其事事之心非不孤予教戒亦不孤巻中諸詩之意矣是為序緑茗園宴集詩序盍簪著義援古無疑伐木興歌徴今何咎諸君值芳辰之優暇為勝集於名園維時節既謝春氣方迎夏風披緑茗飄翠雪於瑶階露貯紅蕉瀉華漿於碧盌鳴琴幽澗清音與流水同聞汎斚澄波景羽共游鱗並駛幸爾同兹遭亂於焉俱得偷安惟欣舜日之舒遂忘楚氛之慘各為四韵用識一時右倣唐人春夜宴桃園序體半軒集巻六
