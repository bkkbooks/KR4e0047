body:
  text: 刋半軒集後録半軒先生為吳中碩儒名揚勝國入我朝尤綽綽著乎遐遠也習童時嘗聆先贈承德府君談先生學之博才之豐而文之雄未嘗不聳動座人愚固䝉昧已志之矣稍長不幸先君棄背無所質問後獲先生所著學言稿觀之益深敬信及聞杜東原老師自言從廬山陳五經五經實先生弟子嘗述聞于五經者為之傳具載履歷甚詳並示半軒集乃元末諸作尤為粹美再于舊交姜晞說所得楮園集甚夥然與前二袠亦有同者皆抄本亥豕魯魚紛乎其間乃彚而録之誦而味之更其訛闕其疑如是自占畢逰仕途踰三十祀矣逮官廣東重加釐正為十二卷總名之曰半軒集鍥梓埀成鄉契許廷章寄來數十篇作補遺于後兹委政歸復于士友陳思耘朱野航處假有多者抄入吳山陳文顯故儒家也言其故祖允中嘗從先生于書館抄的本因時有忌久藏不出近出示簿帙已殘毁比城中諸稿多異題四五十首遂欣録補完噫先生之學之才發之于文者殆與造化相為悠久奚待梓傳與否惟習自丱角知慕愛鄉先生先君之言猶在耳兹已老茍猶怠緩不于斯文求就緒則是好之未至反如不好者也觀者幸矜念云𢎞治辛亥桂月望同郡後學張習謹識
