body:
  text: 半軒集卷八明王行撰題䟦䟦唐程晏上器解予每讀上器解至痛器之失所未嘗不三復而歎夫世之有材能而不得用用而不得其所者誠可惜哉雖然與其用而不得其所不若不得用猶足以抱其全也其既用而失所思欲抱其全而不可得者則又可哀也已纂宋系統圖䟦予觀宋之得天下非有積徳累仁之漸特軍情之推戴出扵一時無異扵郭周之簒漢而其享國之久三代而下乃無及之者雖中葉而夷虜據華然不改宋號不移趙姓至三百有二十年是何由而能致耶葢以太祖操殺人之柄而不嗜殺人太宗有驕侈之資而不樂驕侈真宗似嘗驕侈矣而不忘仁愛率由舊章迨乎仁宗四十二年天下之民幾扵皥皥之世宋之為宋治斯亦盛矣惟盛極而衰理之必至是以英宗以旁枝繼統乃生神宗滋培亡國之基本紹聖改元正人盡廢徽宗得位益徇所私假是以濟非戕民而侮敵宜若可亡矣而禍萃厥身祚𦙍無故雖蒼黄南渡仆而復興左枝右梧又歷九傳而炎運乃熄扵時論者莫不歎其弱而不振因致其亡嗚呼弱而不振宋之所以為宋也使非弱而不振果能必其不亡也哉周之卜世也三十卜年也七百而後則竟過之是固以強而延乎秦自期扵萬世而二世遽亡是固以弱而促乎漢武强矣而當時有岌岌之勢其不亡者以樂極衰來之悔心能自鑠其剛暴之氣也然而蹀血禁庭骨肉屠戮至扵望思亦足悲矣光武中興用柔道以勵風節洎其末世雖以姦操之强梁猶没齒不敢施其弑奪之計亦有畏扵公議耳晉一海内其勢非弱也不四十年而主社稷者非復司馬氏之子孫也隋既平陳好殺滋甚繼以煬帝狼戾滛毒自以爲强也才三十年而楊氏不血食矣迹是而推使宋非弱而不振亦安必其不亡也矧强之與弱得失有不待辨也盖强者必恃恃則肆己肆己則虐人虐人則怨生怨生則天怒天怒亡必隨之矣弱者必慎慎則審已審已則愛人愛人人亦愛之人愛之天必祚之矣天祚之其孰亡之也哉若然弱者其終不亡耶非也弱之極亦亡然其亡也如水之涸猶有餘潤焉茍强而亡則如火之倐滅豈復存其煨燼耶此又强弱之勢也且三代皆聖王之後也不能無亡宋能必其無亡乎宋不能不亡而其亡也猶有光焉殷士膚敏祼將于京哲人蓋傷之矣今宋雖亡而士君子有未嘗沾其㣲禄受其一命者乃至終身不忍忘國恩自非愛人而人愛之又烏能致乎此哉扵是可以見宋之爲宋矣故曰使非弱而不振安能必其不亡然今亡也猶有光也姑蘇王行既纂是圖而䟦扵後云題張來儀懷友詩古人之取友也慎所以友道恒篤友道篤故過相規德相資而學相勵三者有矣又必憂其憂樂其樂非恝然如塗人也今人之取友也茍是以友道恒薄友道薄故面相阿技相髙而業相忌三者友矣至或樂其憂憂其樂反不得塗人之若也噫友道之不敦亦甚矣雖然十室之邑必有忠信謂今之人果無慕古者未必然也及觀張君懷友詩盖益信矣張君處圍城中朝夕自憂之不暇迺能推己之憂以憂朋友之憂形諸賦詠其扵友義何如也且君學茂徳修所著必爲世重是詩既傳則扵朋友之道所補不深已乎此余所以感歎而具敬也三誦之餘謹書以識題孫敏詩惟學自國風再變而爲楚辭又變而爲樂府樂府之變去詩人之意逺矣樂府近性情之正者亦多音節短促少寛厚和平之韵起讀者淫佚哀傷之思古人所謂不足以諷而適以勸也惟古詩十九不大逺有詩人之意為後人所當宗然其閫域髙深又非初學之士所能入此詩又所以不易也晦菴先生教人學詩必從韋栁始以其猶間有古詩之遺意然韋得之多而栁得之少韋之所必當從也惟學聰敏有竒才方鋭扵爲詩其錄此卷偶多樂府體故以予之嘗見諗之惟學能持此質諸大方之家倘得正其疎謬則又望以教我題唐應庚字說卷顥西方色也西方之氣雖殺而實生若果碩則有復生之理也庚續也長續日之光所謂西有長庚者也唐生名顥而字應庚其亦取扵斯乎應庚聰敏好學方精扵醫夫醫也有生生不息之道其學也致續續無間之功吾將賀生之不孤斯義矣玩古翁和易詳慎有子而賢亦宜也夫䟦周正道行述宋既南吳爲三輔近地故家文獻往往在焉入元日㣲月泯洎更亂離零落殆盡始予厠跡士林前軰已不獲多見兹老矣欲求文獻可得多耶數年以來頹惰草野時一入城輒陪拙逸先生清論每聞前輩儀刑竟日不厭因復自喜雖不得見而知之聞而知之亦幸矣矧先生年愈尊行愈髙而學愈勵所謂故家而不泯者乎嗚呼今亡矣將復何望哉然先生之子傳少予數歳能述其先徳如此蓋亦賢矣則周氏之後非徒不泯其將復著已乎感歎之餘因書以識䟦湯氏先友諸帖予嘗論寒酸之士非有所憑依而自致華顯以大其宗者人皆以爲難而獨以爲易何也盖彼驕心無自而生而奮厲之志有所發也惟名門之子孫弗驕弗惰雖更變遷能世守其業而無替者斯爲難耳自非有篤厚之質學問之功其能邇耶長沙湯氏自大理少卿始貫吳籍四傳而至碧山先生以周官家學領咸淳癸酉鄉薦入元仕至州判官一時交際皆碩儒鉅卿聲聞揚著所謂名門者非耶碧山有孫完温厚好學雖方匿其華耀而確守家業蓋兢兢焉兹裒其先友翠巖龔公而下十有四人與其祖往復書札凡二十餘帖裝潢成兩卷將以傳扵永久而徴予題之曰愳先徳之或泯也嗚呼若完者非予所謂難得者乎以冺其先徳為懼視其家業何如哉使名門之子孫皆因是而勸焉則無慙扵顔氏之訓而扵風教有補矣遂爲之書䟦端孝思草書草書以二王爲宗而法二王者每難扵氣韵二王無大書或擴而大之則入唐人閫域入唐人閫域雖勿姿媚而氣韵益難今人以氣韵姿媚論爲一途殊乖書法孝思致力二王蓋久此幅雖大其體而氣韻藹然豈易得哉郭若虚云氣韵非師可傳此評畫耳予借以評書識者當賞其尤妙䟦芥隱信筆書三山陳宜獻字獻可先浮光人髙曾而下始居閩中世以文學著稱仕不甚顯獻可則築室苕溪之東林不復仕進以讀書事親爲樂文筆甚優所著芥隱信筆且百卷未及刪治而終入元其書散佚吳有沈通甫者得其殘帙數十卷藏之通甫殁書復浸廢至正間予友唐自牧父偶扵市人家見而閲之驚曰此書可備史闕乃爾錯亂殘壞耶即購之以歸方事釐次而其友張芸已又得其首卷扵杭倂歸之自牧扵是詳加考訂摭其要者二百六十二篇分為八卷繕寫成編此書是也予嘗怪元之有國以吏爲治不任儒術之實雖嘗設科取士而天下之廣三年之曠僅取百人右榜復居其半故讀書者不多而著述之傳扵世者殊少良起後人之慨歎也然亦豈無山林之士抱道未伸而書以見志者以既無爲之揄揚扵當時又無為之發明扵後世故不得而傳也如獻可者以世儒之胄生文治之時學裕才優著述宏富然此書也非自牧爲發之亦零落朽腐而已又烏知其足備史之闕哉乃知少文之時傳世之書不多得見無足怪也是則自牧之扵獻可也亦可謂有功也已因閲是書而題扵後云䟦鄭所南行録右所南先生行實一卷吳門唐謙自牧所纂録也録成以示予予讀之至其末云公之行可尚惜無人為作傳姑記其概如此因歎曰自牧之録此其有闗扵世教哉蓋先生亡國一太學生耳非有官守言責而享禄位之崇也顧其不屈也若是則夫受國恩承顧托乃俯首帖耳若無所與而諉曰運數有歸者獨何心哉先生遂至扵終身坐卧未嘗北向則其秋霜烈日之難犯者益懔乎其不可向邇矣故其殁也平日之靦然自欺而不能無愧畏扵先生者方自慶幸又烏肯執筆以發揮之也哉此先生之髙節峻行所以日逺而日亡也今自牧乃能括篇章殘廢之餘故老凋零之緒掇拾纂綴得不至扵盡冺而世賢不肖用心之不同扵此可見矣嗚呼使伯夷之風不聞扵後世頑夫安得而亷懦夫安得而立哉予故曰自牧之録此有關扵世教也嵗癸卯三月書䟦謝疊山江東十問公丁亥七月上鎦丞相書有曰某江南一愚儒耳自景定甲子以虚言賈實禍天下號為風漢正謂此書也使是時當國者有人心得此而籌之則宋必不亡奈何得此而讎之竟以亡人之國也後之讀此者乃服公之言有驗哀哉更百二十又三年爲洪武丙寅䟦題貢獒圖西旅貢獒一事見扵周書已詳著矣有以見古人之寳賢而不寳物也爲是圖者非無意蓋必有爲焉耳則觀之者可徒視為粉墨丹青之玩也哉題趙子固蘭竹卷趙子固襟度蕭爽似米南宫時人謂其有六朝諸名人風致觀其筆跡所至超軼絶塵非踵常襲故者所可到亦非踵常襲故者所能識方得意時無一㸃王孫習氣惟知有圖書滿船探搜古秘烟雲水墨出入窅㝠勝賞清吟惟日不足故其所成之梅竹妙趣層出展對之頃令人心目開朗睡思消而醉魂醒也雪堂居士嘗以清雄邃鬱評南宫書畫此卷亦足當之哉題陳邦度詩後詩先國風而後雅盖風本時之歌謡雅則禮之樂章也學詩者不先之風無以見詩人發扵性情之自然不歸諸雅無以識君子止乎禮義之中正此不易之序也邦度博學好問尤喜為詩然其所賦無論正變率多風體此編是也夫人之學與日進則識以學明邦度春秋甫盛其進猶月恒川増未量所止茍知其序則今日之風皆他日之雅要在勉之而已披誦之意書以歸之題周正道横山八景詩後先人所藏在横山之麓予往來山中數矣山有八景故老傳頌頗久之東家東家曰八景吾家得之之西家西家曰吾家得之則是景也家得之而人愛之矣予舊嘗賦焉曰吾亦得之乎或笑曰子將為已有邪非已有已寓耳間以告拙逸先生先生曰吾亦為盧氏賦之矣嘻先生得之盧氏亦得之乎因題其詩尾以識一笑䟦東皐唱和卷右詩一卷渤海髙啟季廸蜀山徐賁幼文訪梁溪吕敏志學甫扵東皐所唱和也初吳城文物北郭為最盛諸君子相與無虛日凡論議笑談登覽遊適以至扵琴尊之晨薌茗之夕無不見諸筆墨間蓋卷帙既富矣及更變遷相繼散去或顯融扵脩途或隱迹扵林野或歸復扵九原而余亦來山中矣人生離合固有數耶如卷中三人季廸已逝幼文方守官河南志學雖時一見然掌教錫山亦不得數相親與追維往昔能不興懷且此唱和時東皐去城殊不逺余復不能相從以陪談咏之後此懷又當何如撫卷慨然曷能自已三復披誦書以識之題鷦鷯居樗賦右鷦鷯居樗賦余友顧季友氏作也季友名諒隠居吳山之麓四十年矣早歳多從故老㳺見聞殊廣而謙抑若無所長兹賦盖自况也豈固然哉亦深以自藴耳老氏曰知其白守其黒季氏似之非耶余讀其辭而愛之因題扵後云題朱彦修風水問荅後君子之所謂趨吉避凶亦鄉善倍惡修人事以順天理而已天理平易而正直人事亦惟平易正直爲可以順之順天理矣果吉若凶所不計也公劉之遷邠擇地利以便民居周公之宅洛承先志以服土中耳民居既奠先志既成人事至矣順夫天理孰過扵此若曰定形局而必扵是而期後𦙍之有天下立方向而必扵是而期祚致八百年之永者豈足以爲公劉周公也哉丹溪之爲是書深斥卜𦵏之非可謂不溺扵流俗矣而扵居室乃拘拘焉為是委曲煩碎之説旁引曲證謂必爾而吉不爾而凶若無毫末之可違者固平易正直之所爲耶且夫陰陽五行有自然之運或為菑咎良非偶然惟德足以消弭今乃以力勝之非理矣此又見其不能篤扵自信也孔子曰致逺恐泥丹溪其泥者哉䟦韓處士夀藏記死生者晝夜之道原始反終而知其説理有必至焉者且虆梩揜之之後其事非獨爲親當然爲已亦當然蓋已即親之遺也則夀藏豈爲太早計乎韓君之言曰吾親吾已藏之矣吾親之遺雖方處乎晝要必及乎夜耳及扵夜而不得見其所藏吾其果安已乎此藏所以作也嗚呼君可謂能致夫深長思者矣能致其思扵身後也如是則身之前又寜至有樂正子春之患耶是文也他日傳諸後𦙍後𦙍其當益致其謹哉書元裕之論文訣而題其後右遺山元好問裕之論文訣雖云論文實看文字法也惟作者能知作者之苦誠非易事然茍能字字求之則用心亦精矣所謂作者將不始扵此乎古有云讀書一目十行又云目數行下又云五行俱下皆史文耳先儒曰讀書只怕尋思推究者為可畏如史所云何足畏哉金生澂學爲文辭方扵古人文字中求其法制故書此以貽之而幷識其後云書嚴誠則事跡卷忠孝兩事其實一途君子不責其能兼亦未嘗不貴其能兼也能盡其忠斯全其孝自非見之明守之正卓然有立毅然不回孰能爾哉古所謂照映史策令後世興慕仰者非斯人之徒歟今讀嚴誠則上監郡書幷觀其扞冦事迹盖所謂能兼者誠則始也陳欵懇以白其兄之罪實出扵天倫之情終也令族屬以舒其鄉之難又發扵忠憤之氣雖成否在天而義則由已若誠則之事傳諸方來簡編焜燿矣宜其嗣人文學起家出宰百里首途如此致逺可知况長洲又懼其先徳之湮録埀後𦙍其賢又可知矣天恒報施善人扵兹其可見哉題周草忩畫像卷宋運既徂呉有三山鄭所南先生杭有弁陽周草忩先生皆以無所責守而志節不屈見稱前二十年時獲瞻所南先生像扵呉門唐氏所南孤勁嚴峭有凛然不可犯之色觀其終身未嘗北鄉而坐可概見焉今獲瞻草忩先生像扵長洲沈氏草忩豪偉秀逸有飄飄邁俗之氣觀其自贊之辭可槩見焉二先生姿韵雖殊要皆介然特立足以增亡國之光者矣晚生後學不得親接其言辭風範扵當時乃獨扵其遺像以想見其人可勝其歆慕也哉沈氏字伯凝家多法書名迹而尤寳藏此卷云重光作噩良月丙午望題彛訓堂手卷學校之設天子之政也學校之教聖人之言也聖人之言豈出扵天理之外天子之政又豈出扵聖人之言之外也哉衍洪範者曰皇極之敷言是彛是訓扵帝其訓凡厥庶民極之敷言是訓是行以近天子之光嗚呼天下之常理天下之大訓非學校扵何以明耶學校既明之則庶民是訓是行之效可致矣此金侯子肅所以扁其縣庠之堂爲彛訓也侯用儒術起家出宰百里觀其名堂之義可以見其報本之學矣題張繼孟所藏歐文後余年十七八始獲厠迹士林中日從先生長者之後時張君子昭已六十歳矣君家多藏書㳺道甚廣大夫士咸禮愛之丙申冦攘書多散失事既定君子芸已漸復購収幾及扵舊而欝攸盡取之矣芸已没子肯繼孟志復収書一日持此卷來告余曰先大父四十四年所裝書也手澤存焉蓋散失後先人未及収者今得之矣噫書之存亡亦有數乎使已収之則既燬矣以不幸不得扵當時乃幸得存扵今日豈偶然哉繼孟能不忘其先購得而喜其亦賢已因書以識之題蓮峰易先生墓後右番陽周公伯琦為廬陵易恒書其曽祖蓮峰先生墓表篆書一十二正書二十六初恒既得此書兵亂隨失今復購獲之且勒扵石而裝禠其蹟為卷徴余識之按蓮峰名斗元字復之一號太初𦵏崑山之南與劉龍洲墓東西相望嘗觀其家藏宋進士野水陳諤詩以為蓮峰才氣絶似龍洲同爲廬陵人雖先後不同又皆年五十三而死所藏相去復甚近故為一詩以弔二墓云嗟夫龍洲雖自負才氣遨逰諸侯間竟放浪無所成晚家崑山無嗣以死至今荒塜埋没荆藂野蔓中遽欲尋而不得先三十年時有守是州者嘗爲表之而人亡政息石旋以仆今蓮峰身没百年乃有曾孫能扵艱難困踣之餘成此大事亦可尚哉是則才氣鄉里夀年三事蓮峰可同扵龍洲而有後一事龍洲不得同扵蓮峰矣嗟夫蘇長公云世事皆尋常惟有後足以慰意其至論耶錄絳守居園池記而題其後唐樊宗師作記所以紀事其義必因文以逹之蓋欲人之知解也而務扵怪僻晦澁其辭使人讀之不能了了又豈爲文之法哉若絳守居園池記是已韓子稱紹述扵辭大得又稱其文從字順必非指此蓋言其所謂三百九十一篇之類耳惜乎其未得見也此記觧不解非學者之急務然今録其本者欲因其已見而冀得其未見者也題趙子昻畫卧雪圖袁邵公雪中閉户將何所求令之造之固無加損扵公亦無加損扵令也而遂相傳以爲美事美時之可尚耳或者又惜令亡其名亦不煩惜也使公與令聞余言當相顧一笑既畫之八十四年澹如王行題扵翠巗而下十有六人之後題陳子貞楷書後古人自待之重恒扵其所為見之不在事之大小也明道先生作字時甚敬而荆公書每如出匆遽中荆公非自待之輕者而爾雲谷叟所以謂其不可曉也此即是學之訓後世惟當確守哉貞翁此幅可謂能守兹訓者矣題白庵卷白之爲色一也而古有堅白同異之辨君子蓋無取焉然孟軻氏乃謂白羽之白非白雪之雪白雪之白非白玉之白何耶其㫖則有在矣今夫白羽之白白也黔則見其變焉白雪之白白也釋則見其亡焉其白固足恃乎惟白玉之白也磨之而不磷湼之而不緇不緇不可使之變不磷不可使之亡不變不亡則其白也斯可謂之白矣時仲以白名庵其義果安在乎噫時仲儒者也其必得孟氏之㫖哉半軒集卷八
