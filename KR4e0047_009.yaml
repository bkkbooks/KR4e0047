body:
  text: 半軒集卷九明王行撰墓志銘陸均序墓志銘均序諱庠姓陸氏均序字也蘇之吳縣人祖諱某妣陸氏父諱榮妣姚氏生元統元年二月庚戌卒洪武十三年九月辛亥年四十有八娶唐氏丈夫子五曰鑑權濟煥垣女子二曰住奴小奴孫男一曰靈童唐氏暨垣先卒卜以是年十月庚午合唐氏兆葬縣之靈岩鄉山桃花塢之原其將葬也鑑以狀來乞豫銘豫于均序蓋未之云識也而鑑嘗從豫友遊因鑑而推其所自固以知均序為可銘焉且夫富樂耆夀人之所願也又未若有後之為至願者蓋樂夀僅止其一身而子孫乃繩其後胤繩其後胤吾宗其衍矣今均序年幾五十非夭也寢疾以殁考終也而復斂以禮而葬以時子孫冠衰哭踊哀送人而至此亦何憾哉銘曰少年浮湛同里閭壯而自振事乃軀鋤荒剃薉忘勤劬灌溉瘠磽成沃腴瀼瀼雨露爰復濡有秋遂底充偫儲罔云自怠異厥初根培坻壅固爾株由來禮儀興有餘長子挾策從師儒含飴抱孫蘄晚娛天畀至止迷其衢吳山蒼蒼蔚杉櫧骨肉復土魂遊虛幽堂永古諒不渝有銘在刻其徴諸宗處士墓志銘處士諱本先字景明姓宗氏先金華人宋名臣有贈正議大夫觀文殿學士諡忠簡諱澤者葬京口之馬鞍山其九世祖也有朝奉郎通判泰州諱如圭者徙潤以守先塋因占籍焉其五世祖也有知光山縣諱有大者其曽祖也入元有句容尉諱彛平江路録事司典史諱昌者其祖其父石其母氏也處士始由丹陽侍父來吳居吳者餘五十年年七十有四以卒實洪武十四年十一月癸卯也娶陸氏子男三人曰某某皆先卒女三人曰貞寧夀寧適陸某先卒夀適衛某貞適李勤勤有孝行良于文卜于某處某山之原以是年某月某日奉處士葬狀來乞銘豫與處士雖居一城而相去不能近然時一相見接其動容辭氣亦足以得其人也處士性恬易為事不近名守已有方足迹未嘗為勢力造諸毁譽戚欣時委之酒不膠其志于得喪環堵之室几榻蕭然泊如也通易春秋旁及子史百氏究探義理老不少倦早獲知于虞翰林集授以為文辭法故所著述不違矩度尤深于詩今所存凡若干首嗚呼處士有足銘者已銘曰忠簡之業史編赫然忠簡之藏潤其永傳徙家守塋泰州府君潤之有宗金華之分丹陽潤邑處士攸宅從父宦吳遂從吳籍餘五十年棲遲衡門義理簡編咏歌俎尊語隱顯焉雖以時異學行之求無忝先世命數有終寧復茍延手足既啓歸之以全卜吉于原有溫其土銘爾幽室允兹終古許能翁墓志銘能翁諱運字榮逹姓許氏能翁人稱之也世為蘇人父丕之母聞氏生元大德丁酉年八十二洪武已卯十月庚申沒翁朴厚無外飾早失怙恃艱勤業食與衣不得事于學然知學之必當事子之必當教觀右腕骫攣不為用翁曰汝支雖廢心目固不廢宜從儒先求知為人之道無復類若翁也觀因得日隨士君子杖屨遊學庸而進居闤闠中甚隘一樓廣不能踰常而汛掃殊潔才人墨客至其上翁時致殽醴令子將勤敬意客有狂者髙踞濶談縱肆無忌翁令曲意順之客知亦懼而悔且歎曰翁能事乃爾耶能讀如耐謂忍事也能翁所以稱焉翁少而壯未嘗識官府門衰而老未嘗出城郭門惟惴惴以虧體辱親為懼然事遇順逆亦不易以戚易以喜鄉里人卒自謂弗如是弗足稱能也已翁之配仇先八年卒子男一即觀也女二哲適吳智適孫孫湯隂主簿諒也觀卜以是月壬申奉翁葬吳縣光福里鄧尉山之原而仇合祔焉銘曰古稱有容斯德之𢎞繄學者之功今翁能耳實容之邇繄其質之美惟能之為詎特全其歸子復賴而子賴伊何後彌克揚邁古之藏永固以藏猗惟翁之光元故蔣處士墓碣銘行友蔣君卒之明年其子男辰復以病死行痛傷之嘆曰天胡忍于君如是極也謂天不與善人耶仁者必有後以君為非善人耶君固未嘗為惡也天胡忍于君如是極耶君未殁時以行有忘年契引辰示行曰瀕老得子計不能自教是兒成立有望于吾友焉行曰史稱嘗活人者後必大君活人多矣何憂于後乎於戲今辰乃死史為無足信已君之殁也行亦方病甚弗得治君喪及起往奠之其家已用浮屠言燔君匶而沉其骸矣行大悲恨然不可奈也因思惟督辰有成光其先業使君無恨死庶塞區區責耳寧意辰今若是復何望哉雖然茍勒石著銘表君之行義以昭于後使君不終泯泯猶可以少紓責乎而是也行何敢怠焉于是舉君之槩謹序次而銘之君諱國光一諱太嘉字仲賔江隂人曽大父某大父某父某字清之卒官建德郡從事母某氏建德君深于醫又善越方能著物虛空中不墜畫禽鳥壁間令翔舞使鼎中物蒸蒸自熟可啖君欲學之建德君曰特狡獪耳醫有活人功是可學也乃出書授之朝夕為講究其要君醫遂洞精矣後來吳人未之竒也有老兵行泣道上問之曰子為魅所憑莫能治死也君為往視病子方裸踞瞪目大詬且驅人醫不可近君歎曰易與耳即令其家兒舍後斸大蚓數十爛搗投水中去泥以水遙示病者病者見水遽起持飲未盡隨薾然卧更與藥㵼之愈里人大驚從是有聲矣吳醫葛乾孫通敏有才辨數愈人竒疾名甚振松陵人父子俱病君與共診之葛曰父可起子法當五日死君曰父夜半死子明日午死葛不信從衡難君君但唯唯是夕共寢其家夜半父昻頭須粥葛蹙君曰死猶能食乎君不應粥未就果死明日中子亦死葛大慙服一豪家奴病傷寒期月體兢兢而振齒相擊不能成語醫環視束手君後至呼曰趣取羊肉來群醫咍曰傷寒大忌羊肉也君曰諸君苐母言以羊肉斤許熟之截取中大臠别用水鬻良久取湆一升啜奴戰止汗大出愈其術異于人皆此類君性剛然慈愛人疾家貧不敢致君君自為治富家來迎或小拂意終不往是以全活甚多而家不益裕君嗜書老未嘗倦所著有傷寒疑目活人書正訛傷寒鈴括親驗方等數卷至正十七年三月卒年六十一娶某氏女二長適某次適某男一妾某出即辰後君十四月沒又一月始勒銘樹君家祠中當明年五月也於戲以君隂德之多揆理之常宜昌厥胤顧至于無嗣焉何也豈理或多變而不常乎亦有適然而不由于理者乎何他不逢而君獨逢之可哀也已可哀也已銘曰善而通天所與兮惡而窮天所阻兮伊理之常吾所據兮惡而休其躬善覆羸于凶吾將孰從吁嗟君邪適離兹邪爰刻我銘慰君之悲邪呂府君墓志銘君諱梁字某姓吕氏其先世為唐著姓代有聞人自許國文穆公蒙正以相業顯宋淳化咸平間宗族遂蕃盛世居開封後五世有安者避靖康之難始來安豐之霍邱家焉霍邱生贈太傅青青生志暉及全志暉某官全贈太師太師之孫文德當宋季以材武立大功官至少傅武寧保康節度京湖安撫制置等使封衛國公其族益昌大而某官更二世至武義大夫諱文旺于衛國為再從兄則君之曾大父也武義生武功大夫閣門宣贊舍人兼司選舉統制官諱師才以守江州歸國朝獨後官止明威將軍管軍千户使將泰州故今為泰州人明威第四子諱君鑄妃周氏實生君君生長富貴家不事生業日馳馬從犬鷙擊獵為樂然遇人能敬謹視下慈惠因得人歡心亦頗好為義鄉里有急多赴之伯兄果早亡有子珍甫睟君鞠育教誨期于有成而珍倜儻豪縱不就羈束雄藩巨都足迹四至嘗逰燕趙歸不時君恆戚戚蓋憂其兄之後也及珍貴顯歷官江浙樞密行省兩府為外宰相養祿之崇君皆及享之故晚年之樂尤優遊而自得焉至正戊戌三月壬辰以疾卒于吳年六十三娶薑氏子二良彬良杰女一佛奴孫男一思讓珍與良彬卜兆長洲武邱鄉大梅墩之原將以是年四月庚戌奉君葬來乞銘銘曰有巨之宗曰惟吕顯于宋初國封許自兹以還纘厥緒衛國之功肖伊祖事業之殊文與武時安若危亦異處衛國從兄為武義後入國朝者其子明威之官襲兩世君雖小支實其系生逢太平承世貴䇿良駕堅適歡意晚年之樂猶子致蓋食報焉良有以天年告終其定數體全而歸復奚慕武邱之原瘞斯固我銘諸幽期永古亡友王君墓志銘至正二十六年夏六月三日余友王君仲亷卒渤海髙季迪來告余相與走其家哭之有嫗抱嬰兒牖下余顧之益悲初仲亷病臚鼓每作輒困劇嘗指其女璚哥謂余曰不幸無子又病若是即死是能繼吾宗乎語已泣下余慰之人孰無病病須愈子年甫壯行有子無憂越三歲而嬰兒生仲亷喜抱樂余曰果如子言吾胤幸不絶可無憂死及仲亷卒兒生才十有六月嗚呼天既畀之而復靳之不使之見其有成人豈非命哉仲亷母甚老子甚幼若不能無遺恨然母老諸兄賢可養子幼家有産可恃以育而長微兹二者冥冥又何如恨耶後十七日其兄伯時來請余二人曰某之亡弟獲交于二君也久知之無深于二君者合以某月某日葬某所某墓非二君銘誰其銘敢請余辭季迪曰伯時言是也然我識仲亷久于子子宜銘勿辭按仲亷名隅仲亷字汴梁人曾大父諱某大父諱某父諱鑄咸匿耀弗著母某氏娶郭氏年三十有五女一即璚哥未筓男一即嬰兒名瓊林仲亷性至孝有才氣先習舉子業未成棄去用其才為古歌詩疏爽新麗多見稱于人觀其論議言説蓋欲有所為使其聲流于後與古聞人侔不獨詩也學且進而病作竟迄于死悲夫銘曰賦其才乃抑其施豫其後而奪其夀天乎天乎斯莫究醫學正周菊所墓志銘菊所姓周氏吳人菊所其號也髙曽本由武辨顯至大父洎父皆讀書事醫為業始以儒醫名菊所因復仕為平江路醫學正大父號菊圃父存菊故菊所之號以紹其先焉周之著于吳自宋迄今八世矣言鄉邑舊家宗族之蕃必及周氏菊所實為之大宗其家城西南畤髙閎大居閭里相接歲時合族昭穆在序冠裳簪珥堂室爛然而菊所雍容怡愈仰承俯恤稱其所以為宗子者雖沒猶能入人想象也菊所之嗣曰瑾尤兢兢善振飭常自言大宗在我能無砥礪乎因亦係菊于巖以自命其志可見已古多隂德者後必大醫固多陰德周氏其當益蕃耶洪武十九年冬十月瑾遣其子黼致辭于余曰瑾不幸失所怙者十五年矣先人斂五日而報葬銘有弗暇為也兹重不幸是月丙戌母氏又亡將以甲午祔于先人之兆瑾方衰經苫塊禮弗可違敢泣血稽顙具先人行實令黼請銘焉嗚呼欲銘而父母乎雖靳弗之能靳矣按狀菊所諱繼周字仁之祖諱子華考諱觀光妣初再皆陳氏生丙申正月丙申卒辛亥八月辛已年七十有五娶鍾氏繼室田氏鍾年幾十有幾先卒田年七十有四今卒子男四長即瑾次琰璵琬女五壻曰朱中張忠禇彥盛榮劉序孫男四黼黻冕金陵狗女三曾孫二吳縣至德鄉沙涇村之原則周宗之塋域也為之銘曰德積于陰人弗能知而亦不自知也于子孫乃始見焉周氏之久而益盛其見者乎袁君載云利人而人不知者必受其福斯言有徴矣菊所之藏其終古哉洛下邵君墓志銘君諱光祖字宏道姓邵氏由康節居河南運使葬犍為監簿來番易七世三遷而為江東人監簿諱潛曽祖也其諱德初祖也諱信父也母氏則華焉父宦于吳從遊吳頗久故雖交道廣而江湖無定居然熟吳人為多而視吳猶家也性夷易無勾曲畛畦于人不事迎合亦不致忤好讀書求義理不厭有得樂以教人或迷于它岐必諄諭振挈歸之于道生七十五年矣洪武八年夏六月癸丑時主城西陸安氏天劇暑方病熱稍間聊出焉頃即還曰我躬兢兢寒不能支何也安為速醫至已伏枕汗大寫如溉醫視之曰不可為已遂卒娶沈氏再娶輒死竟無嗣謀其所以葬者皆其友也有徐左嘗館之于家至是曰生吾館死吾葬塋兆吾責也李敬嘗從之遊至是曰生吾不能盡館之道死吾當奉其主也謀定卜日得七月辛酉卜地得吳縣光福鄉鄧尉山之原謀其葬者相與來乞銘銘曰因其友以見其為友因其弟子以見其為師有諸已者如是獨無後也何居已而已而厝于茲噫學齋張公墓志銘學齋諱畦字藝已姓張氏嘗以種學名其齋人因以學齋稱學齋之先家汴有官御帶者女真亂華時以其職渡南遂為吳人祖杰官秉義郎父雯不復仕以儒業居家富于書尤多竒志僻傳故聞見殊該洽學齋幼服庭訓不懈于學攻文辭通胡氏春秋資性恬夷于物少致忤以道義自適每賔朋過從情與勝遇輒熙熙然晨夕一日謂余曰獲承先德蔭庥棲遲文墨忽不自知今年之為五十又一也曩之所懼以先配無嗣今再配之子已冠而昏後其有望矣噫孰知其言無幾何而遽死乎洪武十九年學齋之柩在殯歲星一周已而再配朱氏卒其子肯卜地于縣之太平鄉姑餘山之原將奉二柩葬具狀來乞銘學齋余友也銘可辭乎狀稱歲甲子十月辛酉甲寅八月壬寅學齋之始終也歲癸酉六月辛已丙寅十月乙已朱氏之始終也朱氏終之八日壬子則二柩之封日焉嗚呼張氏易武以儒傳子洎孫迄今無少替所謂後其有望者是已然肯也不惟是也又有克孝之聲焉亦由學齋能奉其親故也子父繼以孝聞其不可尚也夫其不可銘也夫銘曰惟梁有張遷吳以居武辨之雄化為文儒文儒之教父蹊子蹈既纘厥家復踵斯孝姑餘之藏允固以藏繩繩來嗣伊孝不忘徐文質墓志銘洪武丙辰三月癸已姑蘇徐文質氏卒其孫本踵門告曰遘罹閔囏祖考傾背實不肖纍夫復何言惟吾祖之殁也生八十有九年矣而鄉黨宗族無不惻愴悽斷惜其逝而不留者蓋吾祖資性平夷內無隱蓄思輒見于言為事徑情鮮勾曲計慮故人多信之久復致懷也人也懷之如是為之子孫者如何且吾祖之生遭家浸微早亡所怙恃能自樹立力于艱勤迄有今日也不然後人將何賴哉兹兆既卜吉矣本因自思其氏繫里居死生歲月固所宜慎然其必當示諸子孫而不可泯者盍亦致其慎也故徴諸文筆發焉敢拜以請嗚呼本之言可謂能知本者也能知其本情在可嘉不得而靳之矣按狀文質諱彬文質其字世家吳居善藥以輔醫術考諱叄妣蔣氏娶盛氏先卒子曰肅義哲謀時孫男曰瑛瓚本珍謙祁進瑺珣南瑋瑋為將仕郎衡州衡山丞女曰英適王旬芬適王琳芳適雷原蘭適張仲楚蕙適邱進蘩適盛繼先曾孫男某某女某某子若孫凡三十人而早世者肅謀芬蘭在逺者義瑛瓚謙祁珣居官者瑋其生元至元二十九年壬子其葬是年三月丙午其兆則吳縣胥臺鄉黃山之原也嗚呼徐氏其將益蕃乎觀于其孫子可知矣蓋夫人也得于天而幾于五福者雖難猶易也至于既與之安富以樂其身復與之子孫以蕃其後則豈易而得哉若徐氏也可謂不易得者矣乃銘曰勤而有謹而守介其夀蕃其後人之然兮天復厚繄銘爾藏斯永久沈茂卿墓志銘茂卿諱森姓沈氏茂卿其字也世吳人祖富父榮妣葉生元天厯二年蠟月壬寅卒國朝洪武九年如月戊辰年四十有八娶程氏子男一人經女二人德徴德徽卜葬地得吉于長洲縣尹山鄉長山之原卜葬日得吉于是年菊月甲子將葬宜志以納壙中遂志而銘焉銘曰嗚呼茂卿其沒也耶茂卿之病也為之孥者曰胡苦吾家翁耶寧吾病毋病吾家翁吾懼吾無以依也為其交者曰茂卿友道不薄也雖偶嬰于恙善可恃其必有瘳矣其父兄者曰吾兒非常兒倫也其于親也篤矣天豈固疾篤于親者乎年甫爾可無憂也嗚呼考諸其孥言是能慈者也質諸其友言是能信者也其父兄之與之又必能孝弟矣况夫迫者之歸之為紓其難匱者之告之為濟其急耶嗚呼今死矣果何如也耶蓋可恃者理之常不可恃者理之變理之變始見其命焉嗚呼茂卿之死也是非其命也夫是非其命也夫先君墓志先君諱懋字盛甫世蘇人姬姓王氏也歲在甲子為甲辰月在時為冬仲日之幹為丙支同乎其歲此其生之始也距生之始年七十有二歲卯月酉戊子朔其生之終也筮葬日得吉于是月已亥筮葬地得吉于吳縣靈岩鄉橫山之原娶羅氏子二長行次濟濟先卒行不肖孤也嗚呼不肖孤弗克自修愆郵深積罔極之恩莫報而凶孽延于先人可勝痛哉且先君子之德非不肖孤口之能易陳筆之能易志不敢置辭于間也惟其歲月不可不謹故托諸堅石焉嗚呼痛哉痛哉不肖孤行泣血謹志沈榮甫墓志銘榮甫姓沈氏諱榮世為蘇之長洲人考富妣曽生于元大德十年春正月閏之甲申卒于國朝洪武九年秋八月之壬寅得年七十有一娶葉氏先卒丈夫子二長森次彬森先七月卒女子四德淑適何德美適張德儀適周德誼適錢皆同郡也孫男三經綖紳女二徽徴以九月甲子葬尹山鄉長山之原鳴呼榮父考諸其鄉蓋所謂善人者矣初榮父之先君子遊于故侍講袁文清公之門公每嘉其敦信義時楚之長沙攸縣人馮子振方張聲譽號海粟以文翰自矜許來吳必主之深加愛厚為大書積善二字殆以表其志也及榮父持家政乃築堂構宇以馮書揭諸題間既以承大先志又以朂其後人是足以見其好善之心矣故得優遊暮年克享耆夀夷然委順全之以歸亦可以無憾矣宜銘曰好善人之所同為善吉之所鍾吁嗟而翁繄善之從天年既崇全厥終銘辭永古昭幽宫湯碧山妻范氏墓志銘范氏吳人魏國文正公十世孫也生而秀慧長儉勤自持父為擇歸宋大理少卿瀏陽湯公六世孫碧山先生名儒也以名門女女名門人思觀德然其禮法素馴又益修儀度賢聲斯著矣既而養子納婦抱撫孫甥而偕老君子士友閨門槩則焉年八十三洪武辛酉八月庚寅朔以疾卒筮得某月甲子祔先塋于長洲縣武邱鄉震山之原子完來以銘為請銘不易為也然豈靳于名門之懿耶因遂閲其狀焉狀云諱伯愚字元魯考諱文英元教授吳郡祖諱邦哲宋司法淮安軍曽祖諱慶宋知循州軍府夫名郁子名允名勉名完孫名述名近孫女名某曽孫則某某也銘曰慧女賢婦慈母夀祖天畀人修兩無負歸諸幽允終古全仲莊妻趙氏墓志銘伯趙名宜淑汴人其先宋宗室也穆陵入繼大統封母弟為芮福王國亡元授王金紫光祿大夫檢校大司農降封平原郡公實其曾祖也公生孟桂中奉大夫檢校大司農平原郡公其祖也中奉生由珤奉議大夫知濰州其父也曽祖妣秦國夫人黃氏祖妣平原郡夫人吳氏妣夫人馮氏伯趙生貴家能循姆教年二十歸京兆全璧璧字仲莊穆陵舅氏贈太師封昌王名越之元孫也昌王昭考追王于越名某生慈憲夫人及王慈憲適宋室越州會稽尉名希瓐是為榮文恭王實穆陵所自出也昌王之子贈太師封和王名昭孫生女又配紹陵為仁安皇后而紹陵實生于福邸則全趙之昏舊矣今趙乃復歸于全也全氏入元貴盛少衰而禮訓弗替伯趙處閨門堂室間殆無違度而教子有母道焉吁有自哉歸全三十有一年當洪武三年二月壬戌上推其始生延祐七年十一月壬寅為年五十一而卒子三人從善從義從禮女二長適趙文次在室孫男二某某時方僑乎吳不克歸葬會稽先塋之次以十一年之蠟月庚申厝乎長洲縣陳公鄉上苧瀆之原銘曰以懿之姿生于貴族以懿之訓成其婉淑生有其質訓復文之婦道母儀鮮􅑯厥施鮮􅑯厥施克相夫子子以洎孫永延于嗣苧瀆之原以固以藏永兮終古銘昭爾臧張仲良妻周氏墓志銘周氏諱性端吳人父諱謙母許氏延祐庚申八月甲戌生生二十三年嫁為同郡張仲良妻妻仲良四十六年年六十八卒洪武丁卯六月戊戌也子男二曰堅曰介女一壻錢衡孫男基女媛以明年四月辛未葬吳縣靈巖鄉南周村之原從吉卜也惟仲良資性和易處鄉里以善人稱而內贊之賢往往在人口耳子堅于父亦殊肖子介家居時兄弟之相親愛怡怡如也及介以儒學起家為荆州護衛知事勤于其職美之者必原其父兄家法之懿而母夫人之助實多焉仲良夫婦年相若而意復相順桑榆之景歡欣夷懌人方羡之而疾竟不起矣嗚呼傷哉雖然死生晝夜理之常耳矧年登七帙享榮養者幾十年逮夫歸全夫子婦孫慘怛哀號頎乎其臨竁人生至此宜無不滿意矣系之銘曰夫與和我柔為之婦子與孝我慈為之母彼禮彼之施我道我之務此生之養也榮而殁之藏也固幽扃既安古復古全士宜妻張氏墓志銘京兆全士宜妻仲姬諱靜圓其氏張也張氏無别系一出晉公族蔓延東南在吳為尤著仲姬今長洲沙湖人也祖諱祐字吉甫父名裕字裕卿仲姬生慧悟事多領解動止輒得翁意指既長翁益愛之為求佳子弟為之壻得士宜遂妻焉妻士宜八年年二十三生一子觀矣洪武八年已卯正月二十七日病卒庚辰蠟月二十八日葬縣之陳公鄉上雉瀆之原全氏先塋之次也嗚呼惟全氏宋后家族既華貴雖再易代至今為名門家世相承皆安守順處故士宜殊巽順而仲姬之夫夫婦婦則固良矣顧乃年命不延遽然殞瘁可哀也夫銘曰時陽春兮嘉卉蒪曰有儷兮同厥荂儷伊何兮匪庸彚前朝戚里兮今名家叶惟根柢之厚深繄柯條之發舒沭雨露之芳潤滋膚理之鮮腴夭夭其姿灼灼其華並乎夕秀齊乎朝葩倐霜霰之載加遽一生而一徂徂云已矣生其奈何悲霣珠于淵泉傷委玉于泥途考之彭殤短修自殊爰有命爾詎人之謨雉瀆之原已厝先姑既安且寧其從與居沈氏幽堂豫志銘姑蘇沈經思則家長洲之尹山和易端謹人也恆服先人之訓慎默無易言家素修于禮户庭之間雍容怡愈而靜密嚴敬嵗時儀度內外秩秩思則自幼習之以故親禮賢士夫彌復周謹君子嘉焉自其祖父繼沒年甫十六七固已力持門户人以為難能黽勉自程有舉無墜雖云先德所施理宜有在而其勤敏淬厲克自樹立亦可見矣已而竟以體故罷羸不任憂勞之交至而嬰況痼之疾焉洪武二十一年春思則于是三十有九矣來告余曰經之獲親杖屨也久每竊自慶今疾勢日強度終不可為已為身後之營矣昔祖禰之藏咸沐志文之寵足以為不朽之託經如不起當從先兆之次先生必憐而畀之銘然及其微息尚存使得一瞻夫濡翰斯含笑入地矣豫聞而興慨因謂之曰觀子之志豈欲豫銘其藏耶言未既思則歡然興之曰茍若是則他何所復望哉嗚呼思則其誠逹者乎逹者之志則吾固當成之矣遂不辭而為之銘曰惟楚葉公原夫氏之祖也大父諱榮厥字榮甫也諱森字茂卿氏程氏章父而洎母而少母以祔也娶徐繼金六禮所嫓也徐生曰疇沈宗之胤緒也至正後庚陽月壬寅繄其生之初度也揆理之常夀未渠央迄莫違于定數也原始要終若旦夜然生不諱死之故也長山之原實惟先塋他時之所當祔也銘後幾年嵗某月某日某于焉以安厝也土之亢而溫閟之固而深日吉辰良其終永祐也唐氏夀藏銘吳闤闠之居有唐氏焉好藏書多竒僻傳記雖去豫家亡數里而時造之其善豫者曰自牧氏自牧名允謙性簡直審慎交際而于豫則未嘗留所藴蓄也間嘗談其先世之盛族屬之賢而詳及其祖東嶼翁之學行不覺起豫之遐慕焉及自牧遷家濡溪方懷之不置而豫友沈起宗氏為其外兄子髙甫持事狀來徴文銘其所營之夀藏閲其狀正東嶼之孫而自牧之從兄也豫因詢自牧近候起宗則致子髙之言曰某之家世載蘇之版籍舊矣髙祖而上逺難遽考其得考者曽大父子男三人大父子男四人而某之伯季數亦至五蓋非單弱之族也變更以來日替月陵庶系旁支益就澌靡故大父之遺體惟自牧與吾自牧雖二子得孫輒失之今在逺亦死矣鄉里所存僅某一身胤嗣無涯而年幾八十朝夕相依老夫老婦而已茍不豫以圖之一旦斂手足形歸復于土而世系蔑聞則吳門唐氏非特其人泯焉其聲亦斬焉絶矣兹勉襲趙臺卿司空表聖之遺矩兆竁已成敢乞為之銘以埀不朽則某之至願也豫一聞是言三復悲歎既傷自牧之永逝又善子髙之慮逺遂不辭而為之銘按子髙名允升曾祖居士諱某號默庵祖省元諱士昌號東嶼父諱良知號菊莊母孫氏妻龎氏名貞靜子髙生延祐乙卯某月某日今年七十有六龎氏生泰定丁邜某月某日今年六十有四其兆在吳縣胥臺鄉梅灣之原蓋卜吉也豫聞子髙之為人以約自處以信自守蓋亷靜端慤而詳雅者也今以其言質其所操誠相符矣龎之歸唐不及事其姑而克事其舅于夫婉順無疾言遽色所謂朝夕相依真事實矣他日合而藏焉禮也銘曰身之光繄惟全而藏系之久金石茲弗朽原之亢而水深土之溫而氣厚竁以閟之安爾夀半軒集卷九
