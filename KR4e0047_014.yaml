body:
  text: 半軒集方外補遺明王行撰素軒燕集詩序乙卯冬孟未竟之十日予與錫山包撝士謙東海徐理伯循婁江孫敏惟學訪宗源上人扵普光精舍時寳積律上人有章在焉因與共宿素軒之下談茗之餘以韋刺史慈恩清會詩屢招清景賞句折字分韻各賦詩一首予以不善詩獨得偷逸兀坐清聽幽吟㣲哦不啻如壎篪之和琴瑟之清也詩就繕寫成卷俾予題其端夫人之扵學頃焉之不可怠也然不能無㳺息之間焉㳺息亦未嘗非學也諸君子年富學勤厲志自修奮焉逺至蓋未易量兹而一夕之清暇猶不敢廢而相與道其性情之正良足尚已二上人髙蹈方外亦不肯自放要之蓋可嘉也他日道昌文振當起大慧日之思矣遂爲序既望之而復勉之云送福僧詩序予友浩師宗源學勤而業精守専而行峻在其法所當與之也故流輩咸致禮焉其所與㳺必皆端人人見與之偕者已信之曰是必端人也不然肯與之友耶初宗源之從予逰也為之介紹者實予所信愛其言曰宗源非他浮圖比見之始知言之不妄及見果然則宗源之取友必端固不在扵今其所從來久矣今年春予過宗源寳幢丈室有陪談扵列者朴厚而莊慎問之曰今座元要福也予已知其必有取也不然寧與之交乎越四月福持卷來曰大夫士辱不見遺扵福多詩以委教兹已成卷願謁文序其端予益信知之不誣也今夫棘雖小亦棗之流匹雖短終鵠之類有恒者雖或未至要善人之徒也福之見稱扵大夫士者豈非以其能際接扵宗源也乎宗源之見信扵人向之所云也然即宗源而法焉則他日之見稱扵士大夫者又有甚扵今日者矣其勉之哉其勉之哉送伏上人序吳有萬歳報恩寺肇基扵孫氏有江東時扵今蓋舊矣寺既為呉勝處湖海大夫士之入吳者必訪古而至主者宣師無言厖眉古貌動止閑逸故名人大卿得交焉嗣之者曰聚師白雲實宣之弟子克治其業以其坦夷冲融復多繅繪户庭之屨無俗塵者人皆曰宣師如在也迄罹變更聚族化去寺亦衰歇大夫士之復至而交宣師者未嘗不思宣師交聚師者未嘗不思聚師也白雲有孫曰伏師虎林郡之士家子也聪慧而敏方其少時屢從君子㳺余每與聚師談虎林聞輒解固已知其非常器矣中間違别頗久而知其為詩章文詞其前已自喜知之不妄也一日與會扵普光招提主招提者浩師宗源因出虎林所詠卷軸甚富讀之令人益喜不覺發嘅何啻當刮目也宗源曰虎林已出世久矣余聞而益嘅聚師亦豈亡哉自是見之雖不能數而懷之則不能不數也今年春呉江無礙方虚席藂林疏請虎林住焉其所交㳺咸賦詩送之徴余爲序今夫大夫士父子繼世有聲人皆以為尠至扵三世而不替蓋益尠矣由宣師至虎林非三世乎雖所處之地不同而聲譽之著繩繩如此非所謂良尠者耶且士大夫有骨肉之親猶難必其繼世之善方外之士以其法相聚而其善不止扵繼世焉豈不可尚也夫豈非良尠也夫送在别峰序呉城西北陬有天竺氏之居焉古稱重𤣥今為承天能仁禪寺入其山壤地寛袤面勢闓爽觀其棟宇之宏壯搆締之精宻莊嚴丹碧之華縟而明麗在他方盖不多而扵呉則僅有也其山如是則住是山者必與是山稱乃合樷林之輿論故能仁之主席不易登而登者必衆之所與也衆與之矣而又有不易處者焉蓋呉城為東南會府而寺當道路之要衝有夏屋可居以安而無恒産以資夫朝夕夫府爲都會則湖海之往來者多寺當要衝而屋堪以安息則瓶鉢之經行者必至瓶鉢之經行者以至而顧無所資給焉則爲之主者將何以爲也邪此所以衆雖與之而不善扵自處則亦有所不易也沈士常予友也一日爲同里閈者廿八人之介而來告曰某等皆能仁之隣也别峰在禪師之住是山六年矣始至而衆歸既久而神䕶足以見其操履矣庫庾之資雖無所儲而瓶鉢之至者無虚返棟宇之多雖不能無隤阤而修葺者常周完足以見其世縁矣某等日所因依幸多開益既而忽謂曰天界京師之重刹也其前堂之請濫及度不可辭兹席盍今退耳某等聞之如失倚賴因而自思師往矣某等扵師之崇重雖讚美而莫加若心則不能自己惟先生之文雅足發人之所藴願一言以著明師之所以爲師者而致夫舊山泉石之慰焉敢請於戲士常欲予何發乎然予家呉城嘗見夫能仁之舊今亦良爲不易矣而别峰一住者數寒暑其間周旋補著治已接物雍容紓徐若不見有不易者非所謂善扵自處者則藂林之與之四衆之歸之洎夫士常之爲之介者需文以發揮而屬望之亦固有所自哉且夫人情之不可以力致者趣向之誠也挹焉有莫之前撝焉有莫之却也今方外之士守其空無乃有依之親之而弗之舍者則别峰也其必有可依者夫其必有可親者夫所謂二十有八人者曰吳興沈起宗隴西李仁善玉峰劉世用清河張孟恭某郡某某名庸即士常也洪武二十年六月序送恭上人詩序欲學之成者必歸依乎碩大之師欲名之大者必徃造乎都會之地蓋碩大之師乃衆善之所宗都會之地則四方之所萃也茍㣲衆善而徒有一節之長非都會而偏扵一􅑍之地則不足爲吾之歸往矣或率然而歸往脱不墮扵孤陋寡聞者幾希尚能成吾之學侈吾之名也哉此欲名而造都會之地則猶乘髙倚順風而疾呼自足致其聲之逺欲學而依乎碩大之師則猶璞玉遇良工之追琢自足以成其器之美也信中上人乾竺氏之良也居海昌黄岡之太平寺研窮内典功已深厚以爲未足乃出鹽官越檇李至吳淞之滸從融室翁講習華嚴教觀有登堂嚌胾之聲今年夏姑蘇萬歳報恩辟為懴筵之首予始識之質清而氣和業勤而行勵華實誠相副也扵是藂林之老成江湖之耆耋無不善之信中之聲益四馳矣茲秩滿告歸所與㳺咸賦詩以餞來徴予文序之於戲信中其所謂知所歸徃者乎蓋融室之爲師碩大之師也而能從焉報恩之爲寺都會之地也而能至焉則其學之成聲之逺亦宜也哉且今報恩素軒講師實融室之親嗣其㳺法華之閫域恢恢有餘地矣而信中又親其教席則所承受不既多乎信中歸吾有以知其學愈宏聲愈振趨下風而望餘光者將接迹扵門墻矣送謙上人詩序萬歳報恩呉城之首刹在其宗又五大山之一也故湖海之士多趨向之得叙扵清班之列則爲光寵然其班亦不易得以叙也雖不易得茍主是山之名徳業精而道隆量宏而望重則趨向之者皆忘其不易而必蘄親扵座下也吾觀西林行公之主是山也列兹班者必端厚而明秀修學而有文不然訖不得叙其掄擇亦嚴矣宜其人之無幾也然二十年來湖海之間宗其宗而表表者多公之會之出也蓋公之掄擇雖嚴而樂從公者能各自勵不以其嚴而自棄也善施教者其效之至有如是哉今住山素軒浩公實西林之法嗣其業與道固足以直纘西林而不待言矣至其恢恢之雅容顒顒之譽望人之趨向之又有不期而然者矣公方踵西林之法擇人殊不易而人皆忘其不易者誠有望扵虚往而實還也則嘉禾謙上人既専北塔之懴席將歸而人咸詩以贈之固有由然也歟上人字天益所謂端厚而明秀修學而有文者觀夫諸詩之所陳蓋可見焉詩已成卷來丐予言序諸首吾聞上人居真如太虚其師也今歸而定省承問而有對焉亦必慶其徒之還也不爲虚還也送友蘭序人之相與也等而言之則親疎之分有不同汎而言之則四海之内皆兄弟惟其四海皆兄弟也所以見天理人情無不同者矣今夫人之親也疎扵我之親人之子也異扵我之子此蓋言其分也然一人孝也人皆起其敬親之心一人慈也人皆興其愛子之念自非人情之所同又安能若是哉浮圖氏之法我所師事者有父之道焉其迹固親矣而所自生之父母跡雖似疎心則未嘗不親也何也以天理之不可暫息而人情無所不同也今扵茝上人友蘭之歸而益見焉友蘭吳松陵浮屠師也居吳天禧講寺三年矣鄉因奔母之喪復歸扵修所今又因霜露之感而興九原之思告歸故山交㳺咸賦詩以餞徴予序之予不云乎一人孝也人皆興其敬親之心一人慈也人皆起其愛子之念以人情之所同乎今友蘭歸省其親之藏處而交㳺咸為道其懷思之情天理之著何如哉天理人情此儒者所知而當告人者也寜不因其孝于親而推夫孝也孝為百行本本之扵吾仁由仁而親親矣由親親而仁民由仁民而愛物無所往而不本扵孝也將見松陵之人子聞其風而皆興其孝由近以及逺有合儒者之行是深有望扵友蘭也予之言亦納約自牖之意友蘭其勉哉送彚木菴序松陵為吳屬邑去城餘一舍左江右湖山水明秀人生其間得山水之華者明秀亦與之侔其質既明秀矣而加以學問之功縱其遐舉之迹有吟嘯之懷無塵坌之染又明秀之尤者乎若木菴彚上人其人也木菴友予亦久矣初融室講師住呉城之報恩予居離報恩終里所故時預其方外之㳺而木菴則融室之上足嗣因締予文墨之交焉及融退休故里而木菴侍其杖屨以還中間蹤跡似少疎矣然木菴時至城中無曠歳之别况詩文還往懷寄唱酬實未嘗踈也今年夏予來京木菴亦寓長千古刹扵是相與懽然無虛日矣秋聿其暮而木菴忽治裝告歸有不可得而留者人生聚散豈固無常耶蓋亦嘗思之矣夫厚重不遷者山之静也而常出雲氣澤及群物其果無静理乎人之踪跡何異扵是不可執其常矣雖然此物理也如人情何是以離而合則足以慰扵懷聚而散則不能無惘然也木菴行矣予能無惘然乎予其能釋然乎因泄其不釋然者爲之歌以送焉歌曰空虚蕩蕩兮秋髙氣涼原野蕭條兮木葉萎黃西風吹巾兮白露沾裳客行此時兮道路長忘彼遐脩兮趨故鄉有鳴嗈嗈兮列南征之鴈行兩䄂翩飜兮欲與俱翔雲路不同兮令我心傷噫吁嘻盟固可寒兮期不可爽已外形骸兮蔑夫鞅掌性皆空兮物皆罔當古梅之歕香兮訖禪窟之𤣥談遲東風以偕來兮兾重適乎幽賞書送僧以禎卷天竺氏之居在吳城為最古者曰通元今萬歳報恩也始孫吳立國時餘千年矣一塔巋然出鴻濛之表他方之所無已弗論其殿堂庭廡宏敞邃密清嚴而寛静亦他方所尠及蓋言夫土木壯麗丹彩烜赫或云有之者至求其入山而雲木森翳霞霏蕭爽能令人興閑曠之懷釋氛埃之氣者惟是山爲然余家城北陬距山才里所每人事餘暇時一㳺焉自少而壯今老矣㳺蓋不知其幾山之名徳㳺藝扵文辭翰墨者往往陪予之杖屨故予益知是山之習尚江湖之士欲厠西清之一職自非力學好修足以自致者有不能得然得則必美材良器流嘉譽扵斯今振光華扵他日者也若以禎上人是已上人家陽山之澄照而來報恩領綱維之職秩滿將歸縫掖之英方袍之秀咸詩以餞而寳覺湛原師序其篇端湛原所謂名徳之㳺藝扵文辭翰墨而嘗陪予㳺者故爲持卷來須言因記予之見且知者如上然上人之是職亦修途之初軔耳能無忘寳覺所以朂勵之之意他日當復來吾將見扵北塔之下復有㷸㷸者矣崑山與福院請在别峰開山疏夫碩徳辨才譽望之隆而争嚮慕之者可以爲人之依仰偏隅僻壤寂寞之濵而競趨赴之者由其成世之名徳也是以人以學顯地因人勝寜不然哉惟我别峰禪師容儀足爲人表式行業可爲人範模屢扵大方宏闡宗㫖嘉徳後進良已多矣蓋時雨施化凡物可成顧兹肎屈其尊居之夫亦何陋噫觀地中之泉隨處而有道固有定在耶然海陬之境樷林振焉人斯有攸歸耳願從衆志以祝洪禧請圓湛然住寳覺寺致言蓋聞仁智之道成已成人而已成已必資夫學問之功成人乃在乎闡揚其教是則所謂體用兼備名實相孚出處得宜變通有道者矣新命曹溪寳覺堂上湛然圎公天與之資素髙爲學之功彌邃研窮内典博攷群書摛詞則霧組雲縫析義必天開日朗北塔平分風月西林每許氷藍俄商絲已屬知音信異寳無逃具目薦書甫上瓣香已迎雖云小試武城從此大開華藏是非能悉夫有體有用成已成人之道者乎於戲論曹溪之别派不嫌同此名焉紹賢首之正宗今復有其人矣母辭䟦渉勉副皈依請濬西源住延福寺致言聞之道無二致出處本同教則殊途方圓適義能以已之所至而示人之所當行則物我兩成仁智兼見矣新命延福堂上西源濬師性資和粹學行精勤譬麗水之金在鎔豫章之材出地工師知必用扵堂構良冶使必就扵軒懸故屢更職扵藂林終受知扵善世既云充滿扵已能無沾溉扵人所以膺鶚薦之文貽鶴書之請夫斯舉也詎不宜哉雖然南山之霧有物隱之者蓋以澤其文章豐盛之器有人識之者終難揜其光耀惟待己益重則成物愈宏從兹百里外之虞山林泉共慶要使七軸中之妙義愚智皆明爰陳交友之詞庸致輿情之望請廣太虛住寳幢寺致言意氣相與所為不必茍同心跡相孚所見則各有在惟其無可無不可盡其有能有不能此彌天四海之交㳺獲聲望才華之相映顧下躅似難追扵髙致而逹者則何異扵古人兹惟新命寳幢堂上一性廣師質涵氷雪之清氣藹瓊琚之潤渤澥倒傾其詞海豫章特秀扵文林毎共豁其吟懷得盡消其煩抱爾從衆望出主名山疇不謂然惟其時矣天開日朗争看峭㧞之孤峯谷應山鳴交聽瀾翻之千偈人情所嚮友道増輝請律有章住大𢎞寺致言天美之以資人淑之以學天生人而人贊之天人合而為一其才必著扵成物待之以時我遇之以道物需我而我應之人我合而爲一扵事必有所濟以有成之才爲必濟之事所值固非幸歟亦人之所望也今請大𢎞堂上有章律師質清而氣充學勤而行勵所守不渝其用所為必獲其功其辭足以發其所欲之言其言足以敷其所學之道處藂林既足多在大方為殊少非天人之相合其孰能致是耶且夫大𢎞之席昔云盛矣廢蓋久焉盛而廢久而復若必待其人然復之漸慮之周有容而乃大欲致此者又必物我之相合也天人合既有所徴物我合將見扵是則師之赴請也豈偶然之故哉吁言者易而行者難君子必由扵義積之深而發之逺好還斯見扵天毋辭一出之勞勉狥群情之望洪武丁巳仲秋初吉致言題東坡書金剛經石刻正因如海桒門師之良師子林其居處也林在呉城東北􅑍蕭閑森爽不與井邑類大夫士之煩扵塵坌者時之焉師接之未嘗倦也余家去林近雖尠乏塵坌之煩之焉則加數師亦不厭余也間出此卷以示余徴一言扵後觀焉則蘇長公爲其考忌日書以施僧謂之金剛經刻本而會稽王常宗氏以其先君所藏而贈師者也噫長公之書此以其考之故常宗之舉此以贈師復以其先君之故也且常宗之友師特善今已矣師蓄經書甚富不題而獨欲題此者豈非念其亡友之貽乎是皆篤扵人倫者也雖欲無題義不得而無題矣題衍長老碧澄軒銘予來湖上且半月雖去嚻煩而處清寂然朋㳺以逺詠談稀曠不能自釋扵懷隂雨連延索莫更甚今日見此心目俱醒如與斯道晤對可解鬱陶矣虎溪三笑圖贊大道無為行止皆寓行則誰驅動亦誰駐令人却笑逺公一水便能碍住今朝幸得過溪來莫教互轉山中去思緩堂有序恒中禪者生日本而來中華問法有嵗年矣歸未獲然天倫有不可泯者故倚門之懷常戚戚然因名其堂曰思緩士大夫多賦之者蓋吾道所當嘉也故亦爲之題云問法西來歳月侵鄉言都已變華音望中故國天同覆思入寒泉地更深日出未囘東海夢花開長係北堂心客衣尚有臨行線寸艸春暉忍重吟過西山海雲院院有連理山茶屛甚竒古蒼崖壓境竹縁坡疎雨苔花兩屐過童子候門施問訊老僧入座説伽陀茶屛古翠連枝巧蘿屋繁隂蔽暑多百丈泉頭借禪榻堯天安樂有行窩寄衍獨菴斯道蒲團功向熟那許業縁侵悟道原非佛論詩却見心鉢香紅稻米屋老緑蘿岑吾亦惟求静支笻盍逺尋寄李鶴瓢士明山瓢形似鶴山館瀉瓊漿醉後書符驗常時施藥忙壇横星斗影帔着海霞光究徹𤣥𤣥理吹笙謁紫皇書寳積印衲子房老去無聊即訪僧芒鞋棕帽白雲層此心不競紅塵久柳絮沾衣悟上乘師林十二詠師子峰獰面獸中尊竒峰比最真祇堪負蓮座穩載法王身含暉嶺西曛夕尚明東旭朝先赤爲比衆峰髙光景常多得吐月峰昨吐光不闕今吐遽非圓圓缺看多少孤峰只宛然立雪堂獨立暮庭中齊腰雪幾重不因逢酷冷那解識嚴冬禪窩咫尺棲身地寛如選佛塲湏知九千界元不離禪床問梅閣閣中人獨坐閣外已梅開春信何須問清香自報來指柏軒古柏晝陰陰當軒歳月深山僧常笑指應解識禪心卧雲室入窓纔一縷滿室便氲然任使頻舒巻山僧自穩眠玉鑑池方池開玉鑑炯炯湛虚明瘦影休煩照心涼已共清水壺井一泓碧澄甃寒沁玉壺清裹茗曽來試虚聞石井名小飛虹古澗瀉寒清飛梁壓水平夕陽疎雨過留得彩虹橫竹谷深谷翳脩篁蒼飈灑碧霜憶曽叅玉版風味似篔簹半軒集方外補遺
