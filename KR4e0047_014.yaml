body:
  text: 半軒集方外補遺明王行撰素軒燕集詩序乙卯冬孟未竟之十日豫與錫山包撝士謙東海徐理伯循婁江孫敏惟學訪宗源上人于普光精舍時寶積律上人有章在焉因與共宿素軒之下談茗之餘以韋刺史慈恩清會詩屢招清景賞句折字分韻各賦詩一首豫以不善詩獨得偷逸兀坐清聽幽吟微哦不啻如塤篪之和琴瑟之清也詩就繕寫成卷俾豫題其端夫人之于學頃焉之不可怠也然不能無遊息之間焉遊息亦未嘗非學也諸君子年富學勤厲志自修奮焉逺至蓋未易量兹而一夕之清暇猶不敢廢而相與道其性情之正良足尚已二上人髙蹈方外亦不肯自放要之蓋可嘉也他日道昌文振當起大慧日之思矣遂為序既望之而復勉之云送福僧詩序豫友浩師宗源學勤而業精守専而行峻在其法所當與之也故流輩咸致禮焉其所與遊必皆端人人見與之偕者已信之曰是必端人也不然肯與之友耶初宗源之從豫逰也為之介紹者實豫所信愛其言曰宗源非他浮圖比見之始知言之不妄及見果然則宗源之取友必端固不在于今其所從來久矣今年春豫過宗源寶幢丈室有陪談于列者朴厚而莊慎問之曰今座元要福也豫已知其必有取也不然寧與之交乎越四月福持卷來曰大夫士辱不見遺于福多詩以委教兹已成卷願謁文序其端豫益信知之不誣也今夫棘雖小亦棗之流匹雖短終鵠之類有恆者雖或未至要善人之徒也福之見稱于大夫士者豈非以其能際接于宗源也乎宗源之見信于人向之所云也然即宗源而法焉則他日之見稱于士大夫者又有甚于今日者矣其勉之哉其勉之哉送伏上人序吳有萬歲報恩寺肇基于孫氏有江東時于今蓋舊矣寺既為吳勝處湖海大夫士之入吳者必訪古而至主者宣師無言厖眉古貌動止間逸故名人大卿得交焉嗣之者曰聚師白雲實宣之弟子克治其業以其坦夷沖融復多繅繪户庭之屨無俗塵者人皆曰宣師如在也迄罹變更聚族化去寺亦衰歇大夫士之復至而交宣師者未嘗不思宣師交聚師者未嘗不思聚師也白雲有孫曰伏師虎林郡之士家子也聰慧而敏方其少時屢從君子遊余每與聚師談虎林聞輒解固已知其非常器矣中間違别頗久而知其為詩章文詞其前已自喜知之不妄也一日與會于普光招提主招提者浩師宗源因出虎林所詠卷軸甚富讀之令人益喜不覺發慨何啻當刮目也宗源曰虎林已出世久矣余聞而益慨聚師亦豈亡哉自是見之雖不能數而懷之則不能不數也今年春吳江無礙方虛席藂林疏請虎林住焉其所交遊咸賦詩送之徴余為序今夫大夫士父子繼世有聲人皆以為鮮至于三世而不替蓋益鮮矣由宣師至虎林非三世乎雖所處之地不同而聲譽之著繩繩如此非所謂良鮮者耶且士大夫有骨肉之親猶難必其繼世之善方外之士以其法相聚而其善不止于繼世焉豈不可尚也夫豈非良鮮也夫送在别峰序吳城西北陬有天竺氏之居焉古稱重玄今為承天能仁禪寺入其山壤地寬袤面勢闓爽觀其棟宇之宏壯搆締之精密莊嚴丹碧之華縟而明麗在他方蓋不多而于吳則僅有也其山如是則住是山者必與是山稱乃合叢林之輿論故能仁之主席不易登而登者必衆之所與也衆與之矣而又有不易處者焉蓋吳城為東南會府而寺當道路之要衝有夏屋可居以安而無恆産以資夫朝夕夫府為都會則湖海之往來者多寺當要衝而屋堪以安息則瓶鉢之經行者必至瓶鉢之經行者以至而顧無所資給焉則為之主者將何以為也邪此所以衆雖與之而不善于自處則亦有所不易也沈士常豫友也一日為同里閈者草八人之介而來告曰某等皆能仁之鄰也别峰在禪師之住是山六年矣始至而衆歸既久而神護足以見其操履矣庫庾之資雖無所儲而瓶鉢之至者無虛返棟宇之多雖不能無隤阤而修葺者常周完足以見其世緣矣某等日所因依幸多開益既而忽謂曰天界京師之重剎也其前堂之請濫及度不可辭兹席盍今退耳某等聞之如失倚賴因而自思師往矣某等于師之崇重雖讚美而莫加若心則不能自己惟先生之文雅足發人之所藴願一言以著明師之所以為師者而致夫舊山泉石之慰焉敢請於戲士常欲豫何發乎然豫家吳城嘗見夫能仁之舊今亦良為不易矣而别峰一住者數寒暑其間周旋補著治已接物雍容紓徐若不見有不易者非所謂善于自處者則藂林之與之四衆之歸之洎夫士常之為之介者需文以發揮而屬望之亦固有所自哉且夫人情之不可以力致者趣向之誠也挹焉有莫之前撝焉有莫之却也今方外之士守其空無乃有依之親之而弗之舍者則别峰也其必有可依者夫其必有可親者夫所謂二十有八人者曰吳興沈起宗隴西李仁善玉峰劉世用清河張孟恭某郡某某名庸即士常也洪武二十年六月序送恭上人詩序欲學之成者必歸依乎碩大之師欲名之大者必往造乎都會之地蓋碩大之師乃衆善之所宗都會之地則四方之所萃也茍微衆善而徒有一節之長非都會而偏于一􅑍之地則不足為吾之歸往矣或率然而歸往脫不墮于孤陋寡聞者幾希尚能成吾之學侈吾之名也哉此欲名而造都會之地則猶乘髙倚順風而疾呼自足致其聲之逺欲學而依乎碩大之師則猶璞玉遇良工之追琢自足以成其器之美也信中上人乾竺氏之良也居海昌黃岡之太平寺研窮內典功已深厚以為未足乃出鹽官越檇李至吳淞之滸從融室翁講習華嚴教觀有登堂嚌胾之聲今年夏姑蘇萬歲報恩辟為懴筵之首豫始識之質清而氣和業勤而行勵華實誠相副也于是藂林之老成江湖之耆耋無不善之信中之聲益四馳矣茲秩滿告歸所與遊咸賦詩以餞來徴豫文序之於戲信中其所謂知所歸往者乎蓋融室之為師碩大之師也而能從焉報恩之為寺都會之地也而能至焉則其學之成聲之逺亦宜也哉且今報恩素軒講師實融室之親嗣其遊法華之閫域恢恢有餘地矣而信中又親其教席則所承受不既多乎信中歸吾有以知其學愈宏聲愈振趨下風而望餘光者將接迹于門墻矣送謙上人詩序萬歲報恩吳城之首剎在其宗又五大山之一也故湖海之士多趨向之得敘于清班之列則為光寵然其班亦不易得以敘也雖不易得茍主是山之名德業精而道隆量宏而望重則趨向之者皆忘其不易而必蘄親于座下也吾觀西林行公之主是山也列兹班者必端厚而明秀修學而有文不然訖不得敘其掄擇亦嚴矣宜其人之無幾也然二十年來湖海之間宗其宗而表表者多公之會之出也蓋公之掄擇雖嚴而樂從公者能各自勵不以其嚴而自棄也善施教者其效之至有如是哉今住山素軒浩公實西林之法嗣其業與道固足以直纘西林而不待言矣至其恢恢之雅容顒顒之譽望人之趨向之又有不期而然者矣公方踵西林之法擇人殊不易而人皆忘其不易者誠有望于虛往而實還也則嘉禾謙上人既専北塔之懴席將歸而人咸詩以贈之固有由然也歟上人字天益所謂端厚而明秀修學而有文者觀夫諸詩之所陳蓋可見焉詩已成卷來丐豫言序諸首吾聞上人居真如太虛其師也今歸而定省承問而有對焉亦必慶其徒之還也不為虛還也送友蘭序人之相與也等而言之則親疏之分有不同泛而言之則四海之內皆兄弟惟其四海皆兄弟也所以見天理人情無不同者矣今夫人之親也疏于我之親人之子也異于我之子此蓋言其分也然一人孝也人皆起其敬親之心一人慈也人皆興其愛子之念自非人情之所同又安能若是哉浮圖氏之法我所師事者有父之道焉其迹固親矣而所自生之父母迹雖似疏心則未嘗不親也何也以天理之不可暫息而人情無所不同也今于茝上人友蘭之歸而益見焉友蘭吳松陵浮屠師也居吳天禧講寺三年矣鄉因奔母之喪復歸于修所今又因霜露之感而興九原之思告歸故山交遊咸賦詩以餞徴豫序之豫不云乎一人孝也人皆興其敬親之心一人慈也人皆起其愛子之念以人情之所同乎今友蘭歸省其親之藏處而交遊咸為道其懷思之情天理之著何如哉天理人情此儒者所知而當告人者也寧不因其孝于親而推夫孝也孝為百行本本之于吾仁由仁而親親矣由親親而仁民由仁民而愛物無所往而不本于孝也將見松陵之人子聞其風而皆興其孝由近以及逺有合儒者之行是深有望于友蘭也豫之言亦納約自牖之意友蘭其勉哉送彚木菴序松陵為吳屬邑去城餘一舍左江右湖山水明秀人生其間得山水之華者明秀亦與之侔其質既明秀矣而加以學問之功縱其遐舉之迹有吟嘯之懷無塵坌之染又明秀之尤者乎若木菴彚上人其人也木菴友豫亦久矣初融室講師住吳城之報恩豫居離報恩終里所故時預其方外之遊而木菴則融室之上足嗣因締豫文墨之交焉及融退休故里而木菴侍其杖屨以還中間蹤迹似少疏矣然木菴時至城中無曠歲之别况詩文還往懷寄唱酬實未嘗踈也今年夏豫來京木菴亦寓長千古剎于是相與歡然無虛日矣秋聿其暮而木菴忽治裝告歸有不可得而留者人生聚散豈固無常耶蓋亦嘗思之矣夫厚重不遷者山之靜也而常出雲氣澤及群物其果無靜理乎人之蹤迹何異于是不可執其常矣雖然此物理也如人情何是以離而合則足以慰于懷聚而散則不能無惘然也木菴行矣豫能無惘然乎豫其能釋然乎因泄其不釋然者為之歌以送焉歌曰空虛蕩蕩兮秋髙氣涼原野蕭條兮木葉萎黃西風吹巾兮白露沾裳客行此時兮道路長忘彼遐修兮趨故鄉有鳴嗈嗈兮列南征之鴈行兩袖翩翻兮欲與俱翔雲路不同兮令我心傷噫吁嘻盟固可寒兮期不可爽已外形骸兮蔑夫鞅掌性皆空兮物皆罔當古梅之噴香兮訖禪窟之玄談遲東風以偕來兮兾重適乎幽賞書送僧以禎卷天竺氏之居在吳城為最古者曰通元今萬歲報恩也始孫吳立國時餘千年矣一塔巋然出鴻濛之表他方之所無已弗論其殿堂庭廡宏敞邃密清嚴而寬靜亦他方所鮮及蓋言夫土木壯麗丹彩烜赫或云有之者至求其入山而雲木森翳霞霏蕭爽能令人興間曠之懷釋氛埃之氣者惟是山為然余家城北陬距山才里所每人事餘暇時一遊焉自少而壯今老矣遊蓋不知其幾山之名德遊藝于文辭翰墨者往往陪豫之杖屨故豫益知是山之習尚江湖之士欲厠西清之一職自非力學好修足以自致者有不能得然得則必美材良器流嘉譽于斯今振光華于他日者也若以禎上人是已上人家陽山之澄照而來報恩領綱維之職秩滿將歸縫掖之英方袍之秀咸詩以餞而寶覺湛原師序其篇端湛原所謂名德之遊藝于文辭翰墨而嘗陪豫遊者故為持卷來須言因記豫之見且知者如上然上人之是職亦修途之初軔耳能無忘寶覺所以朂勵之之意他日當復來吾將見于北塔之下復有燁燁者矣崑山與福院請在别峰開山疏夫碩德辨才譽望之隆而爭嚮慕之者可以為人之依仰偏隅僻壤寂寞之濵而競趨赴之者由其成世之名德也是以人以學顯地因人勝寧不然哉惟我别峰禪師容儀足為人表式行業可為人範模屢于大方宏闡宗旨嘉德後進良已多矣蓋時雨施化凡物可成顧兹肯屈其尊居之夫亦何陋噫觀地中之泉隨處而有道固有定在耶然海陬之境叢林振焉人斯有攸歸耳願從衆志以祝洪禧請圓湛然住寶覺寺致言蓋聞仁智之道成已成人而已成已必資夫學問之功成人乃在乎闡揚其教是則所謂體用兼備名實相孚出處得宜變通有道者矣新命曹溪寶覺堂上湛然圎公天與之資素髙為學之功彌邃研窮內典博考群書摛詞則霧組雲縫析義必天開日朗北塔平分風月西林每許氷藍俄商絲已屬知音信異寶無逃具目薦書甫上瓣香已迎雖云小試武城從此大開華藏是非能悉夫有體有用成已成人之道者乎於戲論曹溪之别派不嫌同此名焉紹賢首之正宗今復有其人矣母辭跋涉勉副皈依請濬西源住延福寺致言聞之道無二致出處本同教則殊途方圓適義能以已之所至而示人之所當行則物我兩成仁智兼見矣新命延福堂上西源濬師性資和粹學行精勤譬麗水之金在鎔豫章之材出地工師知必用于堂構良冶使必就于軒懸故屢更職于藂林終受知于善世既云充滿于已能無沾溉于人所以膺鶚薦之文貽鶴書之請夫斯舉也詎不宜哉雖然南山之霧有物隱之者蓋以澤其文章豐盛之器有人識之者終難掩其光耀惟待己益重則成物愈宏從兹百里外之虞山林泉共慶要使七軸中之妙義愚智皆明爰陳交友之詞庸致輿情之望請廣太虛住寶幢寺致言意氣相與所為不必茍同心迹相孚所見則各有在惟其無可無不可盡其有能有不能此彌天四海之交遊獲聲望才華之相映顧下躅似難追于髙致而逹者則何異于古人兹惟新命寶幢堂上一性廣師質涵氷雪之清氣藹瓊琚之潤渤澥倒傾其詞海豫章特秀于文林每共豁其吟懷得盡消其煩抱爾從衆望出主名山疇不謂然惟其時矣天開日朗爭看峭拔之孤峯谷應山鳴交聽瀾翻之千偈人情所嚮友道增輝請律有章住大𢎞寺致言天美之以資人淑之以學天生人而人贊之天人合而為一其才必著于成物待之以時我遇之以道物需我而我應之人我合而為一于事必有所濟以有成之才為必濟之事所值固非幸歟亦人之所望也今請大𢎞堂上有章律師質清而氣充學勤而行勵所守不渝其用所為必獲其功其辭足以發其所欲之言其言足以敷其所學之道處藂林既足多在大方為殊少非天人之相合其孰能致是耶且夫大𢎞之席昔云盛矣廢蓋久焉盛而廢久而復若必待其人然復之漸慮之周有容而乃大欲致此者又必物我之相合也天人合既有所徴物我合將見于是則師之赴請也豈偶然之故哉吁言者易而行者難君子必由于義積之深而發之逺好還斯見于天毋辭一出之勞勉徇群情之望洪武丁巳仲秋初吉致言題東坡書金剛經石刻正因如海桑門師之良師子林其居處也林在吳城東北􅑍蕭間森爽不與井邑類大夫士之煩于塵坌者時之焉師接之未嘗倦也余家去林近雖鮮乏塵坌之煩之焉則加數師亦不厭余也間出此卷以示余徴一言于後觀焉則蘇長公為其考忌日書以施僧謂之金剛經刻本而會稽王常宗氏以其先君所藏而贈師者也噫長公之書此以其考之故常宗之舉此以贈師復以其先君之故也且常宗之友師特善今已矣師蓄經書甚富不題而獨欲題此者豈非念其亡友之貽乎是皆篤于人倫者也雖欲無題義不得而無題矣題衍長老碧澄軒銘豫來湖上且半月雖去嚻煩而處清寂然朋遊以逺詠談稀曠不能自釋于懷隂雨連延索莫更甚今日見此心目俱醒如與斯道晤對可解鬱陶矣虎溪三笑圖贊大道無為行止皆寓行則誰驅動亦誰駐令人却笑逺公一水便能礙住今朝幸得過溪來莫教互轉山中去思緩堂有序恆中禪者生日本而來中華問法有嵗年矣歸未獲然天倫有不可泯者故倚門之懷常戚戚然因名其堂曰思緩士大夫多賦之者蓋吾道所當嘉也故亦為之題云問法西來歲月侵鄉言都已變華音望中故國天同覆思入寒泉地更深日出未回東海夢花開長係北堂心客衣尚有臨行線寸草春暉忍重吟過西山海雲院院有連理山茶屛甚竒古蒼崖壓境竹緣坡疏雨苔花兩屐過童子候門施問訊老僧入座説伽陀茶屛古翠連枝巧蘿屋繁隂蔽暑多百丈泉頭借禪榻堯天安樂有行窩寄衍獨菴斯道蒲團功向熟那許業緣侵悟道原非佛論詩却見心鉢香紅稻米屋老緑蘿岑吾亦惟求靜支笻盍逺尋寄李鶴瓢士明山瓢形似鶴山館瀉瓊漿醉後書符驗常時施藥忙壇橫星斗影帔著海霞光究徹玄玄理吹笙謁紫皇書寶積印衲子房老去無聊即訪僧芒鞋棕帽白雲層此心不競紅塵久柳絮沾衣悟上乘師林十二詠師子峰獰面獸中尊竒峰比最真祇堪負蓮座穩載法王身含暉嶺西曛夕尚明東旭朝先赤為比衆峰髙光景常多得吐月峰昨吐光不闕今吐遽非圓圓缺看多少孤峰只宛然立雪堂獨立暮庭中齊腰雪幾重不因逢酷冷那解識嚴冬禪窩咫尺棲身地寬如選佛場須知九千界元不離禪床問梅閣閣中人獨坐閣外已梅開春信何須問清香自報來指柏軒古柏晝陰陰當軒歲月深山僧常笑指應解識禪心卧雲室入窗才一縷滿室便氲然任使頻舒卷山僧自穩眠玉鑑池方池開玉鑑炯炯湛虛明瘦影休煩照心涼已共清水壺井一泓碧澄甃寒沁玉壺清裹茗曽來試虛聞石井名小飛虹古澗瀉寒清飛梁壓水平夕陽疏雨過留得彩虹橫竹谷深谷翳修篁蒼飈灑碧霜憶曽參玉版風味似篔簹半軒集方外補遺
