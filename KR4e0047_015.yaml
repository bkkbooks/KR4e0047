body:
  text: 王半軒傳半軒諱行字止仲王姓半軒其號也蘇之吳邑人初父某為閶門南市人市藥以交鬻紛拏挈之為已助半軒尚髫年藥踰千品悉志其某某若多寡酬應無或遺主媪老好聽稗官家説即默記數本逮晚歌為之娛主異之為語若能讀書否耶授魯論一帙翌日已成誦矣遂大竒之罄以帑所庋經史百子恣其探閲大有所得年未弱冠辭去啓蒙于城北望齊門舊居時聲譽殷發願交畢至而議論踔厲證據今古常屈其座人然家徒壁立几無留策詢所學曰向得之藥主人耳為詞章汪洋奧美關節開解千緒萬端參錯傑出一時老生咸畏之臨川饒參政介之分守浙右以詞翰豪視東南號醉樵為之詩歌者殆遍惟難于一文耳間延與語曰是非莊騷家言莫殫其形容即席為説不加點竄饒仆地曰吾見中朝才俊亦夥未有類子敏而竒者真天才也亟疏薦以天下多事半軒亦靳弗售長洲周莊沈逹卿其父號萬三秀者資雄當世為禮聘于家孰每成章輒償白金以鎰半軒槩麾去曰使金塢可守則燃臍之慘無及也吾言止如是直何濫取多田翁為哉三吳鼎沸所據者恃多壘炮石自固半軒私語曰兵法不云柔可以制剛也或詢何居曰設植簜篠頎而韋者繫布于其端如帡幪然人出沒其下雖炮至而布必隨之低昂則人無害而石可盡矣後大將常公提兵至果用是計而城遂破所交靡不服其談兵之有徴也洪武初郡庠延為經師時訓𨗳無常祿猶儒生衣巾弟子員多出綺紈皆易之以五經雜進問難半軒悉為辨講極底藴洎刪潤課業刃迎縷解節有詳明至是乃吐舌曰王先生未可以詞章儒目之故有行書厨皮瀝簏之號以其該博而無滲漏也郡守江夏魏河內王俱名觀者以國子祭酒刑部侍郎前後遷于蘇胥多之思聞之朝而不果年向老解任避迹于吳山之石湖以經訓為常凡碑銘序記等文求著作者悉歸焉間寫圖題其上自適旁通緇黃家學與論苦空玄寂纍日忘倦率致其厭懌合什稽首謂淡如居士真再世人耶尤深契道衍謂必有知者晚更號楮園有楮園集十五卷半軒集六卷學言稿十二卷四六劄子二卷通意宜資十卷宋系統圖二卷人咸謄傳生二子皆役于京屢言踈省問欲見親以慰半軒欲往或尼以法網固密非儒者泮奐之日乃微笑曰虎穴尚可嬉吾韋布士何窒哉抵京主一祝家因之見重于梁國蘭公延之西孰誨其子若孫并資問益每悵相知之晚數薦之召對反覆注欲行王道正禮樂簡賢立相為首務忤旨以其迂濶于事弗聽未久公以他事獲罪連坐以殁實洪武二十八年三月十二日年六十五云東原耕者曰士貴善用已斯善用人用于世半軒當元社未屋才髙學博英邁亷厲莫可羈御而割據東南者又禮賢下士士于是孰不自用以展其所負顧甘恬然自處于俶擾之境及當明時小善一藝罔不庸録半軒亦無一命之沾抹摋以老則其已之所用匪由乎人者可自得也若用人用于世非出于已安不委之命哉觀乎人者當于其所養不當于其所遇斯弗失之矣嗟夫正統己卯秋八月吉同郡後學杜瓊撰東原逸史作王半軒先生傳固實而核矣惟所載知道衍一事未悉昔唐李白識郭汾陽于稠人中後其再造唐室皆汾陽之功故史稱白非但為詩人而已方衍當髠首緇服深自退處若為世之所棄而半軒三復歎仲尼不以人廢言不可以法而遺其人又曰安知終無與其同志蓋有所待者斯時及此惟先生一人後衍果授知于文皇參謀謨贊密勿以清內難再造鴻業厥功居第一賜名復姓官居極品卒加諡贈配享廟食天下後世皆知可與汾陽等若是者皆先生所灼見豈臆度之而已惜乎謝世未及躬見然先生可以文士目之乎逮今未百年已鮮言之故豫表而出之使後知先生之知言云景泰改元夏五望文林郎南京浙江道監察御史同郡後學鄒亮書
