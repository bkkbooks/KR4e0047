body:
  text: 半軒集巻一明王行撰賦箴頌辭辯喻擬贊隱居賦古之人有喜寂而憎囂病雕而安朴者敝屣軒乗唾視絓組弗移於巨室之富弗撓於王公之勢弗下於后辟之尊歘然而遐舉漂乎其髙邁如風如雲即之而罔從底之而莫至也於是彊名之曰隱中世以還完質浸壊假隱而章資隱而華賓隱而實耀者駢比隱之名始病矣南山屠處士屬時艱危因潛其徳抱一而幽處悼淳風之就漓惟古道之是慕予甚嘉之因為著隱居賦其辭曰大道邈乎其寥閴兮何斯世之多邅始局蹐而錯遻兮卒紛綸而糾纏肆澆風之彌競兮朴兹離而不完懿夫人之孤矯兮抗靈風而髙鶱日止息乎岑蔚兮架崟嵌而崇構欐木蘭而楹杏兮褰薜蘿以重覆甄雨風之可待兮迺形軀之是休弗暑寒向塞以自蔽兮奚繚垣之足周鶴翻翻其忽萃兮或鳴鹿之呦呦睠羣芳之炫春兮擷嘉英於素秋羲娥亟超而疾騖兮四運迭趨而莫駐晨顆丹而可美兮暮馘黄而可懼爰凝神以葆真兮斯含和而茹醇溉金華以植靈根兮潄玉池之芳津謂道可靜悟而不可躁得兮時可安而不可為弗矯焉以翹翹兮弗塊兮以蚩蚩歎儀鳯之寥寥兮傷鳴韶之竟息倐遐舉以幽潜兮又寧俟夫終夕笑彼汨夫埃壒兮若羽濡之莫振守責之弗吾宥兮亦憂并而患臻靡道腴之可味兮是擾擾其曷去能相角而技相髙兮匪予衷之攸素組吾嬰而可税兮馬吾羈而可捐聊相從以容與兮於以全吾之餘天亂曰泰無塞兮荃其藏窅獨處兮不渝芳爾欲求兮逺周章茍得之兮憂則忘紉而佩兮緝而裳蘄終焉兮以相羊别知賦天蒼蒼其正色兮曽何有乎晦明惟𤣥雲之閡閼兮斯下睇之瞢瞢矧大塊以噫然兮野馬羣驤而上征日月忽其從縮兮五緯紛其錯經世棼綸以緯繣兮物相乗而相搤葉蓊蓊以于堂兮蕭蔓蔓而為薄蕙華亟歛其滋兮桂恐偕零于飛藿大濩寥寥而絶奏兮又安用乎竾簧醜九苞為愧徳兮翬何所售其文章嗟亹亹之弗喻兮競杼情而擅長汨霜霰之交披兮迺掣肘之巨芳與其忳忳而復寤兮寧先幾以遁藏且事有殊而不異兮物有微而可則也隱所以完夫豹兮屈所以伸夫蠖也此予之黙黙以靜俟兮自以信之非惑也紛總總以為執墜兮獨大人之貞得也予始潔修之是慕兮荃不拒兮以不賢謂需卓卓之行方兮仍逐逐而智圓遊義塗以容與兮處仁居而泰然懿兹言之摖道兮顧行之而不違諒安時以徳耀兮抱其全而弗虧甫切偲之是賴兮倐告予以别故駟飛鳴而驂驂兮指東南而遐騖鵠㷀㷀而孤跱兮鶴徘徊以鳴悲恍予志之若失兮惄予心之不夷心不夷兮奈何悵臨風兮浩歌歌曰山川莽蒼兮長路漫漫凄其雨風兮凝隂沍寒行則甚勞兮居孔安係夫人兮逺何旃吁嗟乎往不我將兮止不我然為我遄歸兮無淹歲年來月樓賦莽無垠兮太清離離錯陳兮宿與星寒㝠兮灝氣凝皎東方兮浮𤣥精海洋洋兮大波澄廓四表兮同一明我居敞兮逹四扄月之來兮皓以盈既窅窕兮邃入亦徘徊兮孤停鑑薄帷兮射彩度曲房兮流晶雖盈虧之有變終莫掩兮虛靈猨嘹嘹兮逺響鶴噭噭兮交鳴篁稍稍兮焱戰光泛泛兮露零夜何其兮將半倐斜漢兮西傾挹靈輝於丹府蕩浮競之煩情謝埃氛之下迹超雲卧兮天行世紛紜兮萬物一非予之所營惟清景兮獨得儗豪華兮孰勝豈衆遺兮我取邈無人兮繄爭眠雲賦聊因余之閒暇散幽趾於巖扄時青陽之甫霽正白雲兮始生乍紬繹兮縷細稍揄揚兮素輕出深谺之怒歕度長林以柔縈爰乃髙步遐登觀其狀態匪一坎之孤興乃千峰而共㑹如掀如埀如奮如怠若輪而旋若艘以載立揺揺之懸旌翼亭亭之髙蓋或為鳯兮俄為龍倐成虎兮忽成兕方逸獸兮原馳奄驚禽之煙逝渾渾兮湯湯淵淵兮濊濊濤鼓雪于崩川水激湍於奔瀨殘飄斷舞與皓鶴以偕來薄翳微涵失瑶芳之所在於是陶笻告憊謝屐訴疲拂紫苔之文薦褰翠薛之修帷悟莊生之幻理與周公以為期彼氤氲而不化復窈窕兮相隨離披兮感同裯於重覆繚繞兮疑入幕於層圍矧動蕩兮漂流欲浮躬兮汎體游漾温湯之源㳂泳清沂之涘承流沫於吕梁轥雄潮於浙水漸朱光之麗正覺氛沴之消除渙爾雪融而氷釋霍然葉掃兮焱驅廓青天兮萬里恍六合之開舒嗟夫變易難常推遷靡間時因景以見新景因人而知變人為景而相移景非人之能戀紛世態而常然詎兹變兮獨眩惟所值之不齊異憂懽兮欣怨置勿念兮復何言繄寤歌兮申歎墨芙蓉賦煙靡靡兮朝隂水渺渺兮夕深儼幽姿兮爰飾度秋鏡兮初臨既霜寒之解拒復嵗月之能任噫胡然哉是豈服𤣥丹而不化駐顔景兮于今也耶畫菜賦膏雨云霽春陽載姸彼生物之欣榮繄嘉蓛其競鮮碧冉冉兮雲湊青遥遥兮霧連苞翠葆以萌土色緑房而貯煙含素英之璀璨茁頳芽之曲拳或蝥虎兮罥絲亦蝓牛兮畫涎盈暮擷之傾筐登晨餐之窳盤疇何攄夫妙思貌兹形而與傳羗豪縑之假質迺神聚而天全雖學圃之細微非哲人之所賢茍㗖是而有為吾胡為而舍旃噫吁􅐵夭夭者華妍媸孰加伊秀則麗伊實如何玩斯圖而永嘅而有得其意於粉墨之餘也耶東野草堂賦葺茨宇于東墅兮聊違囂以離喧攬虞岡之朝翠兮挹綫浦之秋煙華竹隱䟽枌槐䕃軒户有賓屨牖有朋樽琴瑟左張圖史右陳時乗暇以自放兮亦以怡情而養神濯足兮臨流晞髪兮朝暾飛繳罥羽設緡罣鱗樊逕兮䕶葯分庭兮樹諼來游兮來歌出入兮旦昏不致縻於好爵足自得於天真謇髙居兮何累豈所謂無懐氏之民與節婦賦有序温陵陳節婦莊䘮夫守義著卓卓之大節太原王行為作節婦賦於乎古之人有賦寡婦者已然寡婦之賦賦其情節婦之賦賦其義以義制情情有不足言者矣厥惟生人元化萃靈隂陽合并竒偶乃成天倫肇初本由伉儷有典有常人道斯貴夫嫓于君妻之曰齊一適不二再醮匪儀衞姜之貞君子彼韙前修令猷遺武堪履王澤既竭衆禮蕩然詎乏紹之孰返其原維姜之儉乃或時見於誠降衷治亂靡間淮陽祀陳譙郡存曹然諾既洩婦節以髙出目示心解腕潔已寧不愛身義激所使遥遥炎陬薄海之邦亦有其侣氏陳名莊于歸未久所天逺賈浮舶鯨波漂入畨土歲行世移無聞及家恃失怙䘮疇依以居蓋勤女紅以衣以食揆禮自閑拒勿使忒我儀儵返茹荼亦忻豈曰舊姻載敬載賔俄唱羣謀復趨海路雲濤震崩竟以溺訃哀哉具䘮揆度是遵遂舍遐荒謂曰有人㷀㷀處嫠瘁容毁服保育我孤蘄茂陳族令淑外聞厥徳之修咸合而慕凱兹好逑有彊委禽甘言悦之慨忼自誓莫或遂之字孤底成嗜學向善㡬三十年家日滋衍夫人所為固各有志曷克具完得彼失此吁嗟維莊天實相且獲全于義無傷厥軀伊人之良可稱孔有而此大節衆善之首易著咸恒詩始關雎删之贊之聖人慎諸慎之云何風教之原苟不是重人道冺焉嗚乎吾人見善宜紀爰脩信辭竢采于史官箴咨爾衆士篤學古道學成而仕以養以教教養事百各司其官君令我施君祿我餐邦本弗固庶事用殘政不欲苛刑不欲寛寛則罔濟苛則靡安小惡弗為涓流成池片言可用毫末將拱禍既有胎徳豈無種損贏益虧禁暴洩壅從諌勿咈然諾勿宿慾不可縱貨不可黷勿忽小人蜂蠆有毒勿輕小道輪輶可覆勿謂剛可長長剛者亡勿謂柔可履履柔者耻剛強有時柔弱有宜時宜克念願在深思勿恕而昏必恕而明勿清而窒必通而清毋循舊弊毋逆善名保此以行何功弗成人有恒言為臣不易耄言輯戒朂哉有位孝箴人繄百行惟孝其首由本而枝實在父母古先聖哲遺軌可遵媯汭有虞允也斯人頑嚚處尊傲復在下揆以恒情孰可堪者是則不然盡我當為已或有虧曷知親非暨不格姦克諧兹效振古而今獨為大孝希聖者賢曰閔與曽胡知其人孔孟攸稱自時以還希賢是士代不乏人光於信史其尤可喜必舜之師母有後先孝無等差漢包晉祥令聞庸著受虐愈謹被逐不去姑因二者以見其餘勿待枚舉可徵三隅天理民彛終古無息欲昧學明必由先式辭具我箴小子識之載誦載思以淑爾斯喻已箴不審而動之謂率不思而為之謂易夫兹二者汝有之乎蓋學焉而有之學迺弛言焉而有之言必違以之施於身殆斯及以之接於人辱必隨其至也家而家傾國而國殞天下而天下危矣噫是可畏也不可畏邪不知而不畏魯焉者也可知也知之而不為自棄者也不可告也今不絶汝以自棄罔矜汝以不知故告焉汝其思也邪其不思也邪彀齋箴學以至道猶射中的功成未完莫造爾極既完斯功如射斯彀持滿審固乃中之候始學射者志於彀焉求及彀時正庸勉旃學者學道以類於是朂之懋之毋怠厥志先哲諭言以揭于齋夕睹晨瞻尚念之哉用拙齋箴拙有近於直巧或似於佞巧而不佞斯多能可尚焉拙而非直則踈陋而已矣矧夫心存衒巧固拙者之流而致能用其拙亦去巧無幾噫孰若拙其巧巧其拙以順吾性而不違於理也邪圃箴爾藩外修爾圃内治載朂爾勤所植斯遂喻兹事者可語學焉内外交養厥功乃全圃與學與並行弗悖爰服是箴庶乎無愧瞻松亭頌有序魏國文正范公有舊宅在吴城之北隅宅有二松世傳公手植也其十代孫天章即松為亭名曰瞻松葢將因公之手植以致其景仰之誠也天章與行交間道其作亭之意行歎曰公之聲光昭于後世徳澤被於子孫流於無窮者固不待松而後見也然行於松也則嘗有所感矣公有言先天下之憂而憂後天下之樂而樂能是言也有一夫不獲時予之辜之心焉天不欲令宋大治故小人之害公者衆公之執政也不久有其心而不得盡行于事仁人君子莫不為時惜之然亦知公之後必有能繼其志者矣公既薨公之子忠宣公果為相事業之隆有光前烈於是人皆偉公之義方所致而莫知公大存夫身後之訓也何也葢公之舉動無茍然者其植松也豈茍然哉其必欲其子孫有儆於歲寒之義使無變其所守之節也是以忠宣公勁正立朝屢折不撓終能使功名烜然繼公之後者是松寧不有助也況忠宣而下又皆以直道著稱于時不違先志則是松之遺訓其亦逺矣昔公之先時魏州王氏亦嘗植三槐於庭以三公期其後雖其言卒應然徒望之以祿位孰若公之以徳訓哉故三槐之子孫極盛於當時而至今葢尠見者兹天章乃能好學自修景仰二松如此益見夫以徳訓其後者子孫必多賢也亭既成為之頌曰於巖斯宫魏公之家公也莫從逝矣則遐於顯斯訓公遺於嗣丸丸貞松勵爾窮歲猗歟忠宣是訓克遵碩徳鉅才為王令臣自是以來代有令聞則之度之罔愆于訓爰令嗣人景仰彌篤有瞻于松載營載築築斯營斯新亭岐岐允式是瞻前烈用熈雲岫辭有序吴朱立道氏以隂陽家相攸之術遨遊士大夫間人之敬愛之者多矣番陽周公伯琦由侍御史謝事僑居吴尤相與善間以小篆法大書雲岫二字貽之立道即以之自號屢來求攄其説予因而思之曰物之在天地間而能利夫物者斯良物也物有動焉有植焉而各致其用其有非動焉非植焉若他山之石者至觕厲也猶可以攻玉而成其美况巍峩之岑呴旉雲氣以澤物者乎譬諸人焉一才一藝無不為世所用況用之大者歟然能推一才一藝而廣之可以至於大猶一拳之石而具夫澤物之理也今立道之相攸葢欲人嚮吉背凶而已其愛人之心為何如推愛人之心而廣之仁斯不可勝用矣相攸云乎哉是雲岫之義也既攄其義復繫之辭曰相攸義出詩韓奕章巍巍窽􅀢龢絪緼靜之為用動所根動中復有靜者存天地大和乃化醇其出孔微被無垠霑渥下土萬彚春要知人身兹可倫善端始萌實至仁充而大焉諒在人即物喻理非妄陳審能𢎞之斯道敦園隱雜歌辭陳留方君以常家吴興子城下而與别業之在白龍岡上林者皆以園隱稱某往來三者間登髙臨深弔古㝷幽之所曰龍溪曰仙人項曰石泉曰處士冡并上林白虎岡而六間謂予凡是六者有可悲可樂可泊而休可令人忘于世惜某也無文弗能歌詠以發之使可聞者泯泯願以請於君幸留意焉予聞嘉其志非徒謾遊者因使之道其名狀而為之著辭六其言龍溪波流漫平水色流濊氣蒸蒸時乗隂而起揆之以久豈有龍匿其深邪辭曰可方兮可舟伊之濯兮伊之遊毋遊兮毋濯有龍兮伊宅雲之上兮澤下流毋龍之凟兮於龍伊求其言處士冢不知其姓名世代惟荒榛灌莽狸鼯為家上無新封宰木殘落子孫之絶葢久矣毎釃酒弔之為決然殞涕悼夫世變之難常而形神之易毁也辭曰天廓廓兮髙且明爾獨幽幽兮閟𤣥宫載㝷爾世兮民莫聞風凄凄兮雨雰雰逝不可復返兮夜不可晨千秋萬歲兮同埃塵其言仙人項下陡上平雲樹交擁世傳仙人嘗憇于是天宇澄霽望之隱隱若樓觀變炫煙霞間式造其巔猶飄飄有輕舉意葢清絶境也辭曰巍巍丹霄奕奕綘宫靈焱翼轅羣真以降龍節右弭霓幢左悾來不及迎去莫可從鸞引鵠翥山髙水空其言石泉在白龍岡之麓決石上注泩然而停餘溢所漸草色光美人言泉出而方氏昌也辭曰出之濡縷兮積之淵淵欲知其流兮斯視其根其言上林壤地四平無長谷大山之阻民俗朴儉勤於稼穡居是有桑枲之饒漁釣之樂慊乎其自足也辭曰黍穰穰桑肺肺蠶斯成芸復揭寒莫我加飢莫我莅桑肺肺黍穰穰民所樂天之慶其言白龍崗周廣萬㝷羣山四抱髙林邃塢森直茂蔚果實材章薪蒸篠簜當盛時計其所入幾古所謂素封者故近世恒髙居自養希就祿仕為鄉先生之辭曰嶪嶪崇邱兮屏嶂繚之坡壠宛宛兮與水東馳峒谷窽硿兮林木莽莽中之所殖兮陸海儷富嗟居之人兮復奚之慕生有養兮死有歸處則安兮敖以娱山中之樂兮不可獨只來者其誰兮吾將與俱著辭已復請言之曰使勒諸座右以為山水之寵遂書歸之樹屋傭辯申屠叟居太湖之島木質而不華自奉甚簡因樹為屋自處甚卑以傭自名于方仲子嘗候之與休髙䕃之下客有羣而至者坐而問焉曰洞庭之間有樹其屋傭其名者非子也邪夫羽者集于林游者潛于淵號者叢而家蠢者壤而穴其常居垣以固其外屋以列於中堂於坐而室於寢人之常居也屋之於樹豈常屋乎好逸而畏勞惡賤而喜貴疾卑而慕尊人之常情也自名以傭勞而賤且卑矣豈常情耶或應之曰吾聞之矣橧巢以居亦能遂其生也鉗焉之奴竟以成其志也屋哉傭哉胡不可哉傍之踞者曰嘻橧巢以居無宫室也鉗之為奴有所避也有宫室而無所避何為而為是乎葢凡崇卑髙下等虛名也朴陋莊嚴非實相也而乃滯有為之迹生分别之念非愚其病矣此樹屋而傭名者所以不自覺其卑又豈知其陋也或囅然於側曰斯言也空寂之緒餘也彼固空寂之徒耶今因樹為屋儉之極也以傭自名賤之至也世有三寳儉居其一儉固能亷也然則儉之極也其㢘之始歟髙以下為基貴以賤為本然則賤之至也其貴之端歟言未既有笑者曰向固失之子亦未為得也子言清凈之糟粕也夫叟也讀古今之書修姬孔之業而空寂清凈乎哉凡人之修夫身也知之易而行之難自持以儉猶或流而為侈自處以卑猶或流而為驕既侈以驕去道其日逺矣易曰卑以自牧則不至於侈矣傳曰儉以養徳則不至於驕矣且爾見其因樹為屋而過於儉也不知其處之殊泰也見其以傭自名而過于卑也不知其自待殊重也自處之泰自待之重非有道者其能歟則其儉也卑也皆道也果傭云也哉樹屋云也哉於是衆論紛紜莫折其衷乃旅而興列而進以質于叟叟曰吾倦矣遂卧而不與言于方仲子亦弗能決詳其辭來告余因筆之以俟叩於叟焉二王書帖辯余嘗論右軍行書若所謂不思不勉而從容中道葢聖於書者矣人見其方圓平直無有為之跡而不知其未嘗偭夫規矩準繩而去之也學右軍者不於其䂓矩準繩而求之則亦非徒無益耳觀其父子之間可見故以大令為不得右軍家法者不可以為深得其法者亦不可特大而未化也歟鼎文嘗從余游好學書因之論如此然欲進於書舍右軍吾不敢以勉之疑辯讀經不可疑然疑在學者不可不辨也故疑則聖人之言不行不辨則聖人之意不明姑以二經言之孝經為孔子曽子之問答舊説為出於孔氏之書信矣然其引詩多非類分章亦謬妄可鄙朱子始疑而離析之經以明其綱傳以釋經文固昭昭矣然增傳之十二章所載殊無意義有以來臨川吴氏之删詆也吴遵朱釋而稍加檃括為可憑也然世迨今不能行聖而有位者自堯舜至周公而已周公論為治之道備矣未嘗一言及乎利武王受西旅之獒大臣猶駭而廷諍之不已聖人所為將為後世法一舉手投足未嘗不慎況定一代之制筆為全書宜聖人之所不茍也然周禮之於利何其言之若是其密也如金玉玩好之入玉府良貨美賄之貢内帑山師川長皆使致珍異之物其汲汲於利雖小邦聚歛之臣亦不若是豈周公聖人之意哉其非周公之言決矣小子一髪之疑安得不辯乎夷亭潮辯吴婁江東流百廿里入海則海潮西上五十里抵縣崑山而止崑山迤西三十五里屬長洲邑地名夷亭自昔相傳潮至夷亭出狀元宋季時言屢應至正甲午歲當大比其潮適至𨽻郡二邑人交謂為邑士科第之兆明矣既而士之貢於有司者皆不第人相視盻盻然疑天亦戱警于人或又疑兆於後科于方仲子為之辨曰潮之至與否適也至而應與否亦適然爾且潮之未至夷亭之年士固有取科第者矣彼又何所取徴邪以潮至為科第之兆訊諸父老按諸郡誌雖可徵不誣然其言過於誕薦紳者不道也春秋紀災異而不書其故洪範推五事之得失必原諸人設士或學未究而業未就今徒責望於天是又惑之甚者予未之能黙庸辯以釋之睂喻有用者常於無用者屈非以有用屈也有有用之心故屈也無用者非無用而不屈也無有用之心故不屈也葢有有用之心則怠怠則不習不習則至於無用矣無有用之心則謹謹則習習則至於大有用矣今楊君號睂菴是以無用自處也嗚呼以無用自處迺所以為大有用者與辨色喻蠢動無目而不知色鳥獸有目而不辨色辨色其人乎人而不能辨色盲者耳然則盲者其鳥獸之不殊耶不然也盲者之於色雖不能辨假人則能辨能辨無亂於色也奚類於鳥獸哉今夫白黒易辨也有白其黒而黒其白者自以為視之明而不知亂於色也亂於色有目不如無目矣鳥獸乎人也有目而不如無目斯類於鳥獸已乎規喻為器之難莫難于為車以其方圓平直皆具也然四者之中方圓難而圓其尤難者葢方之用靜圓之用動靜有一定之安而動必周流而無滯茍圓有未至則凝濇膠礙轉焉而或尼之不足以致車之用矣圓之難為如是而車之用也未嘗闕何也有規以為之藉也為圓而必藉於規規其至圓者乎規為至圓而其所由以圓者何所法也亦必法於規耳圓而必法於規則所法之規其圓葢莫加焉是規也惟能取法於前斯能為法于後無異於人之學道也人之學道必有所師者異於常則其為師也足以法矣北郭王光菴先生吴中之碩師也其聞望徳業葢所謂為圓之規而張肯繼孟實師事焉凡其道之所宜知者繼孟無不以叩道之所宜行者光菴無不以應也於是繼孟之所造日以深所得日以富所持日以嚴實日以積聲日以著為規之任日以歸其任其實既已臻輪扁之妙今將之徐氏之賓席則取法之者將益至致夫明體適用之功者將益成而所謂法於人者將益有徵矣於戱圓出於規而圓復可為規則圓之用無盡學出於師而學復可為師則學之傳不窮是皆以其成已者成夫物也以成已者成物則天下無不可為之器亦無不可行之道矣作規喻畫竹喻善畫者不求似非不求似也不迫於形似也譬之臨書迫於形似則薛道祖之按模脱墼矣今日乍晴瀾伯求冩雨意因費一池水墨形雖不似意實似之脱墼之誚不到我矣如疑此説當從米老質之擬𤣥永嘉余君唐卿夷圃萟蔬守漢隂之節迺名其居曰采大夫士製詩文美之者衆矣來徵余言余方讀太𤣥因以采擬𤣥一首貽之時至正乙已孟秋朔也一方二州一部三家天圓陽象三木下上采陽肇厥施兆彚藉以資采蒙其荑行屬於木謂之采者立春之節萬卉茁萌草最昜發采草類有養之道故謂之采采云初一日入營室四度初一霑之毣毣承天之澤一水也天一生水其象性為采行屬于木頼水以生故言承天之澤測曰承天之澤滋其培也水土相應木以殖也次二壤坼於曦被其藿葵溉之勿稽二火之廢也火本為養以廢不能養反有損于木土生于火不受木制故言壤坼必資于灌也測曰溉勿稽恐致瘁也不制以水木必受傷次三茁於豐本蔽􅀈䔿䔿三木之王也又在木世木尅土故其盛蔽􅀈也測曰䔿䔿之蕃類相遭也水在木世象性為采故言遭類次四盜朶頥循其藩無所亡四金之廢也為盜為口故言朶頥為限隔故為循藩以廢不能盗故言無所亡測曰遇盜無亡閑於初也致其謹始之戒也次五尸於圃慎攸取毋溺薺甘毋射荼苦乃貞五土也為君故主于圃甘土味也故易溺苦火味也土之母故不可厭也測曰慎取迺貞從欲斯危也戒之至也次六叔靳於沚惟薦之以無誠有戾六水之廢也為宗廟故言薦凡五行之王者為君子廢者為小人小人鮮誠故多罪也測曰薦而無誠戾之歸也無誠則罪必萃次七鼎而熟茹逾於肉果翁之腹七火也為竈故言鼎言熟為祖父為養故言果翁腹也測曰茹逾肉果翁腹飽其歡也木為喜火為樂火在木世喜與樂并故言歡也次八莛之碩有皖其實㝠八木之廢也有衰謝之道然在木世又為多子故其莛碩而實實之成榮則斂矣故言㝠也測曰皖其實冥揫諸内也既成上九時之隕籜其榮濯濯被霜如沃載庸為蓄九金也金本尅木然在木世八之隣又為木象性為采木既盛矣而金以隂類處老陽之位故不能為厲所以其榮反濯濯如沃然物至于九則亦老矣故止可為蓄也測曰被霜反榮不屈於時也載庸為蓄終克自拔也不為所克能致于用也芥舟贊謂天地之大莫大也特語其形謂一塵之微莫微也徒論其迹莫微之微詎不能充廣於無垠莫大之大寧不可歛藏于微忽滯於形迹者不足與見不可見之妙拘於限量者烏可與造容無所容之域加大千於毫􅀢未覺其多納萬象於黍銖不為之隘惟拘無能喻之微而向於言不可名之大然後為逹人之觀至道之極也芥舟之號豈亦有見於是而假其稱以寓意乎若然則是舟也汎諸廣漢之淵浮於無何之澤亦不覆而不溺矣晉光禄勲顔含贊有序當司馬氏之東遷風俗既隳綱紀已墜士之侃然自信守道不囬者無幾也而光祿勲顔公含乃能不溺於時持貞狥正予固已髙之矣及觀其答馮懷之問迺知公葢汲長孺王休徵之儔也然長孺不屈於武安侯卒為孝武所重休徵難晉文之拜亦既為魏元臣以公之賢獨不得大行其道果何如也耶使是時王導有知人之明急賢才之志登而庸之則其所為必能振頺而興靡迺視其老於未衰邈無留之之意其責安所歸乎或曰天時人事之變於時已極正君子隠藏時耳就令公復用其骨鯁忠赤將難容於時而致不測之患優游以終亦詎非其幸也雖然推公之侃然之心葢非茍求幸免者誠能用公於大則太宰之禍必有以折其姦謀而不至若是然也豈天之亂晉而靳於賢才之用也歟遂為贊曰繄古君子曷依曷違忘人之勢道義是歸惟光祿公爰體於兹固持厥志侃侃弗移鄙夫小人末焉迺趋望塵以拜不愧公歟吁嗟公道莫克大顯孰任爾尤斯導之淺道可欎也志可屈耶千紀寥寥淑可没耶明月舟贊明月在天舟在水以月名舟良有以月來舟中光洒洒舟行隨行已隨已有屋臨波舟可儗舟自常流屋常止我聞名跡相假耳呼馬作牛桃作李堅白徒勞疲頰齒此屋此名非與是請君往問無言子七賢圖贊惟伊七君髙迹邁倫放情任曠於酒得真劇談𤣥虛辭義錯陳謂彼禮度傷和敗醇遂令其徒千載欲親兹睹遺像邈慨斯人雷雨䕶嬰圖贊疾風斷途零雨漂靡有婦畏雷乃掩兒耳伊婦與兒知必母子茍非母子胡愛如是兒之云幼母保䕶之母之老矣兒將何為凡爾君子再展斯巻是觀是惟繄學之勸欝林石贊孫吴欝林太守陸績仕歸無裝舟輕則泛江不穩也載是石以鎮之歸置所居門外人用稱之表其㢘節石尚存予居吴門東北陬相去僅數十武旦暮見而起米芾之敬仍贅詞贊之載貪而歸名隨賂隳航㢘以入譽久無斁臣道若流爾克孤障萬古凛然盍拜斯丈牛監簿贊有序宋石曼卿與僧秘演為詩酒侣一日謂演曰館俸清薄甚妨痛飲演曰當引一酒主人奉見有納粟牛監簿者髙貲好義嘗語演某雖薄有貲産而身迹塵賤慕師交友盡館閣名士或游奉有闕無恡示及演因諭之攜謁曼卿令致官醪十擔為贄演為傳刺曼卿問何如人演曰前所謂酒主人者也牛生亦精度詳雅曼卿延與閒語演曰繁臺寺閣虛爽可愛久不登矣生乃離席曰學士與大師果欲登閣預需下諭别舍介繁臺之側正與閣相對容在閣迎候石諾之一日休沐約演演戒生生如期陳具於閣器物殽核豐潔冠都下石演褫帶髙歌飲至落景曼卿醉喜曰此游可紀以盆漬墨濡巨筆題云石延年曼卿同空門詩友老演登生即拜叩曰塵賤之人幸獲陪侍乞掛一名以為華寵石雖大醉猶握筆沉慮無以拒之因目演演醉舞佯聲諷之曰大武生捧硯用事可也不免續題其下云牛某捧硯後歐陽永叔戱以詩云捧硯得全牛當時傳為佳事生于其流亦可謂善於振拔矣不獨竊餘輝於石演而又入歐公之賦詠非其自致如此今亦安知所謂牛監簿耶澹如子於此有慨因為之贊曰才者天所畀學焉我之修天我既已一貧富非吾謀富來不可辭富去那解留辟如凍雨至水中㸔浮漚石演非不貧日夕醉始休牛生豈不富錙銖夜㝠搜而我奚取之與世有不侔自拔泥滓足逍遥陟崇邱雖非己力至所攀異常儔不有繁臺書姓名存以不纎羽附鵬翼得遂雲天遊故令千載下詩中詠全牛茍徒事乃身孰辨誰與疇爰知名不稱沒世良堪羞勝彼足自喻芻言斯令猷讀書圖贊瓊玉之瑩然者賦之姿春陽之煦然者氣如斯莊而不矜見其閒暇之度靜而匪懈若有深沉之思承灌木之嘉隂來靡靡之凉颸玩芳有蘭挹秀有芝而乃燕休也不釋於簡編葢將求粹美於聖賢之是師置此心於羲皇太古之上夫豈徒讀其書而誦其詩也與天台陳太史像贊台嶽鍾産吴城遷僑神清氷玉氣和絃匏潄六藝之芳潤胷次儼羅夫星斗起八代之衰弊毫端倒捲夫波濤斂跡於勝國揚英於昌朝校勘東壁之府著述西清之曹傲睨區宇而覺隘凌厲雲月而愈髙噫吁􅐵若人也凝絶類之學術擅不世之文豪盖將延歴滋久而猶可想像其風標者耶戸部滕尚書像贊容之豐氣之充所操㢘而秉忠當草昧嘗與殄妖沴際天造則克贊神功甘雨力祈蘇槁震霆莫及掩聰𠂻心無愧由不虧臣之節史筆有定盍載其事之公俞立菴像贊氣充然而色温然是特其貌焉爾峩其冠而博其帶豈徒容而已哉至其讀古人之書不獨究其言修在己之行非惟事其外英妙之年翺翔于中朝而不有其榮遲暮之境落寞於江湖而不易其志者顧何人為相知抑幾人而能是乎雖然不事於外詎自以為能不有其榮曷求知于世此先生之所以為先生而君子當尊而貴之也耶茫茫道人真贊以其貌而觀之則皆謂之癯也以其氣而觀之疑其内之腴也雖然吾亦不敢自是葢將叩之以究其何如也蒼山真士贊才之脩兮氣之昌學之邁兮文之光天之于君其允臧既不及施復厄於時獨胡為乎而靳於斯然觀人者不於其身於其𦙍前之靡兮後之振孰為是言繄道之經嗚呼噫嘻子孫有徵周處士遺像贊身若不勝衣非弱也内既豐而外似約也言若不出口非訥也辭弗華而行斯實也繄厥有兮孔良葢藏焉而未試遘世路之失夷抱其全而以逝吁嗟斯翁遺容若兹儼姿儀其如在黯怊悵兮瞻思東臯子真贊其外之容若惰也而内究夫幽𤣥其偃而休非肆也聊以適於自然和可餐兮醇可茹嗇之充兮顛之痊芸芸者徒熈熈爾年豈所謂全己之天以全人之天者耶李髙士像贊藹然其容炯然其瞳内養既豐外氣乃充其止也玩月華於秋水其動也㸔雲行於太空况乎學老莊而不泥其潔身之迹故能事軒岐而多成利物之功周自牧像贊觀其燕坐也若無所思聆其雄談也何贍於辭似不足於魁梧之貌而有餘於溫潤之姿年雖髙而氣不衰内既腴兮外若羸子盡歡于滫瀡又承志以書詩吁嗟之人祉福爾滋爰徵厥倫尠或似之繆仲素真贊於其容己見其天質之美於其言而知其讀書之功其守可尚足表其所嗜之淡其行可嘉足驗其所學之充是所謂粹然之善士可視為臞然之素翁耶王立方小像贊有序古之論人必以氣為主觀其氣可知其有為葢事無大小非氣不能決不能決則將牴牾變眩式戾其所以為事此氣乃能有為也然所謂氣亦豈馮凌觕厲徒加於人者哉在於學之有素見之能明養之既充而決之能果焉耳今士君子之獨善其身而能利夫人者惟醫為然醫之善在乎能決然非茫然決之而已疾之來也逆焉從焉攻焉守焉決之各適其可乃克收治安之功不然尠弗致危者余友王立方氏性度開朗才具通適學問修明而聞見滋逺夫以所負之才施無不可顧約而承家業之醫於疲癃閼札之被其利者葢廣宜乎致聲之籍籍也然其姿貌屼屼無委曲俯仰意態有類乎尚氣者其為氣也豈徒加於人哉所謂學之有素見之能明養之既充而資之以決者矣觀其像可見其為人況余知之者因為之贊曰屼然之貌足以勝其所負超然之懐斯以表其所悟儒猗以醫綽有餘裕是誠得乎問學之功匪徒有於游揚之譽此余所以豔於衷而不啻如其語也半軒集巻一
