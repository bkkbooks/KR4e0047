body:
  text: 半軒集卷三明王行撰記石屏記孔翠翬翟之文甚麗也而弗能堅雲霞華彩之文甚美也而弗能久繪繡綺錦之文甚工也而假力以為之故豫雖或睹之而不愛非特不愛而又少之以其文之著也惟山有石焉異於是精緻而清潤中溫而有文遇識者致之剖琢礱砥飾而為屏則若渾淪始判而萬象列焉若月未生魄而山河鑑焉若敞綃帷而望嵩華焉若懸方諸而照華月焉其文之見者兀而舉然漫而偃然若蓊而樹若奔而瀧濃疑其邃淡疑其逺黝疑其幽蒼乎而古黛乎而秀廓者天淨漠者煙積暝焉如隂皛焉如晴涓焉如澄竒態瓌狀依微窅眇言可得而殫盡耶至麗而能堅至美而能久至工而不假人為故豫甚愛之重之敬而友之何友之友其有君子之德也方其未遇時頑然混凡石而不自異而中之包含藴蓄者自若也及見用而披豁呈露於初之包含藴蓄者亦無加焉不幸或復見棄汨於泥沙淪於榛莽則於今之披豁呈露者又豈有所損耶世之士能含其文而不自見用藏進退而不變其所存則於君子不逺矣故豫敬之而忘其為石也若夫徒飾其文以為玩夸其奇以為美則斯石也有愧夫渤海朱叔重善畫而好事喜從文人才士遊有小石屛方不踰尺而溫潤清古自言得之石偃山中而求豫為記夫叔重既能知求余文而石屏又豫之所愛可不為之記乎且尚使夫人知豫於斯石也非徒愛其文而以敬其德也讀書屋記先王之政不修而小大學廢後之學者讀其書而已矣讀書者第欲以識其篇章通其句讀則雖髫稚無難焉然求其得夫讀書之要乃有垂白而莫究者以漢之碩儒老生猶未知其萬一也蓋讀書非徒誦習其章句講説其文辭必當因聖人之言求聖人之道由聖人之道見聖人之心也方漢儒當煨燼之餘追求散亡修殘葺墜著述纍萬言而不止可謂勤且勞矣而卒鮮合聖人之道者不究夫讀書之要也由漢以還虛偽日張崎嶇其坦平雕繪其完素紛綸授藉各是其是學者莫知適從而聖人之道益昧昧矣炎宋既興斯文之運漸復濂洛諸子出聖人之道乃明然程氏甫沒而門人已有駸駸於老佛者況無大賢為之依歸而守陳編窺斷簡者耶暨夫徽國文公集大成而纘承丕緒決澄流導深源幽通滯達濂洛之道始大行於時迄今而愈盛今之學者讀其書而議論言説或戾於道者幾希不戾於道宜今之士可幾於三代而終有愧於漢何也蓋濂洛徽國之言聖人之心也其行聖人之道也襲其言不心其心談其道而不行其行欲無愧於古人得乎乃知聖人之道雖不外乎書而非徒誦習之可得也雖然先正有言以傳解經經通舍傳味之既熟道在胸中并經亦舍之矣嗚呼此其為讀書之要也與會稽唐君處敬力學而能文多識而好古以讀書題其講肄之所而丐豫為記處敬既能讀聖人書求聖人道尚奚言哉顧朋友之義不可辭姑道所聞以塞其請適軒記適軒者髙平范德謙與其賓友燕處之居也德謙敬謹退讓喜從儒先君子遊聞人談説古今人物賢否興壞理亂是非得失之故聽之終日不厭治一堂以待賓客頓設茶荈蔬食必懇盡其勤厚以故士君子不靳友之及其友浸博日之來者多周旋不容於一室乃再徙之始購得鄰家隙地度為園屋其中六楹旁為翼舍而軒其前令髙敞明達植梧竹雜樹映蔚庭戶蕭爽心目至者咸悠然忘去德謙甚樂之來告曰某之接奉諸君杖屨則是居也某日以處諸君日以萃焉可無名乎豫問之處若萃也何如曰諸君之萃講學以相資某之處竊私其誨導之益則亦各得其適也豫曰若然以適名足矣遂名之復求文為記為之言曰凡人有所好則必有所適然而聲色之娛逸遊之樂適者恆多焉其次學問切劘為悅者非生徒之美弗能也德謙乃知舍彼而取是亦賢已哉今夫人有樂於娛戲有樂於服田者方其適意時固亦無所辨及秋之至也娛戲者卒無所獲服田將不有得乎德謙既能適于是使終始不變秋之得蓋必有望矣故為之記而復勉之先硯堂記吳東南之大邑曰嘉定武林王君彞之居在焉其居有堂基構崇厚尊嚴固安題曰先硯之堂蓋居其先世之遺硯於其中也彞以書來吳道其所以名堂之義屬為文記之按書彞之先本陳姓曽髙而上世以文儒為宋官至祖吳山翁入國朝為江浙稅課提舉襟度超邁嗜酒不羈垂五十始生子某是為彞之考東軒先生也東軒生二年而母亡四年而提舉君殁孤煢無依歸育於外氏年浸長資性明悟外氏欲子之稍祕其姓以是鮮知其為陳氏子也及其學修行優德業聞著郡使者薦其才於宰相署為儒學官皆誤姓之以外氏之姓堂帖既下而甫克知固辭弗許因屢自辨之未獲釐正遂至於今焉初東軒君之就學也得家所遺之舊硯用之至夫學業底成歷官南北恆以之自隨厚藉深函保愛彌至後病亟指以示彞曰吾即死他無與汝言第姓之未復吾遺恨也陳氏故物惟此硯在汝能見是而思我陳宗必復矣勉諸彞泣而受并書遺訓而識之蓋將候其衰服既除陳詞上論以求反正焉先硯名堂所以示承先訓而不敢志也其書又曰吾家不幸中微先君子幼失怙恃然能間關自立思奮其身以紹祖宗之緒其亦難矣而彞則生長燕安早受家庭之訓洎乎從師交友所須無不備焉視先君之樹立艱難為幸則既多矣惟以才質庸下學行荒迂竟未能有為以完先業此日夜所以疚心也况遺誨諄諄曉然在耳倘不克承荷以遺先君之羞其罪可勝負哉今兹堂既構奉其遺言遺器合櫝而藏之候陳宗既復則啓匱陳器敬誦遺言以復先君之命是彞之願敢請記之以為朝夕之勉焉嗚呼若君者可謂能繼其先志者矣蓋自先王之政不修而古之宗法廢宗法廢故譜牒不明而姓氏無紀於是冒姓易姓賜姓及訛聲之姓出矣其間能致其根本之思而自歸於宗者無幾也兹觀東軒父子之所為其不有異於人哉且夫一硯之微而君以遺言為重嚴奉之如此則其於宗祀之係將不益盡其心乎有以知陳宗之復振必在於是庸書而記之吳松漁舍記吳松江名其源出自天目東北入於海其曲有姚城者地藉松陵滉漭數千頃平波滂流煙濤風漪朝霞澄而夕景霽雲月蕩而魚鳥嬉景象日百變加有粳稌桑苧之饒萑葦蒲荷菰芡菱蓮之利而又逺攬玉峰近挹白羊穹窿橫山洞庭諸秀爽蓋佳境也吳蔡彥祥之漁舍在焉舍間林園翳水竹衡門茅宇通敞清邃琴尊在前圗史左右是幽人隱者之居也而題曰漁人多昧其旨豫未識彥祥時固聞之已洎識而稔之始知彥祥嘗一出矣回瞻庭幃皎爾垂素於是愓然謝事歸養親焉夫養親甘鮮滫瀡其具也吳松澤國鮮食之美所聚彥祥寧憚於漁哉使其居山吾知其不憚獵矣且今操網罟持釣具入煙水以趍魚者豈必題其居題其居士而漁者也人奚訝哉抑又聞古有獵於書者矣彥祥好學而勤簡編在几又安知其不漁於書耶漁於書以求其理漁於水以求其物求其物所以養其親求其理所以顯其親其彥祥之志也哉志也如是知養親之道者矣豫方嘉之而求豫為記遂為之書佩韋齋記蒙城髙君隅仲隱居虞山之陽力學自修常結韋以為佩因題其齋居曰佩韋間請於余屬文為之記余曰韋既佩矣復題其室而又欲記之何也曰某之居是也俯可以見所佩仰可以見所題庶幾乎知勉焉復得君之文以朂之朝誦暮維則益不敢偷惰矣此某之願幸無致拒也余曰所為佩韋者非慕古人之自警者與曰然曰古之佩韋者二人焉曰西門君曰范史雲也兹將誰慕者夫西門之為人性剛以急故取韋之柔緩以自警焉而史雲則亦效西門耳隅仲之欲自警亦因二人乎余嘗觀西門之沉巫治渠雖皆出於剛決而詞氣雍和不威不厲亦可見韋之有助也然而能使民不敢欺則又非柔緩之所致也於以知其雖假韋以矯性之偏而能自適其宜不至於過不謂善于取物以自警者乎若史雲者雖云佩韋而猶亟隘亢厲詭激終身未嘗變焉於韋果何得哉是則同於佩韋而不同於所得也以隅仲之開敏通明自治不怠其所慕也必在西門而不在史雲矣雖然抑又有説焉夫剛則必急柔則必緩勢之固然也急則易以敗緩則易以弛又不能無偏失焉故琴瑟之張也過急則絶過緩則不成聲車馬之行也過急則顛覆過緩則不前緩急之間固當有道矣佩韋者可不知是乎西門氏則能知而能行也已史雲能知不能行也隅仲既學西門烏得而不知是哉知是已烏得而不能行哉既能知又能行固隅仲之所自勵而亦余之望於隅仲者也其謂何如曰君之言某之志也非君之教之某將何以正之哉請書之余曰諾遂書以為記筮室記事有常而有變語其常可因其已然以推其當然語其變則不可以其當然而計其必然也事既不可固執其常又不可逆虞其變然則未至之事果皆不可以前知而思深憂逺者終不得解其惑矣此聖人所以慮天下後世而筮之法所由設也卜筮之書曰易而已夫易廣大悉備將以順性命之理通幽明之故盡事物之情不専於筮也至其決嫌疑定猶豫以開物成務非易孰能與於此哉由是言之易固不専於筮而筮非易莫以也然而包犧之畫易之象也文王之彖周公之爻孔子之贊易之辭也是皆己成之卦一定之書所謂居則觀其象而玩其辭者也若夫臨事以求一卦之象於羣卦之中觀三極之變於六爻之內以定吉凶據吉凶以決事則必假蓍以問焉傳曰聖人之作易也幽贊于神明而生蓍蓍神物也以故問焉而以言其受命也如響無有逺近幽深遂知來物然則易必待蓍而後吉凶以告非蓍固不可以問易也蓍其烏可少焉哉太山羊君某務學好修精于筮以占之擲錢求卦非聖人之意乃求聚蓍以古法揲之其將筮也齋戒沐浴以命蓍既筮己虛心端意以觀象故其吉凶之衍有奇耦焉居處一室虛明安靜名曰筮室間請屬文以為記於戲羊君之於筮可謂精矣惟古法是師而不流乎習俗宜其占之驗也顧惟筮之功大而易之理微余何足以知之而敢言之矧其妙又有不容言者將何以説哉雖然亦有以復於君矣夫易之為書聖人立筮以為教其言嚮吉背凶皆踐履進修之道也學易者可徒視之占決而不以反諸身乎管輅郭璞謂有得於占矣于易果何與哉窮理盡性以至于命此作易之極功能體之則幾於易矣以君之師古好修不可不知是也能知是則所謂不假卜筮而知吉凶者又當與之論焉是為記滄浪軒記句吳吕君志學和厚詳雅務學而多文所與遊皆名人勝士締余交則友愛尤至者也間來告余曰吾友有吕彥貞長洲人也年芳茂而謹諄諄力學士大夫嘉言善議聽之未嘗倦蓋有志於學者也家處一室旁列圖史開軒臨水疏達髙亮題曰滄浪慕君之文已久無與為介兹託某以請幸為之記焉傳云不知其人視其友余雖不識彥貞然徵諸吕君則可以知其人文固不能辭矣昔者仲尼聞滄浪之歌曰清斯濯纓濁斯濯足自取之也彥貞以是名軒豈欲因自取之義以自警且自勵乎均水也或以濯纓或以濯足均人也或致尊嚴或致欺侮豈偶然之故哉名宗右族昌盛之時顯貴光榮希或與抗而為之子孫者摧謝雕落流於猥下不得與中人齊是烏可諉之盛衰之數亦其自取然也至若家人編户乃有奮發振厲不溺其習修飾其言行鐫切其問學拔出乎庸常之流而置身於尊髙之地者非其自取與然推是兩端可以知其名軒之意不苟矣彥貞其誠有見于是乎有見于是吾將見其學也如川之增矣可竹居記吳有道人姓徐曰子庠年老矣精明強健業醫以自養居市門東卑垣委巷而室屋翛然循垣四周篁竹森植長梢茂葉拂户牖而鳴清風搖階除而散踈月煙霞來棲埃壒罔至所謂城府之林墟區中之物外也余見而歎曰信乎蘇子言不可居無竹是居其可竹哉道人聞之恍若悟解即以可竹題其居來謁文為記余謂道人隱者也又嘗為醫者也竹何事哉雖然吾知之矣蓋醫之為術治人之疾者欲治人之疾先淨已之心已之心淨則疾之來譬物之當鑑莫能自匿然後治之功可濟也今道人之居是無囂雜之煩有蕭間之適外境己先淨矣外既淨內其可不淨乎宜其起人之疾若灰之浣垢無留難也然所以去囂雜而致蕭間者則又在於竹竹其果無助也哉有竹焉記之宜也道人之欲文誠以是夫言未既作而謝曰是實某之志先生發之而愈明請得以朝夕諷詠焉余嘉其志遂書之清安堂記東陽沈達卿氏居吳長洲之周莊奕世以來咸以勤慎敦願處鄉里治生修業日以優裕至達卿産益廣資益饒勤慎敦願益甚而浸文以飾之他無所嗜惟蓄經書子史古圖譜法書名翰之迹樓而庋之籖軸彚列暇則左右閲視喜溢眉宇間曰此吾所以為子孫者乎此吾所以自樂者乎聞者莫不嘉歎所居之堂庭戶靜深棟宇宏邃晨光可辨几席既安子婦孫曽秩焉序進問興居奉甘毳怡怡翼翼四世一堂周旋而下上所謂禮法之家益將求夫庶幾焉堂之題間炳然有書曰清安之堂以締交于余也嘗揖豫西階以升指其題以謂豫曰是書也示諸子孫而已非欲以自命也儒先大夫不遺而見教者多矣幸子日相親與宜見知為尤深願得文以記焉豫不能辭也蓋亦觀其家政矣外嚴敬而通融內歡愈而肅穆齒尊者不耽於滋味以極口腹之嗜年富者不惑於聲色而湛綺紈之習其欲則既淡矣欲淡故神清神清故氣和而體安氣和體安故動靜語默之間益可為子孫之法矣則清安也誠豈達卿一身之謂哉每子孫之定省也恆謂之曰吾之與若得優遊於堂宇之下從容於閭里之間無手足之勞衣食之慮者祖宗之休澤也可不思所以答夫祖宗者乎答焉無他使祖宗之業益昌而弗替焉耳今吾之年甲子一周矣茍得聞賢人君子之言且服焉而不自惰況年之盛者顧不日親夫明師良友以成其學耶益昌祖宗之業吾今有所望矣子孫咸俯首受教退則侃侃各存其自修之心焉於戲學之一言其清安之基本乎夫學所以明理以自治也理既明斯欲愈淡欲愈淡斯神愈清神愈清斯氣愈和而體愈安氣愈和體愈安斯學愈進學愈進斯有以遺其後人則清安也豈特示今之子孫今之子孫將各示其子孫矣清安之胤承承而來曷可量也祖宗之業不由兹而益致其昌大已乎則清安也後將有以名其鄉者矣是為記心逺堂記豫嘗觀夫君子之澤矣其出之者深斯其流之者逺也後人能承其先世之澤而益為先世之為則其澤也愈逺而無窮矣昔人之基也而我堂焉昔人之災也而我播焉則必致夫構之成而穫之實不惟使先業之無替將益加之光美焉則其為子孫也誠克盡纘承之道者哉若松陵張氏其亦庶幾於此矣松陵吳屬邑也其地有儒林瀕太湖之隂張氏之居實在焉張氏資素饒宗族亦盛先數十年時有以翰墨著稱者為心逺翁心逺字清夫疏達明秀與遊多中朝巨卿湖海知名士嘗受書法於吳興趙公己造其堂嚌其胾矣方被薦北上除二山東之魚臺忽有歸與之賦時人髙之鄧匪石虞邵菴咸著文以為餞翁既歸優遊鄉里以文墨自娛題其堂之顔曰心逺人因以為號焉今觀其所自賦與姚江村黃文獻諸公所為賦心逺堂諸詩亦足以想其風度矣心逺之孫有名琦者端厚有為不事紈綺乃闢其故居而擴大之仍新夫心逺之顔以示不忘先德也間因豫友信菴簡以告豫以謂自有兹堂以來大夫士為之詩歌者多矣而未有記之者也冀得一言用垂永久故不揆以請焉余不云乎克盡纘承之道者乎張氏蓋琦其人也琦之聲聞亦稔矣及是舉也蓋以充所聞之有考也且夫前人之造其基業而為永久之圖者固有望於子孫之賢也然子孫之能修其世業而不孤其所望幾何人哉非夫先世之德積之厚出之深而流之逺則其澤也有時而既矣由是言之則張氏之先積德之厚為何如耶余所以不辭而為之書俾傳之子孫將益光其先業以致無窮之澤也哉常春閣記青陽之發育固一歲之端和氣之沖融乃四時之貫蓋和氣為春之本而春又時之本和氣之貫乎四時是春之行乎四時也夫溫熱涼寒時之敷施有節生長收藏時之功用無窮自其有節者觀之見迭運之恆殊自其無窮者觀之知貫通之惟一一者非他和氣而己和氣之所在春之所在也四時常和即四時常春矣四時常春此功用之所以無窮而處身之所以當效也與吳興沈由規豫友也其所以自處吾知之矣何自而知之自其名閣以常春而知之蓋閣也其退休之所也知名退休之所以常春斯知以和自處矣知以和自處則親親之節豈外是哉然而一歲之中既有溫熱涼寒之節一日之中又有旦晝夕夜之節夫節所以適其和也有其節斯能致其和焉由規欲何以親其親哉吾意其仰承顔色則思其旨甘之奉燠寒之問疾痛癢疴抑搔之節焉其退休於閣也則思其飲食之宜起居之謹賔敬拊循雍睦慈惠之節焉迹兹以往蓋將無所不節無所不節斯無所不和矣噫是其名閣之志也與閣之得名既久祈豫記之亦久矣顧未能如其請也兹始諗之兹説焉由規作而曰斯言也誠某之志也請書以為記春草堂記春為四令始三令皆所以終春之氣不有其始則無以為終是春之氣亦大且博矣凡物一受春之氣以生而草則其易生者草之生也一旦蔽原隰信宿窮蒼莽其非尤易生者乎以易生之物而受博大之氣天地間無隙壤矣然春生物不自德而受其生者則德之也天地者萬物之父母而春者父毋之生氣受其氣則當知其所自出一草之微猶然而非草之微者其謂何哉人於天地間猶草之盈壤地也草盈壤地猶不忘其所本況人靈於兩間顧可忘其本乎天地者吾祖之所本吾祖者吾親之所本而吾親吾之所本也吾之所本報之宜如何耶即其能為而為之不遺其餘得為而為之不至於過亦足謂報之與古人所以興寸草之心難報三春之歎也嗚乎昊天罔極終能遂其報哉雖然盡其道以自治存其心而不懈亦孝子之善處矣溫陵陳彥廉氏題其奉親之堂曰春草徴余記其義也書以貽之靜者居記張君來儀之入吳也豫得內交焉見其沉厚沖默心甚敬之洎詢其鄉則九江著姓世以儒素相承其來有自矣君既壯去鄉泝江踰浙受易于山隂尹夏君仲善甫暨卒業四方兵起道梗不得歸因僑于武林之東里閉門謝客以學自勵大夫士希得見之或曰是靜者不可溷也君聞之喜遂以靜者居題其室及來吳屬豫為記曰使吾得勉焉以無負名吾者噫君之志善矣哉顧豫庸陋何足以言之雖然願交於君而不獲者有矣豫顧得執筆以奉之詎非幸也其亦敢終拒乎竊以聞於先哲者復焉蓋凡人之性雖有靜躁之殊而其同得於天者則本靜也以氣間於有生之初欲蔽於既生之後其本靜者始汨焉君子之為學將以擴其物欲之蔽正其氣稟之偏而反乎其本靜也故學焉而有成則恆在乎靜有非躁者可得而同矣昔者孔門之子張已有聖人之一體惟其過髙務外難與並為仁況其下者乎以子張之量髙志強固不至於躁較夫深潛純粹終日如愚者則有間矣此聖學之傳所以于是而不于彼也故程伯子云惟靜者可以為學叔子亦每見學者能靜坐輒嘉歎之周元公則曰學之要一而已一者無欲也又曰無欲故靜雖其意各有在然惟性靜然後能靜坐能靜坐然後能存養擴充由募欲以進于無欲也無欲故靜則其靜也大矣嗚呼此大賢之事豫烏足以知之而敢言之耶然而自衆人學以至於聖人則亦不外乎是矣今以君之生質之美而復加之以操行之髙問學之篤如此譬猶駕良駟而騖通衢亦何所不至尚奚負其人之足慮哉若夫動靜本原之理具于大易之書君日講之必詳矣又不待豫之勦説也是為記蜀山書舍記吾郡徐君幼文為人清介有氣節立志髙逺博學多聞見喜為文詞古詩歌以自適年甫壯遭時多虞不克施其志乃避地於吳興之蜀山立屋以讀書焉屋成徵豫文為記未果為也歲乙已春君來吳復以記請至秋又請焉余謂之曰春秋之法常事不書非不書也不足以書也今夫為學必有講肄之居人事之常耳君以讀書而立屋焉非常事乎而汲汲欲記之亦有説與豈是居也有構締之精刻琢之美丹雘之藻麗足以記之與則務外而遺中絢華而棄實於學蓋有損焉不可也豈以山之髙可以資覽觀溪之深可以事遊泳泉石之奇秀可以供勝賞之樂為足記與則未合乎藏修遊息之義而先致夫玩物喪志之失焉不可也而君欲何記哉君曰皆非也惟僕以不敏之資以荒于學恆有歲不我與之懼今幸得溫其舊習於間靜之所故欲識其歲月于壁得朝視其所識而自省曰居于是幾何日矣學其有加于初乎夕視其所識而自省曰居于是幾何月矣繹其有加于初乎不敢望日有進而望月有進焉不敢望月有進而望時異而歲不同焉則僕之願也子何不成吾之願乎余聞之瞿然而謝曰斯過矣交於君而不能知君之志有是哉豫之陋者尚足為之記乎雖然君之命亦不敢終拒也遂記之曰徐氏蜀山書舍其建也始于至正二十有四年歲甲辰秋九月某日其成也距始建之日後幾十有日焉入而居之則又後于成之日幾日而當某月某日也石林書舍圖記吳城西多山其名師者於城為最近望之其形若獅然故名其山多石而少壤草木皆堅瘦踈碎其挺然以修蔚然而林者皆在乎山之麓而麓之陽則石林書舍在焉書舍者同郡周伯常之居也伯常居於是耕鑿桑麻以養其親讀書為學以娛其志宗族既以言其孝交友既以稱其良而里閭鄉黨亦有善人之舉焉親既歿居以兵毁遂擕家比南僑于濠郡而其晝而思寐而夢未嘗不在乎師山之麓焉曰吾親不可得而復見矣然吾之鄉猶在望也吾曷時而歸吾鄉耶其友有聞而悲者為之繪其故居之狀為圖以貽之於是伯常朝而向夕而面不是圖之或離也曰吾未能歸吾鄉覩此可以少紓吾思矣因託其友羅可道求為是圖之記嗚呼繪畫不足記也然人子之心孰無之故鄉之念孰忘之豫雖獲朝夕奉承乎膝下之歡蹤迹不出乎鄉井之外然豈可以吾之幸而遽不恤人之不幸也則是文也雖欲辭不可得而辭矣為之言曰人之所以為人者以其知所本也本者何父母之謂也記曰入里必式非式乎其里也父母之等夷所在也詩曰維桑與梓必恭敬止非敬乎桑梓也父母之鄉之産也父母之等夷所在必式之父母之鄉之産必敬之況於父母之居乎今伯常親殁之後既懷永慕之戚况親舍復毁得不重其戚與則其寤寐不離乎師山之麓者誰不宜哉若伯常可謂知所本矣且夫人之於交友也樂為之樂憂為之憂庶得交友之道焉今繪圖以貽之者既欲紓其憂而求文以記是圖者亦以慰其憂則二人者可謂知夫交友之道矣伯常既能知所本二人者又能知交友之道是皆有典常之係焉豫可己于言乎伯常也觀是圖而誦豫言可無槩之繪盡所視為文辭也已是為記處菴記古陳姚君家吳城中闢燕居之室靜深隱奧題於顔曰處菴嘗坐豫而指其題曰將以自警也願得一言使朝夕誦之幸也敢望已乎客有囅然于坐曰夫名然而實不然非也實然而名不然亦非也以君之才方將奮厲磨淬激昻軒揚出而為世用史而士士而大夫發其藴以行其志使上有所裨下有所惠也命以處焉其名之然耶果實之然耶或曰不然也世固有迹處而心出者謂之處可乎迹出而心處者謂之處不可乎因其迹以質其名究其外以遺其內矣豫曰噫名實之論得矣內外之説韙矣然皆不明其題之之義也夫世之事萬變而無窮日往而弗息以無窮之變而弗息之求則將何以得之哉要在處之而已矣然求而弗息固無不應之道變雖無窮而有一定之理以一定之理而處無窮之變無不得者也今君好學慕義周謹詳密懼有茍焉之失故自命以處焉則處者審擇慎處之謂豈隱顯之謂哉君來朝視其題曰處乎夕視其題曰處乎是能服如之何如之何之訓者矣言未既君作曰潛有心而子度之至矣請書遂為處菴記潛君名字處道云來德堂記東吳李君士明嗜學修行尤精於炎帝軒轅岐伯之言起人癃疾聲聞著揚大夫君子咸敬禮之君之所處琴瑟是陳圖史在列題曰來德之堂以豫友之深也徴為之記辭有弗可因究其故焉蓋君之為醫授受於莊先生子正先生吳興人早孤而貧克自力於學通某經連試有司連屈落魄江淮間無所遇乃更事醫醫之道殊振以來德名其寢有子多病指謂君曰是兒非夀器吾後不知所托如至不幸實有望于子君敬諾焉先生沒果無後君既畢心喪圖像奉之家歲時修禮唯謹兹以其名堂者亦以示不忘也嗚呼吾於是有所感矣自世教衰風移而俗下相師之道不篤昌黎猶未知籍湜輩能不叛去否程氏門人淫于佛老者有之今君於先生受醫業耳顧懇懇若是其所謂君子者乎然古有感人之德而以其姓名其子者矣有慕人之賢而以其名名已者矣況師弟子間耶則君之名堂亦宜矣雖然寧獨是哉夫德者吾之所得於天者也惟不能操而存之故有已焉失之者茍一旦反求諸己則其德復為我有不待求之而自無不在此庸人聖哲之所以分而學者所當盡力者也今君能因名堂之義而益加反身之功則君也吾見其不獨擅聲於醫矣是為記三事記余平居暇日喜聞四方士大夫談説湖海間舊事然奇迹異狀多莫能記惟三事雖非奇偉然可為學者勸戒故著以記之初聞祝寧事祝寧者濮陽鄄城少年也多力喜擊鬬自為兒與里中兒戲相格一里多異下之年二十為母家報仇殺人亡命走潁川潁川富人談公子故與寧善寧主之有繆鐡者本煆工以善槊聞齊楚來潁川川豪爭辟舍舍鐵寧慕鐵久將就之學會公子亦迎鐵師之擇日具禮再拜跽請曰願為弟子幸賜教鐵不為動直曰諾寧見默曰乃爾屈耶欲無學然不忍舍又憚屈乃窺其教公子用槊時識其步趨進退刺伐之度私習之稍久自謂術已至欲當公子詰朝謂公子曰吾在鄉有槊名子今事槊可共角乎公子己盡知其情狀不欲言弗許寧請堅甚公子不得己起與角因自計盡用吾術必殺之不忍也乃留其術不出槊甫一再交佯不勝罷寧以為已實勝即大喜自任槊矣汝盜起潁川募兵擊之寧拊槊曰有所售也公子知其術未善固止之寧奮曰吾槊此不用用何時耶遂應募直撓賊為賊刺心死後聞曼仍事曼仍者宛陵革履工也仍少時父使學製革履革履師性急仍瞢鈍動不能知師意指被斥者數矣仍意愈下終不去師後更憐之竟教仍成技焉仍技既成製履務精好然家在杜厠巷中巷委陋人鮮知仍以故履不恆售或謂之通途可售耳仍曰不然意吾履未精無他也乃益擇善材愈精製之躡仍履者覺堅好倍他履不易敝浸以相傳曼仍履遂大售家致饒裕仍死子繼業之遭亂乃絶後聞堵郎事堵郎者豫章人其父大賈也堵郎生四月父出賈年十七未識父獨與母居家貧母死無以自活為人傭不任傭作亡去依父故所使牧奴奴業為馬醫教郎馬醫術郎自恨窮苦甚勤厲學可成父返郎即自棄馬醫歸父使就奴卒業郎曰幸大人歸非乏財也猶事乎娖妮技乎竟不學頃之父死用浮屠燃燈因火家盡燔即復困厄里人為歎曰使不廢馬醫豈憂衣食哉郎聞亦自悔後轉徙不知所之時有徐娩亦豫章人徐翁女也徐翁家資巨萬無子獨有娩修組織事日不輟家人曰豈少若物乃自苦耶娩曰固當習耳且富可保乎後家果廢娩夫死不更嫁遂以女紅自養終身鄉人至今道其事嗚呼是端可以勸戒矣祝寧恥再拜之屈不求其術之要致殞其身世之學不務師友更自用以昧于事者其害豈異寧哉而學不患其質不美患志偷耳志既堅無自足意鮮不成者於曼仍事可見己堵郎勤始棄終知顧不如一女子良足歎也今夫學者乃或自廢視堵郎其少警哉江村逺意樓記吳長洲之周莊有髙年焉曰陳和之登七襄矣神清體強耳聰目明視年之相若者􅗥然不侔也蓋其動容舒徐不局局於所必為汲汲於所必得遇事之來泰然以處未嘗窮究而留滯此其夀考之繇也家有一樓余嘗登焉可以徙倚而敖嬉可以眺遐而矚逺可以寫幽懷散煩鬱而未有名也為題之曰江山逺意客有見之者曰逺意之旨果安在哉豈因其前挹羣山後瞰長泖左秀水而右郡郭耶其將覽天表之遊雲極目中之飛羽延朝光而入戶留明月以當楹耶不然則以其汀煙浦雨沙藂水實沿秋遡景舉席而揚舲者一望無際焉耳逺意之旨果在是乎余曰然子之所陳誠逺矣然其逺也目及之逺而已獨不聞夫源之深者其流長本之固者其枝盛積之厚者其胤蕃乎今和之之子也皆挺然有為孫也皆森然成立而能以耆耉之年享其安養非有所積能如是乎古人以有子為萬事足況有孫乎況有曽孫乎況由兹以往承承而續繼繼而蕃乎此其逺也始為逺矣豈目前之謂在外之景乎哉題之旨攸在客方愧謝和之喜豫言善遂書記之靜一齋記居可欲之地見可欲之事而不為可欲所誘當華盛之年有華盛之資而不為華盛所溺者此其人亦可尚矣大可欲之與華盛人之易得而誘易得而溺者而乃莫之誘莫之溺也非其生質之美學習之正能之乎然質美矣必美而沉厚學正矣必正而専精斯其為可尚已蓋非沉厚則易以動也非専精則易以二也易以動易以二又烏能保其終無誘溺之患哉此有沉厚之姿而能致専精之學者所以為可尚也東甌花用端湘隂湯時中之友時中嘗與之來見詢之貴家子也侍其親宦畨禺居之蓋久矣畨禺古南粵之地其人與物美麗而繁富乃其俗然其可欲之與華盛何如也而用端以英妙之年挾貴遊之資在他人固已忘其誘溺矣用端則恂恂敬飭自奉若儒素顧乃從士君子考德問業焉豈余所謂質之美學之正者乎不然何為而異其倫也一日來告曰某在畨禺時儒先長者不遺愚陋者有矣今兹違萬里來遊吳幸愜平生之願又獲承下風於君子良自慶已家居有齋題曰靜一茍得一言教之使有以佩服焉非至幸乎然不敢望也噫用端誠所謂性姿沉厚而志學之専精者乎則豫不可靳於言矣因謂之曰夫靜萬事萬物之本根也故曰人生而靜天之性也性本靜為學蓋以復其性也可不思所以靜乎能靜則心湛然而純一心湛然而純一則事物之來應之各循夫天理而性可復矣是靜一之義也此用端之所嘗聞而以之名齋者乎用端姿沉厚若是學専而精則益進若是名齋之義可謂無負矣雖然嘗聞之矣靜之與動猶本與末非兩事也言夫靜如明鑑止水可也稿木死灰不可也欲如明鑑止水亦有其道乎曰敬而己敬貫乎動靜存養省察在其中則靜一之功舍是將何求乎今欲無負於名齋之義其必勿遺夫敬哉用端作而曰至哉論也幸得聞之請記之以佩服焉雪坡記雪坡者吳長洲韓髙士可立之號也可立通有熊老氏鄭列蒙莊之書究明其學著聲殊籍甚其所知皆縉紳大夫湖海勝流與遊方之外之名德也豫友李玄修乃其同邑同道而同志者來告豫曰可立以雪坡自號儒先君子多畀之詞章請一言記之誠嘉寵也敢蘄少注意焉豫嘗聞之欲知人而信于已不若信于人蓋已之得之者少人之得之者多也每得之湖海之知可立者詳其為人寬厚而髙亮胸中灑然纎芥莫之留滯也因以質玄修玄修曰是誠然然則自處甚髙而煦煦然者令人可近自治甚潔而藹藹然者無靳于人此又吾可立也豫然後知若人之為有以稱其雪坡之號矣夫雪之為物當玄隂之時而自潔其皎皎之質若不可犯矣然與陽和俱化有潤澤之益焉坡之為物由卑而寖崇無斗焉絶物之意故其土溫厚有産物之饒焉當雪之委于坡而坡之承夫雪陽和既闓則其潤澤而産生者蔚然矣今可立自處者髙而令人可近自治者潔而無靳於人是其學之誨其徒德之薰其友猶所謂霑夫天澤之益而資夫陸産之饒者必多宜乎縉紳士夫名人勝流咸與之遊喜談樂道之也此豫謂可立之為有以稱其雪坡之號也與夫人之道夫可立者如此玄修之請又加勤焉豫獨得已于言乎因攄豫所聞以為之記筠谷鄭氏墓祠記衢之開化曰金溪有山曰奎婁峰其下曰筠谷故儒宦家鄭氏居焉谷口則學録公之墓也其子瓛等即墓立祠以奉公之神孫團筮仕以使事抵吳告豫以其先世之故請書志之按學録公諱鈞字汝一世衢人祖明夫宋咸淳癸酉進士父師吉元徽州儒學正即筠谷府君也筠谷君早孤育於季父介夫典教江隂故公以延祐丙辰生江隂之定山天質既美滋力于學受經于白雲許先生之門人應至正甲申鄉試以二榜任本郡儒學録人皆崇之尋退居筠谷下聚教族人子弟鄭以儒業著稱者率其弟子也大明洪武戊申公年五十七九月庚寅以疾卒娶葉氏前翰林學士天麟之孫雖生貴戚而儉勤謙抑宗黨是則先公一年生後公五年殁子三長即瓛次瑄次玒俱克家孫五長即團次圞圉圃囦卜地得吉會玉砂金泉之秀以九年臘月朏合葬焉實今墓也墓既盡其邱封之禮祠又廣其嚴奉之敬知其後之益昌於是而徴焉於乎豫復有他徴矣觀典教翁一綱二十目之書撫卷輒為之太息當是時廷臣豈無任言責者而乃固本根正綱紀披肝瀝膽剴切懇至顧非疏逺之臣弗得聞耶此天下有志之士所以扼腕慷慨想望傾慕之無已也然翁位不滿德僅宰百里而終筠谷嘗少施而未竟其才學録公嘉惠後學至賢良宜有發舒矣而志不在於華耀好還之道果何如耶雖然其理間有在矣今團以英妙之年善於其職公廉勤慎通敏而端確稱其為故家子孫也其進豈可量哉好還而益昌其後將不在於兹乎則豫之所徴蓋有不誣者矣因其請並豫之有徵者書焉半軒集卷三
