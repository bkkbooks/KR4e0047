body:
  text: 半軒集補遺明王行撰夀采堂記吳城之北有許氏焉曰謙翁其子孟器與弟仲顒皆讀書致飬因築室以為敬進甘旨之所而題夀采于其顔實用楚萊氏娛親之意也大夫士多詩以咏歌之而徴余為記余嘗詢其居處矣有園池花竹之清勝椅桐梓杞之蔭樾桑枲菱蓮黍稌之饒裕洎夫鮮食果蔬之新美雞鶩羔豚之肥腯以至于醬醯醪酪甘滑滫瀡之奉無需而不具其養親之口體也亦可謂備矣而必效夫萊氏之為何也人子之于親也能養之而不能敬不足以為養徒敬而不能致其恱則嚴威儼恪又非事親之道也能效夫萊氏之為是能恱其親之心矣夀采名堂詎不韙哉且萊氏戲采之時已七十矣二親之夀不既髙乎今謙翁甫杖于鄉而孟器力強而年富則其養親之日方悠悠而遐永夀采名堂不亦宜乎大夫士之樂于詠歌其文又見夫人心之所同然者矣余又思夫萊氏之娛親必兒啼而弄雛者既欲其親忘其年之若是又欲其親忘已年之若是也今孟器之二親齒髮實未疏而視其英妙穠華之子回旋俯仰于兹堂之上以娛恱之其樂不愈于昔人邪大夫士之多為之咏歌蓋尤宜矣為之咏歌而尤宜則余得已于言哉是為記歲時集紀序嵗時集紀者集嵗時之事而紀之也平居暇日當四運之相推歲華之尋續朋友之不見遺者每相過從詢其故實余于芳蹤妙躅嘉辰勝槩所謂日月雖故而光景常新者固所樂道惟年浸衰遲應答太煩齒頰不能無勩矣是以搜羅舊聞攟萃成編問輒示之少紓酬對雖見聞不廣遺闕良多然引而伸之亦足以觀千百于什一也至若所編之義例雖不明著其目亦存其序于中焉首之以節名者表其得名之故以謹其始也次之以占候者所以驗災祥之徴也又次之以祈祝次之以禳祓者祈以祝其休禳以祓其咎也又次之以飲食次之以服飾次之以宴賞次之以遊戲者飲食之于口體服飾之于儀容既各順其時宴賞以洽其情遊戲以攄其鬱亦各順其時也惟勸與戒置之于末慎終之道在矣例固如是然亦據所見而集之不能每節皆備者蓋將有所待也博洽之士觀之而不吝于補益焉則誠余之所望云送唐君處敬序至正乙已冬會稽唐君處敬將之官嘉禾永嘉余君唐卿西蜀楊君孟載九江張君來儀太原王君常宗渤海髙君季迪郯郡徐君幼文洎余相與觴而餞之酒且竟唐君起曰肅之獲交于諸君陪朝夕之論漸習之惠多矣兹當逺去幸人賜一言使佩服之則朝夕誦諸君言如面諸君焉可乎坐之人合辭曰以君之賢尚須吾輩之言哉雖然今而與君别别將久久必有思也思而不能置必有言有言而百里以寄君其情不猶庶幾乎今奚言也君喜而去明年春君來吳復以言請會君行亟未遑也夏五月書來曰久俟諸君言可無意乎書至而諸君之文適就遂次第寄之獨余未有説也念君之在吳大夫士友之者衆矣言不他之求而必于二三君子意必有所在豫亦何者而與其間哉且與君周旋時寧知有一朝之别洎别則知必有思必有言也寧知思愈至意愈深愈非言之所能盡欲何以貽君哉雖然君子之于文非徒煦煦之情也有切偲之道焉然君之德勉之既非余之所能勉規之余文何足以規之也終欲何言哉若夫贊詠其文華稱説其賢行則具于諸君之文矣姑泄其思為之歌以寄焉歌曰維遊伊處兮我朋我儔孰云是與兮繄道之求慝以友修兮淑以友輔羌胡為兮獨遐爾騖時既淹兮思孔深甫去我懷兮又入我心崇登兮遙企木黝黝兮奄豫爾睇川之水兮有波君兮君兮我心奈何贈郁章序余觀內經其書多黃老言希合于道然其論風土之適明血氣之本處滋味之宜著決刺之宗陳樂物之用引癃痼以近生逺死非內經莫以也故醫家書莫要于內經內經之書數萬言推內經為説者數十百家其書亦數十萬言人所自得禁方弗預醫必盡通之乃可愈人疾不然繆戾乖刺反甚其病醫之術亦難矣古之醫必試于有司通乎是然後籍其業否則有禁今其法已廢孰辨其能否哉惟偉其輿服髙其稱道世皆謂之良意其所治必合余所云云也求其中乃不勝其外果良也耶內經本黃老黃老清儉而沖退侈輿服而髙唱自道豈內經意也醫不本內經何治外之務者中之病已不愈而愈人吾未見其可也昔漢擇郎衛將軍家舍人服具非不炫麗卒之立名漢廷乃出貧窶者不在于絳衣玉劒之夫也外其果足信哉余觀今之醫多若是故恆悲之嗚呼悲之固為之也使能聞余言而反治其內所得斯過半矣吳興沈純德黎陽郁生章已其婦翁疾謁文為章贈或言章謙謹好學非徒外務者因書是志之章乎其果合余言也夫贈邱明府序夫周官命帥選于師吏之才晉伯修戎爰有詩書之將矧投筆者終立功于異域決獄者亦奮志于戎行皆能蔚于簡編析其圭爵是謂通時之用不執其方致百代之歌風使千齡而慨義者也河南邱君某服勤書律方任勾稽載念艱危忽興慷慨庸親武事暫輟文班荒棘已離眷九霄之祥鳳修途乍展看千里之名駒而其算法鹿中不廢投壺之樂墨磨犀盾咸竒草檄之工于時外難初興奄據五湖之險而我內禦方備足當兩浙之衝故大將既屯百戰之勇夫復籍萬民之壯士氣壓四郊之壘雄增百雉之城共仰金湯星漢低徊于粉堞齊鳴鉦鐲風雲錯變于旌旗墨子運機却九攻之巧技吳公策勝兾八克之殊勳而君子鞭旗鞬􅐤周旋左右結民保伍歎作賣刀買犢之時簡其甲兵憐彼斬木揭竿之日是以恆施其德濡雨澤于春芳稍霽之威拂霜風于秋草感之者衆懷之者多後世桐鄉定若子孫之奉于今汲邑已懷父母之思蓋夫徇義之為仁人所韙聞善不徒哲士所非故兹染翰而興爰爾操辭一讓云髙節樓詩序事在當為而為之不期人之善已惟自盡其為人之道爾夫為人之豫盡事親之道豈曰吾孝子哉人見其能盡事親之道而曰彼孝子也為人之臣盡事君之道豈曰吾忠臣哉人見其能盡事君之道而曰彼忠臣也茍期人之謂已忠謂已孝則是利其名而為之烏所謂盡為人之道以事親事君也哉然而聞其善者非有不欲稱之之故未有不稱之者也婦之為人婦也所事不踰房闥之間人則莫之知者或不幸而早寡孤潔自守以終其身而貞節之名始著夫婦也惡識所謂節哉知自盡其為婦之道而已且夫閨門之迹罕接于外稱之者豈皆識之者哉亦聞其善者喜談而樂道不期傳而傳不期逺而逺有終不能掩者焉吳婁江陳氏邑人袁某妻也年二十七而夫亡堅誓不二以禮自間以嚴自衛架重屋以居人望某棟宇之峻指之曰此髙節之樓也中朝大夫士聞其名或詩以賦其事或歌以詠其情連編滿帙而未已嗚呼婁之為地僻邊海陬與黃茅斥鹵相際而一婦人之善乃獲稱于中朝之多士果何以致之哉豈所謂不期傳而傳不期逺而逺者歟益有以信夫人之善終不得而掩矣陳之殁幾十有幾年其外孫茅澤民氏示余以此卷徴為之序夫人之善固不待人之徴之而始稱之也特詩之者既皆魁偉其人顧余有不能發之者耳雖然三百篇之詩多聖賢之徒之所賦而毛萇氏之言乃引其首焉則知序之者固不能賢于作之者也既不敢辭因竊附毛公之義書以冠于編云思親望逺圖詩序人子之于親一體也人親之于子其異體乎蓋親之體乃子之體之所由生子之體即親之體之所遺也故其起居出入有不同而歡愈感惻無不同也其所處有暌攜之不同而所懷無朝夕之不同也子之于親無不同者如是則去親逺而為日久定省曠而音問疏其情蓋可知焉春日載陽矣日瞻吾親之顔色得不思吾親志意之發舒乎秋氣澄穆矣往也日瞻吾親之顔色今也得不思吾親體貌之清寧乎思之存于中者是已其或登髙或臨深俯淵泉而望雲漢咏歌慨嘆不能自已則其思之于外者又何如也朝夕思親之懷之存于中者固無時而或息然思親之懷之著于外者或見而或否焉思親之懷之著于外者或見而或否茍士君子有賦以道其性情圖以寫其景象則其思親之懷之著于外者乃常見焉此維揚邱景賢思親圖詩之所以成卷也雜對序余以質魯之資久安于遷散之習遭時多虞非時出之才不足以致用故自分于荒間寂寞之濵而仰事俯育之餘因得從事乎簡編竊窺古聖賢之用心以自警厲其于故舊賔客朋友之交際論議辨析有問而對者固不能有所發揮然諛恱順容以違逺夫道者則亦無焉故不自揆隨而筆之弗及其先後弗别其品彚弗定其篇章槩名之曰雜對非欲以觀于人蓋明以私識也雖然問誠而對之不誠對之罪也對誠而問之非誠問之罪也對在已而問在人吾將盡夫在已者焉筆而輯之者所以敬夫人之問亦以謹夫已之對也靜得齋説凡物必有其理理者物之所以然也有是所以然然後有是物有是物必有其所以然觀一物必究一物之所以然省一事必究一事之所以然萬事萬物皆得其所以然無一毫之不盡然後力行而實踐之此為學之序古之君子學以至于聖人未有不本于此程伯子云萬物靜觀皆自得觀而言靜靜所以致其思得而言自非假于他也不假于他而自致其思理斯得矣理斯得則所謂衆物之表裏精粗無不到吾心之全體大用無不明者可馴致焉所以到此而謂之豪雄也歟婁江沈集氏以靜得名其齋實取斯義而求余申其説集蓋學靜者也余不得不語之夫靜非稿木死灰之謂也寂寂然不動者也動之根也感而遂通天下之故矣豈塊然嗒然者乎故靜必致夫得蓋得必原于思思必由于靜也非靜則不能致其思非思則不能致夫得靜而不能致夫得是不致其思而徒靜也徒靜則塊焉嗒焉為稿木為死灰矣又烏能盡萬事萬物之理而謂之豪雄也哉集也當益推夫靜觀自得之説而不失于徒靜庶無負名齋之義矣天放生解沈生居吳長洲年盛而質美性通家饒資而無綺紈靡曼敖惰之溺聞大夫士之賢則樂援從之有謂之者曰豫天之所放也生欣然領之曰甚善謂我或疑之夫放不良于自飾不良于自飾故或木石之與周還煙水之與上下魚鳥相依而麋鹿儔伍此山澤遁栖誕肆縱弛者之所自喜今生有父母兄弟之樂妻子之愛宫室之安輕暖滋味之養而顧以放自名異乎吾所聞矣傍有哂之者曰唯唯否否然乎不然乎子得其一未得其二吾則已知之古之人有以放自處者矣清談以適時嘯傲而用世任真于麴蘖縱意為曠逹雖或見尤終不為撓此大夫士自放于禮法之外者也又有以放自號者矣呼吒以逐文場之雋奔逸以絶藝苑之塵揶揄乎為頌不屑于繩檢而吐詞令歆下筆起敬此大夫士自放于文墨之間者也又何待遁迹自縱然後為放也哉今生以英妙年翹楚氣安知其意不在是乎二子論未白以質于余余囅然曰嘻子之論美矣悉矣然而未有盡也天之所放古人有是言未之聞耶矧其言不翅一見其義亦無二焉余嘗求之矣天之所放猶天之所容云耳非曠弛縱肆之謂也且所謂天豈必指蒼蒼幽逺者而言之哉蓋大君者萬方之天也父祖者一家之天也萬方之天覆幬而含育一家之天生養而成遂則生養成遂者一家之天之容覆幬含育者萬方之天之容也惟萬方之天有容故一家之天得遂其生養成遂之願而子孫得被其生養成遂之澤也今生方當安泰之時承祖父之廕庥受已成之基搆宜其兢兢業業朝夕警勵自念曰人謂我天之所放非天所放其能至是哉于是矩蹈規循勉于為善思無負于覆幬含育生養成遂之恩所以既式其名又規其字而復以是自警也嗚呼此固生之意也哉質者聞之釋然皆退余因書其辭以為生解黃先生壙記黃先生諱載字德厚世蘇人父諱中母錢氏洪武二十年三月為吳縣學訓導以詩經訓升俊齋弟子員原等為弟子員因得隨侍者幾三年二十二年五月辛未以疾卒原等哭訃如儀即鳩資治衣衾棺櫬斂殯以禮卜吉于是月丁丑奉柩葬縣之至德鄉南峯山先塋之次考其生年在天厯戊辰夀得六十二娶蔡氏女一人適朱坦坦以朱宗事逺戍黃宗又久絶故治喪之責諸生一任之惟窆日既薄不遑求大手文詞以志墓姑以歲月之槩納壙中云故贈户部主事殷公墓志代殷允常先君子諱華字文卿姓殷氏蘇人也考諱盛明母張氏生元大德丁未十月戊午終至正丁酉五月戊戌得年五十有一葬長洲縣武邱鄉某村之原越十有八年當國朝洪武八年十月不肖孤承乏户部蒙恩例賜承事郎户部主事娶李氏封孺人孺人諱妙清蜀之瀘州人父諱某杭之餘杭教諭母姚氏後先人八年生生十有八年歸于我先人四十四年當受封後十有四月戊午卒丈夫子三長允常次允中允德女子三長適金德進次鄧叔輝次徐繼先孫男五肅垕堅賽慶女四定應金官允德先卒允常不肖孤也嗚呼先人之殁也不肖孤才十有六嵗旨甘滫瀡不得致奉也今忝為郎地官祿足奉養庶得少伸往志而妣復傾逝嗚呼哀哉嗚呼痛哉先人之葬日薄事嚴未遑志其墓大懼久逺湮亡歲月無考兹以十二年正月己酉奉妣孺人祔于其兆而謹志其槩云不肖孤允常泣血謹記姑蘇沈經妻徐氏墓志銘徐氏諱某姑蘇長洲人父某母某至正丁酉某月某日生生十六年為同邑沈經妻恭儉和婉沈靜寡言凡纂組針縷悉善不及事其舅事姑能執婦禮閨門之內夫夫婦婦姻黨稱焉歸七年洪武庚申七月草一日卒子一人曰九九卜吉于縣之尹山鄉之原將以某月某日葬其夫來乞銘余嘗識其父矣端慎詳雅年雖向髙而謙下益甚蓋處身有道處家有法者生女而賢亦宜矣及歸沈氏又好修之家也其二世之藏皆余銘故知尤詳然觀經之為人固可見矣嗟夫女子之生出于賢父又歸得良配不可謂不幸也死生夀天是有命焉復何論哉因遂為之銘云銘曰芳荃茁芽蔚青蔥碧莖緗穗含紫茸托根美壤秀所鍾凝露浥浥滋其叢德惟不孤類必從瓊芝瑶草同丰容恂恂禮度執者恭婦姑子母夫妻同善門有積慶自豐獨胡為耶遘伊凶不云操修盡乃躬遑計夀夭塞與通當尊而卑後必崇子兮秀頴膚肌充二十有二暑復冬獲全而歸亦考終尹山之原固厥封允哉千古安幽宫金公信墓志銘公信諱莊字公信姓金氏蘇之吳縣人祖德明考文讓妣顧氏家橫山支麓所謂吳山者之左世以饒産聞里中父祖皆善治生而考尤磊落振迅洎更變遷業中衰公信克自力年未冠已持門户用其勤敏詳慎盡還其故業惟以弗遑事學為愧乃嚴督其子從師儒受經于是士林多知公信公信以為喜而且嘆曰相人之術者謂我年不逮百之半而家當復衰然不然吾盡人為焉耳識者聞而韙之洪武十九年春公信以事病殁于應天年四十八二十年九月丁酉其壻沈經函骨祔先人之墓而合其先配焉先配曰吳繼室曰瞿子曰澄曰元同女長適李次許嫁龔次適經葬時許龔女已卒而二子一婦一女若壻及瞿皆在逺惟經夫婦兹視竁亦可哀也然稽諸相者言非命也耶非命也耶銘曰盡人為而聽命深于學者之言也而公信言之足以觀其質矣四十八而告終惟壻為之安厝于以見其命矣畀其質之美而弗畀其命之修果孰執之其將曷尤也噫希間羽士碑羽士諱壵字堯卿姓李氏其先汴人女真陷宋家南徙居吳崑山世治儒業祖授字某廣西提刑父觀字邦逹擢進士第知吉州母蔣氏初羽士之生吉州君夢一道士入其室神采殊異起迓之遂寤既寤蔣氏方臨乳吉州君曰若男也符我夢果男羽士幼娟秀聰慧長通敏好讀書意度間逺常有遺世志適宋亡儒業不振年益壯家事滋索咸勸之營進因稍為吏頃之不樂棄去落魄江湖間遇老氏居輒留憩遊海虞至普福宫普福方全盛堂中瓢笠數百具秩然濟濟多髙行士羽士見曰吾有以置身矣即堂中從竹鄰張君為弟子執勞苦不倦時吳有道院曰寧真靜明王先生所處王先生海虞人學行超卓羽士慕往拜之靜明便謂相得晚謂曰吾老矣所得未嘗妄語人今授子何如羽士稽首受教大致開悟遂受度為道士焉居久之復出湖海名山勝地四至遊歷髙人上士多所恭扣行業益著矣及歸靜明殁院事多廢垣屋傾圯羽士力營治之立玄武祠築門廡廣庖湢開堂宇延納雲水湖海士多歸之道譽勃起既而慨然曰吾求間故離俗乃更汲汲耶于是悉以事付弟子趙自誠而以希間自命故其徒稱希間先生云羽士既謝外緣畫圜規東壁日鄉之坐寒暑不為移識者知其有所究極也至正甲午八月草三日命茶會衆曰吾歸矣與諸君别衆駭曰師胡遽相舍乎羽士笑曰期數已至不能留也明日癸丑使弟子治饌祭吾先饌具曰為我設之吾默致敬焉祭撤夷然而逝年八十六先是書坐間云八月草四日皆莫喻其故至是始悟其預志化期也羽士內守純一于外無所好惟喜龜卜為吏時嘗活一囚囚善卜以無可報盡用其所得龜策遺先生故羽士之卜甚精妙然希得其卜者吳有豪金氏饒資素遇羽士厚家鬩墻訟不得決求卜之羽士怒曰尚不識天倫何卜也其以義責人又如此自誠字仲愚後羽士三年殁有弟子曰德慧羽士從孫也簡淡清謹篤于學先生甚器之常語之曰天下大亂行及吳吾不及見汝當見之亂離中正道人磨錯時耳勉之後吳果亂二十七年羽士化十有三年矣德慧懼先生道行久且泯無以示諸後請以其事銘于石埀不朽云乃銘曰藝藝世紛莫底厥寧若虞而羅動離以嬰猗歟先生獨振其翰芒乎沉寥髙遰遐騫低回玄壑栖息沖境心由寂虛慮以恬靜元因載耘靈苖祁祁灌溉五華芳根殖滋爰恭大方究極衆妙得妙之徴約衆歸要曰余歸休其徒萃萃匪德之隆孰貽其尊黃房密清絳館涼靚離離陽翹皎皎霞映既育既函如苞如胚倐解而蛻寥寥太無有遺其宫斯胤之守懿爾厥孫克纘于後猗歟先生繄道用充來幕來思視此銘章書王賢婦傳在易咸恆為形化之首蓋夫婦人倫之本也夫婦之間其幾甚微所繫至大其可不慎慎其始要其終矣今賢婦始于屈身以奉夏非曲徇其良人之志知重其宗老之命也能知重宗老之命其識趣見矣然則使良人不失夫婦之正不方宗老之命非賢婦之助歟惟能順宗老之命斯得正夫婦之倫夫婦既正則傳者所謂五善皆由于此吾知婦之為果賢矣雖然子中之所謂真吾妻者亦有見哉今乃優遊暮年子姪盈目非始于夫婦得其正歟克謹于始其終有徴也夫題小字蘭亭帖江南後主評禊帖謂後之人各得其一體而人自名家及考其人皆卓卓人耳目者則得其全體當何如耶世傳禇河南嘗模禊帖約其字而小之刻之咫尺之石名為玉枕蘭亭然法書録中未究其説今觀此本法度整暇典禮具存要非名筆不能及此所謂玉枕其殆是歟鄉見趙松雪擴大禊帖字方幾三寸體貌修飭儀軌無違二帖大小雖殊實皆佳品乃知禊帖所出千變萬化無不各臻其妙歷世寶之詎不韙哉李煜所評為得之矣題歐陽信本醴泉銘後宋既南醴泉銘愈難致榷場所購皆屢模屢刻去真益逺嘉定慶元間學者甚多而患善本不可得及宋亡混一善本可致而學者則少矣豈以艱得乃貴之哉幼時嘗聞故老言此而興慨今此亦佳本也生其寶愛之勿以易得故不為貴丙辰夏為趙生泉題題周正道書徐氏世譜後賜姓賜族而宗法行此先王之政也譜諜僅得藏于家見斯政之廢矣世重崔盧雖不合古猶有存古之意而武氏亂之乃復蕩然良可嘆也後之士大夫各譜其族蓋志于追逺耳而又或有過焉兹所謂譜其所可知而已者是得夫追譜其世系之道者也洪武丁巳三月初吉觀拙逸翁書徐氏世譜後因題題趙子昂臨禊帖蘭亭禊帖蓋右軍無意書也惟其無意故與神會惟與神會故復書之不能似也後之以書名家者竭力師之莫能具體李後主評之詳矣松雪翁平生臨禊帖甚多用心良苦蓋欲以已之有意求至于古人之無意也今觀此帖其尤精詣者而彥亷藏之可謂具目矣題大字洛神賦栁誠懸謂王子敬愛書洛神賦人間各有數本而所存僅十三行其楷法人所共見今松雪翁乃擴而大之且為行法矣又嘗見其擴大禊帖字方幾三寸而韻度意態無失臨模法固有當爾者耶退之云師其意不師其辭豈亦可以為臨書法耶且翁以書名天下由宋室近屬而大顯于元其間若見既博且廣矣則是書也其必有所自哉文山六歌跋前者休韓後者劉文文固無損韓亦何益祇見夫三百而更餘百猶弗及也噫王行見此偶書題溫日觀葡萄卷後日觀宋亡後雖居葛嶺之馬腦寺而自借地于酒揚璉不得近冀以名酒啖之見輒罵曰吾用此盜冡物耶時袖瓜至鮮于伯幾家飼其龜抱庭間松號支離叟者或歌或哭每需浴伯幾必躬進澡豆余聞之故老如此今觀此卷可以徴其人矣題所畫墨竹後李重光以撥鐙法作金錯刀乃渾用焦墨足以知其後矣今余此幅水墨相和浥然津潤以一介之儒而愈復臣之辟也題重修切韻指掌圖撿例後華音之有翻切未審昉于何時世所大行惟陸法言之五卷至于圖列音母以簡御煩則又自司馬公始大中祥符初敕增修唐韻為廣韻昭陵又敕增為集韻而字益加備矣是圖之作實羽翼夫韻書也公自謂圖之所列包括無遺皆出自然如天造神授蓋翻切家之樞要焉名之指掌其明且易也可知矣圖之明著如此而人顧或有未深喻者以撿例語焉之不詳也故説者謂撿例非出公手殆為于後人乎不然據例撿之何字之不多得也余友沈起宗嘗病諸此益求韻中字之有切而不在圖者凡七百五十表而出之而詳著撿尋之例于後使見者即知方向而字無不得者矣嗟夫三蒼爾雅字書之祖也而略于其音業詩書者口以相傳易致忘舛翻切既行學者獲助多矣圖之復列所得愈多而猶不能無撿例不詳之憾是書今出圖例以明其為學者之助又當何如也哉起宗年幾七十方策未嘗去手其自題作邵宏道書者蓋其所從商確而示不忘其本也跋米元暉畫卷米敷文既遊清都遺迹之在人間者日少至于貌江山之勝槩發詞藻之精英翰墨沸漓同為卷軸則又加少焉此卷其易得耶王雲浦再失而再獲之所以為至善耳然萬有無常竟又歸諸沈氏沈氏代為良醫而日章又知玩古今亡矣其子出以徴題見之令人淒斷題張伯雨自書詩手卷張貞居以詩名湖海而翰墨尤為人所重片縑尺楮往往見之蓋未有若此之富盛者也孫過庭云一時而書有乖有合心遽體留風燥日炎皆其乖也神怡務間時和氣潤偶然欲書皆其合也今貞居自言自春徂夏隂雨至五月之久故間弄筆硯以自料理則非心遽體留風燥日炎正所謂神怡務間時和氣潤偶然欲書耳宜其連編接簡不覺其多而濃纎間出清婉流麗有合于古人之度也良可愛哉其詩傳諸人口已有定論特語其書如此彥亷好古博雅必能加寶惜矣癡叟傳癡叟者吳松陵人也姓顧氏名諒字季友松陵有地名越來溪溪以西有岡巒明秀古謂此吳山也山甚佳而曰吳者或謂昔主是山者氏吳山因氏之故云叟殊愛其勝家之而不徙今幾四十年城府之迹廓如也趍喧者見之曰癡人哉叟性夷易不事畛畦勾曲遇人而非曰非不非以是然曰然不然以不然懷嶮巇者見之曰癡人也好讀書修文辭方其勤無分暑寒旦夜惰以自佚者見之曰癡人也疏于利不屑屑産生作業入或不饒出乃無會計貪而嗇者曰癡人也潛伏以居壯且老終絶用世意營營競進者曰癡人也或謂叟不子合何多也而謂子癡子奚不自釋叟笑曰不我合果誰哉且不覺之將孰釋之或者愕以咍是果癡乃遇之非癡吾顧癡耶叟曰嘻癡乎癡乎甚善名我善我名吾何辭吾老矣吾老矣人其不我老因自謂癡叟君子或怪之曰名之者亦甚矣然受而不辭必有旨哉吾當遂其旨遂亦謂為癡叟人咸知之且習之一謂癡叟癡叟云于方先生曰余初識叟以其聲求之殊不類及讀其所著鷦鷯居樗賦始知之賦之要以為鷦鷯以微而依匪材之樗故能全其樂人謂其知白守黑者知白守黑欲進而退退所以進之術也叟寧爾耶蓋虛以鍾其美耳其詞有曰以巨而自屈于細兮致若是之邅迂茍忘微而夸大兮亦與是而同途是又明夫各順其天不忒其儀之道也謂之癡者果非癡耶受以為癡者果癡非耶君子蓋知之吾衍傳吾衍者字子行其先太末人也大父為宋太學生徙錢塘遂為錢塘人衍工篆𨽻書明律吕嗜書史能屬文辭所著有晉文春秋楚史檮杌説文續釋尚書要略等書居錢塘市側委巷一樓蕭然惟法書銘刻古編鍾鐃磬如意之屬置左右時撫玩用為娛樂有豫章人以音律自善聞衍名造之衍與語洽甚既而扣所列鍾鐃問曰音何屬客曰某也又擊其次客曰某也扣遍言率合衍復舉柱下鎛鐘擊之鎛形弇其音函沍客審聽曰宫乎衍笑曰宫當渾以圜重以厲兹鬱勃不發非宫也而不比他律蓋古棄鎛耳客乃服明年攜一棧鍾復來詣衍則衍死矣因倣徨欷歔不能去嘆曰吾學無所正也初衍年四十未娶宛邱趙天錫為買釀工家孤女為妾妾母嫁後夫後夫以私造楮幣事覺避逮來衍所衍意其省女弗察及逮卒根逐至衍舍反接後夫出併係衍道逢録事張景亮知衍事訶卒曰是不知情奚攝為趣舍之衍既脫猶不勝恥即為詩别其友仇逺徑去旦日逺讀衍詩怪其語異常隨迹其處竟莫知其所往後逺行湖上微訪之有賣酒媪自云嘗識衍所曵屨遺水際逺始悟詩中意乃知衍自湛死矣時至大四年也衍性剛簡希偶所善惟金華胡之純長孺兄弟暨逺他雖權貴人所知之非所合率拒不肯見每出嘗獨行不求侣遇明霽時日之湖山間無定適任步而至便道次沽酒飲微醉箕踞長歌其所為樂府詩歌已輒放聲慟乃返家迫市無曠隙地當月明則持洞簫乘屋騎危而吹聲悲愴而慷壯聞者輒能别識既死咸傷悼曰簫聲不作矣有桑門可權嘗從衍學詩哭之甚痛求其尸不得有為以六壬筮之得亥子丑順流象曰尸漂不可見已權弗信益購索之終不獲云余少時聞長老言衍死人或髙其不受屈或曰是褊心輕已自喪余嘗悲之其不受屈非也褊心則然然謂其輕已自喪過矣以衍之不肯妄知人與觀其長歌大慟時意氣彼其所自負者甚重也惟髙視一時謂當世無足知己則固有遺世心矣而橫逆又激切之此遽捐其生也雖然使衍能夷然委順以其學自善其身蓋有餘裕顧乃不懲小忿寧滅其性以取不弔之譏嗚呼惜已雲山子傳雲山子橫山浮圖也自余僑橫山與往還殆無虛月子居山之北嶠兹以其南椒尤清勝徙焉人無不稔愛之大夫士亦胥與之胸中不町畦是設然白黑了了自區覆與居槩不求異人然亦非坌迹可混能飲酒小飲之才醺即止不覺其為少大飲之人至頽然猶未已亦不覺其為多久而常然余始見人之愛之未喻其所以致之故今乃知其有以也于方先生曰嘗問浮圖者曰浮圖之治何先其人曰不妄嗟夫自治不妄今幾浮圖哉示人以疏衣草食而髙踞大唱吐詞亹亹若堪敬信及究其然乃欲以幻人聽觀初非任真也是以始雖異之終復詒之果其不妄者耶若雲山子動息自如無標表而人信與之如此所謂不妄不庶幾耶然曷特浮圖為然故為之傳以示勸焉書與相者仲逹善談相人之術者有曰相形不如相心蓋心為形之主且內也外茍然矣內或不然則其術不驗故云爾也姑蘇仲逹善挾斯術以遊人皆善之每為人談必以此言為本噫此其所以善歟韓子曰昔之聖者其首有若牛者其形有若蛇者其喙有若鳥者其貌有若蒙倛者彼皆貌似而心不同焉可謂之非人耶即有平脅曼膚顔如渥丹美而狠者貌則人其心則禽獸又惡可謂之人耶然則觀貌之是非不若論其心與其行事之可否為不失也噫此其為相形相心之法耶逹善學本家承其説蓋有所自矣雖然又有説焉人之欲美其身務飾于外殊不知所當務者不徒在外也程子曰人于外物奉身者事事要好自家身與心却不要好不知外物好時身心已不好也逹好今為人談可併以此教之答友書言念君子之自治非止于一已必欲其子孫之賢學問之有成詎特于求師必資于父祖之訓蓋既有父祖之訓以為之基本而後師友之教可施其琢磨故為學必始于詩書而進功必循其次序然積德之宏者後必大賦質之美者學有成嘗觀地壤厚而衆産必良林藪深而六材可用此非虛辭之騁端由實理則然矧以孜孜焉教孫訓子之心而致懇懇焉隆師親友之禮昌其後胤可以前知兹惟某人天豫粹姿時傳嘉譽通融處事篤實待人恆佩乎富而好禮之言每遵乎學則必成之訓所以芝蘭玉樹藹然乎階庭之間卷軸牙籖秩然乎軒窗之內好古博雅誦詩讀書載觀其四世之和樂怡愈尤見其一家之整齊嚴肅有如此也可不敬哉若某也學未淵深才非宏博雖大方之家或過于見許而小學之教敢謂其所長人之患在好為人師道之所存何有于我而乃沐以緘書之寵侑以禮幣之將蓋惜分陰于冬夏春秋誠欲大成其瑜環瑶珥自惟何者可領于斯以承至意之臨敢致不恭之郤腆顔登受薰手復書弗敢隱情再陳攸論前哲之教人有要明道德而正彛倫先儒之為學有方緊途程而寬期限敷宣莫既惠亮是蘄募刋朱彥修醫書疏生為天地之大德人固有生之至靈仁者君子之恆心醫亦助仁之一道故立言陳濟生之要皆聖人推博施之仁况後賢于上下千載代著其聲而近世則南北數家各専所學由斯而下繼者為誰惟丹溪處士蓋其人乃白雲先生之弟子欲究天人之際深探周孔之言遍讀古今之書尤得軒岐之祕蓋以廣于知見故能多所推明辨諸家失得則聞所未聞折至理幽微而發所未發非出乎其類者孰能與于此哉今其所著之簡編苐恐歷年而散失欲鋟梓而傳逺須好事以相成大書深刻五萬餘言稍出捐而可了奧論微辭數千之旨于惠利以何窮要看卷裏登名便是筆端生意募刋醫書疏夫以華元陀竒訣一編祇得生平自用王和平實書百卷竟于身後無傳蓋當時不遇其人致妙術弗存于世惟醫以惠利為本故余與推廣之心况近代之一二賢豪在古人之後先伯仲河間翁自軒岐而旁搜逺紹丹溪子于劉李乃私淑諸人誦詩讀書確守前修之法則操戈入室兼攻諸氏之瑕疵此道從而大明于世豈云小補今兩家之著述具在恐歷年而散失難收欲憑鐵筆圖永存故以金錢干好事為百年之計必果以德要看桃李蔭公門費一朝之享便足其功盡使疲羸登夀域慨然以許倐爾而成寧真吳無夢知堂疏髙堂無礙儘留雲鶴棲遲大衆有緣遂得煙霞領袖皆當斂衽共看披襟兹惟無夢先生功熟黃庭名髙丹府九還已了打開造化之機關萬幻盡除撞破虛空而出入來整頓寧真門户重闡揚無上宗風願莫辭迎送去來使盡得皈依瞻仰底論為賔為主要須成已成人演六千靈笈大地回春到處都消疵癘祝九五真人後天不老吾徒永樂升平勿請再思便從衆望全真蒯中和他山居疏回道人舊有家風隨處色身皆可寓葛仙翁既成功行人間幻境未嘗捐况兹方事修持所以要營居處已得湖山之佳勝欲同猿鶴以棲遲上清童若發肯心公輸子即施妙手昔人已乘白雲去只今重繼仙蹤上帝髙居絳節朝他日便成靈迹慨然許也倐爾完之半軒集補遺
