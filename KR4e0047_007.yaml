body:
  text: 半軒集卷七明王行撰説醉樵説華蓋山之樵有好飲者或目之曰醉嘗道置其薪而寐後之樵者盜其薪同樵者見之呼醉樵而語之曰而樵以飲為事邪以薪為事邪醉樵諤諤而復唯唯同樵者又曰而樵以飲為事邪以薪為事邪醉樵曰而以吾以飲為事則以飲為事而以吾以薪為事則以薪為事同樵者曰而不知盜盜而薪邪醉樵曰薪則薪焉盜則盜焉夫奚庸知也同樵者曰醉乎醉乎世未有若而之不醒者也盜而薪而弗知告之知而弗悟非蚩蚩邪醉樵乃囅爾而笑曰而何言之異邪而以吾為醉則以所謂盜吾薪者為醒邪而以醉為果醉而醒為果醒邪而以醒為是而醉為非邪而以彼為得而我為失邪而以得為果得而失為果失耶而以得為果得而失為果失宜以吾為蚩蚩者也同樵者憮然有間曰而將混其醒醉而齊其失得乎而將逃于有為而匿于無為乎無為則無事乎樵已乎醉樵曰噫嘻而知有為之為而不知無為之為而知而之為樵而不知吾之為樵吾為而言吾之樵吾之樵也以精神為斧斤而發之於純一之硎以假若木不足以當其銛扶桑不足試其鋩而大造則吾薪之根也元氣陰陽吾薪之幹也日月列星風雨霜露吾薪之柯條而擾擾之生物則吾薪之朽腐螙蝎也吾今剔其朽抉其螙棄遺其柯幹而得其根矣而以吾為醉而然邪醒而然邪是為有為邪無為邪彼亦能盜吾之有而有之邪將弗能盜之邪同樵者無以對乃復頽然而就臥撼之而不蘇呼之而不寤同樵者若忘若遺若諭若悟惝恍踟蹰負薪而去僂説婁江有僂焉畚其業農餘而織農作而售以為常歲戊戌婁民大疫東事弛畚弗得售或誡僂能殺而直將賈諸僂曰嘻詎以暫而奪吾常也織之不置畚愈積里多讓之僂唯唯明年吳大發民城杭僂用無留畚資直甚裕里賀之僂亦唯唯果何為者邪業之不售守其常而不屈心無加憂功無加怠業之既售有其利而不驕功無加修心無加喜異哉噫士君子之所為茍僂之若也吾知其于道不逺矣莊生説甚哉莊生能行其道也以布衣而國君尊信之非有盛德宜不如是竊怪其所為皆市人之道也太史公稱其亷直是豈然哉以金之故而欺其君復以金之故而賊其人市人有所不為廉且直者為之乎雖然生無足道也信之者可笑耳吾有以知戰國之君果若是庸庸也噫其君庸其臣則肆其民得遂其生乎至正辛丑冬讀越世家書雜説四首黃老之術儒者之徒弗言以其惑夫人之道也然曹參之興起文景之崇尚者黃老也武帝之好之公孫𢎞之用之者儒者也何武之治不逮於文景歟噫武之好儒非誠也𢎞之業儒非真也儒不純且無益况不真乎文景則黃老之純者耳其治國優矣克擬于唐虞矣乎唐虞之治其儒之治耶抑亦黃老之治耶雖然五榖種之美者也茍為不熟不如稊稗黃老于文景之世其稊稗之秋也歟居竒貨以徼利者候時而待價弗亟乎其信也是蓋賈之良者焉貨之弗竒而急于利則走市而鬻之走市而鬻之雖貴亦賤况賤者乎伊尹大公之貨竒貨也韞櫝亦久矣茍非求之者亟弗易出之也及出之則大行于天下後世利不既博乎孔明學伊吕者也故有足稱焉王猛則嘗走桓溫之市矣桓不見用直猛之貨未甚竒也然猶有不猛及者何如哉嗚呼彼操瑟立齊門而不售者乃欲誰之咎耶士之大節出與處而已矣蓋出處在乎已所以出處在乎天在乎天時也在乎已其道歟衆出已獨處必有所存之志也衆處已獨出必有可行之道也衆出而隨之出衆處而隨之處則其所執下矣時處而處弗嫌人之皆處也時出而出弗忌人之皆出也忌人之皆出矯而處焉嫌人之皆處激而出焉則又詭竒而自異矣詭竒也執下也惑也仲尼曰或出或處蓋君子之道在焉觀人之節者據是而求之可以得其情矣古傳驗陳寶得其雄者王得其雌者伯咸謂此談者之夸辭也故褚遂良以對太宗飛雉之問而蘇軾氏譏之雖然軾亦不能無失也軾謂太宗時所集者雉有不足以問陳寶之符不知陳寶與雉相去能幾何也秦文之伯不及齊桓不聞齊桓得陳寶而後成也光武之治不及三代不聞三代得陳寶而後治也蓋帝王之符德焉而已祝網之言湯之符也虞芮之化周之符也奚假諸羽毛鱗介之徴也哉世之論言者曰言有責也無責而言謂之訕然有責而後可言者今之制也無責而皆可言者古之道也均之治世不可以言治亂世不可以言亂亂而不言亂非言治也言治之所以也治而不言治非言亂也言亂之所以也治而言亂有所警亂而言治有所勸既警且勸其所習者革矣故狃于治而弗能終治者有自大之心也安于亂而弗能致治者有自棄之心也自大自棄皆不聞治亂之言者也自大于治亂隨其踵矣况自大于亂乎無責而不言世從而衰矣况有責而不言乎有責而不言上容之志見焉故知上容者所事必自大自大者所使多上容上容自大之相遭治亂可得而知矣富溪漁者説天目發源而下㵼大滙于具區而東趨其流分派别汪停迅注隨地不同而富溪其一也水至富溪猶散行者之顧影留連而舒徐猶祀餘之敬存陶陶而遂遂故其精神所聚有豐厚之家焉吾友彥常居之彥常溫雅和易巽順謙抑産饒矣不自覺其饒資裕矣不自有其裕而下人惟恐或失焉大夫士多稱之乃以漁自命亦足以知其趣向矣今夫漁蓋志于魚者也必修其網罟時其風煙約之以絲綸勤之以舟楫無不得魚者以盡其在已故也今彥常能志于善而忘其饒裕無矜無驕不怠不傲接賔友以禮讓教子孫以敦實其盡已何如哉善斯得矣大夫士之稱之不亦冝乎於戲觀富溪之波瀾而知其有本者以發源之髙觀顧氏之子孫而知其有本者以先德之厚漁乎漁乎吾將見其得夫善也猶掣鯨于東溟而不屑稽山之釣任公云乎哉任公云乎哉是為説墨翁説吳隱人沈起宗居闤闠之中康莊之會煉墨以自食名其舍墨室號其躬墨翁人咸熟之遂遺其姓若字與名曰墨翁墨翁或謂之墨已名其室何名室已又號其躬何翁曰非爾知吾因以自警也始吾之于人見夫欲言也含而不吐吐也留而不盡良為病之何自苦哉及觀金人之戒至于三緘焉則知含而不吐己幾失之出雖不盡所喪多矣夫墨默也故因以自警也是則果終默乎得屛而息箝而喙乎曰吾默其所可默不默其所不可默然可默皆是不可默惟二焉何也友也子也友也相輔以仁相勉以道茍一默焉昧切偲之義矣子也飭之義方約之詩書茍一默焉失訓教之道矣此其所不默也曰嘻何默之多而不默之少哉論未白其以質諸豫豫曰未也子不可默而有可默也友不可默而有可默也忠告善道不可則止不止致辱焉非友而默乎父子不責善責善則離離則不祥矣非子而默乎曰如子言墨翁其愈墨耶曰身教從言教訟徒向之諄諄不致其藐藐耶且吾有所聞焉耳何聞聞諸仲尼仲尼云何君子訥于言敏于行鈍齋説鈍非君子所患茍不以鈍自期不鈍矣不鈍非君子所貴或以不鈍自許斯鈍矣鈍之與否受之於天非力之所為者以質言也鈍之與否雖得于天亦人之所為者以學言也以質言者君子聽之以學言者君子勉之聽之者以言乎不鈍而不以言乎鈍不以言乎鈍雖聽之而不忘其勉之之道焉勉之者以言乎鈍而兼以言乎不鈍兼以言乎不鈍雖勉之而亦成其聽之之功焉則勉之也聽之也既各適其用而又相為用也不鈍而不能聽之是以不鈍自許也鈍而不能勉之是以鈍自棄也是皆下愚之類也茍力以反是焉則非聖賢之徒歟不鈍能聽之而不忽乎鈍者之自治吾于顔也見之鈍而能勉之而不忘乎不鈍者之所至吾于曽也見之是曽也非以鈍自棄顔也非以不鈍自許也不自許不自棄以至其極焉非賢聖其孰能也哉燕山王宗魯甫自號鈍齋徴豫為之説豫觀宗魯之質非鈍者也而以鈍自名是不鈍而恆懼其鈍也恆懼其鈍肯以不鈍自許乎必能加勉之之功矣其進曷可量哉宗魯也其有志于學者歟君子有曰賢希聖士希賢又曰顔何人耶希之則是吾于宗魯有望矣臞齋説沈思敬氏居吳之練祁清修自守以體之弗腴也題其齋之顔曰臞間以徴豫攄其説豫嘗造其居焉客有指其顔者曰夫盛麗紛華人之所慕也而弗居舂容豐澤人之所悅也而弗取顧以是名豈將斂容下志儉約以自處乎老當益壯何古訓之不式也或曰非也吾聞之退者進之基損者益之始欲取而必與知白而守黑弱可以屈夫強柔可以勝夫剛是皆抑之所以揚之者也庸詎知其非臞以致夫腴乎豫曰嘻是固然歟曷亦觀夫四運哉時之春也萬物敷暢而條逹氣融而色暢天地之間充滿洋溢可謂腴矣然物之生非物之成也洎夫秋也萬物凋落而揫斂氣凝而質堅天地之間沉寥蕭條可謂臞矣然物之生者至是而始成焉君子之為學亦然幼而童童而冠冠而壯腴之時也然必四十乃不惑五十乃知天命人至五十猶時之秋也而學既成矣材之成乃以致夫用學之成乃以及夫物則腴也臞也果孰愈哉思敬也當富盛之年蓋嘗從事于功名利祿之間矣今乃間居靜處潛德而弗耀以教其子孫而善其鄉里則其及物者果腴之時耶臞之時耶以是名齋果非也耶果是也耶客無以為對思敬曰願書以為説朝宗字説學者必造聖賢之域猶水之必歸于海也水而不歸于海汙焉者也蓄而不遂者也學而不求造聖賢之域畫焉者也惰而不自勵者也水之汙焉水之所值然也非水之罪也學之畫焉學而自棄也非學者之罪耶蓋惟無學耳茍學焉固不可以自畫也江生名漠而字曰朝宗取書江漢朝宗之義朝宗諸侯見天子之名以江漢之必歸于海猶諸侯之必朝于王故云夫江漢大水也登諸岷與嶓以至于海其道里之逺逆折之艱亦甚矣雖逺且艱不歸于海不已也今人之為學求諸其身甚近也聖賢之域亦不外乎其身也無道里之逺逆折之艱也何為而不自勵耶雖然無其志則無其功茍有志焉何所不至也江生既以是名又以是字其必有志于學已有志于學寧不底其成耶江生也茍能勉焉以無負其字之之義則余之説也蓋可徴也已孟敷字説事為之善者莫甚于務其內而不務其外事為之不善者莫甚于知有內而不知有外善其務內而不務外者非欲使之遺其外也先其本而後其末也不善其知內而不知外者非欲使之事其外也有其體而必致其用也今夫泉出于源混混焉不舍晝夜盈科而進放乎四海由本盛而末無不盛也其澤物之功為何如哉茍雖有其源而不能泄治清潔下而不上為時所舍則體雖存而用則亡矣尚何望其及物之功也哉蓋事其內而不遺其外是培本以逹其末明體以適于用也則其善也斯足謂之善矣潁川陳生名謙吳其家也其祖若父皆以溫恭遜順之道自處故以謙命之生以豫交其父祖間也來以字為請為字之曰孟敷夫謙者卑下之道敷者施布之義也以卑下之名而傳之施布之字其亦有其説乎豫嘗究夫謙矣蓋謙有存乎已者焉有敷于人者焉存乎已者內之謙不自滿足之心也敷于人者外之謙溫恭遜順之道也能存其不自滿足之心斯能敷其溫恭遜順之道茍溫恭遜順之道有不敷則不自滿足之心將不存矣此敷所以發其在內之謙使之施布于外也故謙之六四曰無不利撝謙夫能發撝敷布其謙承上接下之道得矣又安往而不利之也哉雖然又有説焉人之為學未易量其進止者以其有不自滿足之心也學而有不自滿足之心則所見愈明所處愈髙而所行愈逺所謂培本以逹末明體以適用者無所偏而溫恭遜順之道自有不得不敷者矣孟敷識之當益勵其不自滿足之心以無忘父祖所以命名之義必有徴矣字李氏子説萬物本乎天人本乎祖木必有本而後枝葉生焉蓋枝葉非本不生本非枝葉不芘枝葉而能芘其本斯盛矣子孫而能光其祖斯孝矣孝乎孝乎亦報本之道焉耳李氏子名嗣祖求字于豫豫字之曰彥本彥本也能毋忘乎孝斯不孤豫字之之義矣字蔣氏子説人有疑則思問能問則理可通而惑解然仲尼曰舉一隅不以三隅反則不復也其亦有不獲問者乎非然也不復不告于不再問者耳再問是能證三隅矣烏可不白之耶有弗問問之弗知弗措也在勉之而已矣蔣氏子名思問求豫字字曰公勉公勉也能致三隅之思斯不孤豫字之之義矣字瞿氏子説前人之望其後之人無不欲其久逺而蕃昌也後人能纘承前人之業則由是而逺而不負前人之望矣纘承之道何如亦學而已勤于學足以榮其先怠于學足以忝厥祖學其可不務耶瞿氏子名纘求豫字之字曰思承而告以纘承之道思承勉旃母或怠荒允纘前修俾逺而昌金容之字説處物之道莫大于能容欲有容莫過于自治能自治其所容也益大矣夫所謂容非姑息容忍之謂蓋包含容養之謂也必欲自治者欲己之明也已茍不明則物之至吾前而眩瞀惑亂不能别其是非邪正而欲有容焉必致于姑息而容忍矣已既明則善者吾知保而飬之使得自安不善者吾知涵而養之使之自化使之自化則不善皆歸于善矣有容之大孰過于此哉然所謂明非在乎一事一物之間而自治又非一朝一夕之功也亦嘗觀于水乎夫水之在物蓋至明而至難定者也惟其難定故雖明而恆汨于泥而濁之不能致夫明之用要在乎力加澄之之功而已能加澄之之功則水既明而能容萬象之見矣惟心也亦然心之于人蓋至明而至易放者也惟其易放故雖明而恆蔽于欲而昏之不能致夫明之用有甚于水之汨撓也心之撓有甚于水則澄心之功當不益加于澄水之功乎能益加其功則心既明而能容萬理之著矣萬理既著則是非邪正之至者吾得以區而别之以各盡夫處之之方其所容者大而能盡其心之量是知澄心乃自治之本而能容乃澄心之驗也故非澄心無以為有容之地非有容無以見澄心之功然有能澄心而不能有容者矣未有不能澄心而能有容者也不能澄其心而欲容夫物則所謂姑息容忍者矣其于自治不亦倍乎茍能澄心而不能容物則又不足以盡夫心之量豈所謂能盡夫自治之道者哉是則能容也又所以盡自治之道也歟句吳金公信氏有子曰澄從豫逰丐為之字豫以其方嚮學也字曰容之而告以自治之道焉容乎勉之其能以包含容養為之法姑息容忍為之戒吾將慶其有成矣沈文矩字説吳興沈伯凝氏嚴于教子家庭之間雍睦可觀仲子程既冠矣方其冠也請字于賔曰文矩時固有三加之辭已今命之從豫逰也復求豫講夫矩之義以教之於戲豫嘗思之矣弟子之于師也其猶獵之于原漁之于澤各隨其力可以遂其得焉師之于弟子也則猶礛錯之于璞玉斤斫之于杞梓機杼之于蠶絲麻枲各因其材而必底其成焉今程也有可教之資伯凝有必成之望則豫也烏可不勉之以底其成哉乃謂之曰亦嘗知夫規矩之謂乎規矩所以為方圓之器也今欲為方而必求之矩是欲食而必食欲飲而必漿也其可以他求乎哉茍能知矩之為方已而不能以功自程是知食之治飢而不勤于耕漿之治渴而不勤于鑿弗能遂所求矣然有能不憚于勤而自力者而不知漿之在鑿食之在耕則亦自程其功而不知矩之所以為方者冥行觸途進退何據哉惟學也亦然學所以為君子也窮理盡性為君子之道也為君子而必事乎窮理盡性斯為方而事乎矩者也知窮理盡性為君子之學而不能致日新之功斯知用矩而不力于自程者也知自力于君子而不知窮理盡性之學斯能自程而不知用矩者也噫能自程而不知用矩不至于方而已知自力于君子而不知窮理盡性之學則疑仁而陷于墨翟疑義而陷于楊朱其害詎可言哉此所以知矩而必力于程能程而必求夫矩也雖然矩之與程其亦有先後乎吾聞之矣先明諸心知所往然後力行以求至焉為學之序也今名之者蓋教以力行字之者實誨之知往豫之説則又勉之並進其功也嗚呼程乎其敬若翁之望毋忘而師之勉哉李氏子字士期説橫山金公信氏通敏有襟度恆自振奮不欲後于人有子曰澄從豫逰漸通義理既求字之而為之説矣有壻曰頤姓李氏又求為之字而勉之夫欲成其子固人之情也復欲成其壻焉則所謂恆自振奮不欲後于人豈不信哉乃進頤而謂之曰古之記禮者百年曰期頥釋之者曰頥養也人至百年無所不受其養也所以謂之期者人夀以百年為期也今宜志曰士期期乎聽之豫則又有説焉今夫人之生子也必期之曰是必享百年之夀也以百年期其子者是愛其子也及長而學也要必期之曰是必為君子也以君子期其子則愛其子豈不愈于期之以夀乎人之始有知也必自期曰我其享百年之壽乎以百年自期者是愛其身也及就學也要必曰我其為君子乎以君子自期則愛其身豈不愈于自期以夀乎期以夀則于身也有限期為君子則垂名于無窮且期以夀則既有限而又或不可必期為君子則既無窮而又可必也自期者不于其可必而于其不可必豈所謂善自期者哉然期以夀蓋夫人而然期以君子則非知學者不能也古人有言立志以明道希文自期待又曰伊尹顔淵大賢也學之雖未至亦可為賢人是非能期為君子者乎可以為法矣期乎勉哉茍勿徒期之以有限而必期之以無窮斯所謂善自期矣斯不孤夫字之者之説矣斯能體夫求為之字者之心矣是為説沈文權字説姑蘇沈氏以雄資巨族聞海內有子名巽字文權簡厚寡默乃父伯凝謹于教子命之從余遊間為之請其字之説余不得而辭也觀其字之之義蓋取繫辭傳所謂巽以行權者焉於戲聖人之陳九卦所以明夫反身修德以處變之道而終之以巽以行權權豈易言者耶雖然余則有説焉君子之處事莫切于巽也能巽順于理處事之道斯得矣欲巽于理將何所先其惟學乎夫學以究其理而巽順以行之無不可為之事矣故曰巽德之制也今巽也廕庥乎重慶之下方當其富有之年致其問學者有餘功資其問學者有餘力齋居清肅忩户間靚明師良友之是親卷帙簡編之是習則其學之成也不有望乎雖然行逺自邇登髙自卑不可以躐等進也故九卦之陳必有其序焉基所以立柄所以持心不外而善端存守不變而恆且久懲忿窒欲以修身遷善改過以長善自驗其力不變其所然後能巽順于理以制事變其至于權極矣權豈易言者耶雖然巽也年富日益強學當日益進優柔巽入以至仁熟義精于事優遊有餘裕此行權之義在體之何如耳用為之説陳巽民字説吳有良于醫人之術者姓陳氏字仲原年登八帙矣而和厚恭慎其所業書在九家者流雖自有其説然其間有不能不涉吾書者仲原必尋其逹道循階陟戺以求其所以然故其比他業是業者有通博之聲焉仲原之子希武恂恂殊敬飭見士君子未嘗有惰容士君子見之亦未嘗不歎其家庭之有素也希武之子曰謙既冠矣所筮之賔為字之曰巽民三加有辭成人之道備著而其所以字之義則來請其説焉於戲謙名而字巽誠有其説是取于釋夫地中有山之卦者之義也地中有山其卦名謙釋之者曰謙巽也以巽釋謙何也巽之為義順夫理也謙之為義有而不有也蓋有而有之屬乎私有而不有屬乎公公理也有而不有能順夫理矣此巽所以釋謙也然嘗觀于事矣有成而後毁也有盈而後虧也有盛而後衰也有得而後失也有而不有斯能有矣故謙之彖曰君子有終焉譬諸學也有若無實若虛則可造聖賢之域亡而為有虛而為盈約而為泰則難乎有恆足以見之矣今巽民得天與之美資承父祖之嚴訓名以命之字以申之既深切而著明矣巽民也宜益諟夫名之字之之義以母忘父祖之攸訓哉花用端字説東邱花用端名本自南粵遊東吳介余友瀏陽湯時中來見且致其所以見之意焉觀其人氣貌沈渾動容周旋安舒而慎飾詢其年踰冠耳而志尚殊正樂從士君子遊處一聞講説經義論古今事理輒歆歆喜見于面因歎曰貴遊而青年有若是賢耶固可以見其質之美矣間而來告曰某之名若字既承君子之嘉惠而其所以字之義則有未之悉者茍得聞其義以佩服之斯至幸也敢請余然後知用端之質誠美矣能不為攄其説乎蓋凡物皆有本也而本之為義實始于木焉夫本者木之所由以生者也故本之固者其木修本之端者其木直既修且直則材之成也足任工師之用矣顧修之與直乃有不得而兼者焉然能修而不直工師不顧能直雖不修亦弗之棄矣噫其直也非由于本之端其可得耶今字用端者因名以取義將不在兹乎且夫用端之資于家者有溫厚之地賦于天者得懿美之質其本端而且固矣又何慮夫修之與直不得而兼也哉雖然本固矣無使夫佚欲以撼之本端矣益加夫學問以培之始于其賦于天與資于家者無負焉蓋固而無撼則本日深而愈固端而益培則本日盛而愈端愈固而愈端則吾將見用端也良材之成與丸丸之木同致夫棟隆之吉矣是為説半軒集卷七
