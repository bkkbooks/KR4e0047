body:
  text: 半軒集卷十二明王行撰方外雜著鶴瓢山房記吳城東北有老氏之居曰寜真主者李君名睿清慎好學其祖閒翁時開堂館其徒之四方至者户外之屨恒數十兩有黄老師者自蜀之青城山來道氣崐峭一室盡傾君遇之殊謹居數月告去君以爲學之要扣之黄嘆曰汝誠志扵道邪因語之云云暨出一瓢曰是從我幾百年行地餘萬里今以遺汝見是如見我也勉之君敬愛焉瓢形類鶴遂以鶴名之幷題其室曰鶴瓢山房仍以自號尊信黄師之意也兹二十年矣今年秋始至告予以其故且曰睿之㣲有所得者皆師之惠也敢忘諸雖然睿不敢忘睿之弟子其能識乎弗能識則繼其後者無復知吾名室之意一再傳而遽令老師之惠泯泯此睿之所懼也願爲記之以貽後之人焉予聞之曰李君可謂不忘所自者矣然有道之教人不下滯扵物也師顧使君滯一瓢亦因其形似以寓其警勸之意焉耳夫鶴之爲物遐引而髙舉尚潔而變𤣥脩頸鉅喉納新吐故豈欲君絶去世紛知白守黒以同之與舍其凡穢采氣混元以同之與思其鳴響應時而不息其屯䝉子午司天之候與思其金乘火養而全其七返九還之功與不然瓢奚繫扵道哉若夫因是而進之無怠則胎解羽化浮㳺太虚與造化相終始又非鶴之所可倫矣噫此特予之億之者也庸詎知黄之意果爾然耶言未既君作而曰睿所以服之而致夫有得者君皆盡之矣然二者欲勉脩之二者未之能修也幸庸書之以重之警焉寧獨爲後人之語也哉予嘉之遂書為記君字士明至正二十六年九月日百丈泉記吳城之西有山聳㧞深秀群山迴環勢若拱向者曰穹窿山之半有泉泓浄明潔餘流下注者曰百文泉泉不知發扵何時其名則浮屠梵廸所制也初迪相地搆居于山之北麓今海雲庵是已搆成門廡殿堂庖湢悉具洎土壤髙亢艱扵井飲迪曰鳥可使後人有勞汲之艱扵是披榛扶棘得是泉扵樷翳間即䟽甓而引之比屬于庖累百尋焉此名之所由立也蓋六十年扵兹矣至正二十五年春迪之孫智及介予友道衍要予觀是泉請爲之記予謂之泉之出久矣而弗記今欲記之何也及曰始吾祖之成是居其營謀經度已艱且勞矣洎求是泉勞又加焉吾徒乃泰然享其休養之安扵此寜不思所自有以自修而爲之效乎故集扵泉也見其非渟之能清非汨之能濁則思學不待勸而勤亦必不沮而惰也見其一脉之㣲能及千仞之逺則思善必由積而成惡必自隱而著也見其源源之流晝夜靡間則思惕勵修省無一息之可懈也見其潦不爲之濫暵不爲之涸則思毋富驕以滋欲毋患難而忘道也今吾則省矣吾子孫去吾祖日逺茍無以示諸後則創始之艱其弗能知而益以怠矣兹欲使知祖宗之念其後者之不敢忘如此庶或有所警也故不可以不記幸子無難焉予聞而嘆曰及亦賢也浮屠以空寂爲宗扵事少能計慮而猶圖及扵是也夫貴家大族憑藉世資惟事荒佚至不克負荷則甘自零落委頓者寜不少知愧哉今以及之賢使不溺其法而齒扵冠帶則其所爲必又有可觀者矣惜其老也故不辭而爲之記迪字允元嘗主義興之善夀寺及字以申今主徑山五月十六日記素軒記乾竺氏浩宗原闢丈室之東偏爲燕休之所軒其前而題曰素間造予告曰浩之獲㳺扵門亦舊矣願一言使自勉焉予爲思之夫乾竺氏離宗族去親愛屏逺聲色淡泊嗜好則衣無綺繢之飾食無鮮毳之美出無俊華而居無斵鏤皆其法之常也又何揭諸顔間以自見哉且宗原端慎敦實人也端慎必無悻悻以自髙敦實必無的然之事外又鳥有皦皦求人之知之意乎其所謂素必有其說既而悟曰吾知其所謂矣非宗原將不及此之㫖夫素者常也常斯久久斯成雖以天地之大上而髙下而厚繫之日月之明運之四時之化載山嶽之崇而振河海之廣亦以其常耳故能前乎已往之世而莫計後乎始來之日而無窮也或少忒其常焉則變恠興菑沴作莫遂夫一朝之居而不能成天地之功矣人之學也寜異是乎即事以明夫善反身以致其誠求之精勤而持之悠逺不渝扵尊榮富貴之時無倍扵造次顛連之際則學之成也有望矣茍暫作焉而遽輟始暴焉而終寒雖華而不及實雖播而無所獲吾知非善學者矧望其成乎此學之所以不可不自力扵持循之功也宗原有見扵是而欲勉其素守之常也歟况凡人也弛焉以自放也易奮焉以自飭也難常情莫不憚扵難而樂扵易故學者未嘗不少而成者未嘗見多也今宗原以粹美之資而克自砥礪如此則學之成也不扵宗原有望復誰望哉是顔之題也亦書紳之義也吾可以不記乎是爲記適軒記呉人李士明氏學老子之法舊以適題其所居之軒嘗邀余兹軒之下客有謂余扵坐者曰子知夫適之道乎余曰不知也適之道奚爲子盍爲我言之客曰事之在人以爲悲而在我則爲樂在人以爲病而在我則爲泰在人以爲忿怒而在我則爲悦者孰使之然哉其志趣不一而所適者異耳夫柔臑甘毳之扵口珠玉錦繡之扵體利欲快足之扵心三者人之所同好也溺人之所同好故得之則忻失之則戚予之則喜敓之則怒既得而復憂乎失既予而復懼乎敓則憂懼悲戚相尋扵無窮是帥已而聽役扵物也又何時而自適哉今將以淡泊適其口以朴素適其體以自然適其心弗犯乎憂病弗渉乎喜怒弗干乎欣戚則無所往而不自適矣余應之曰噫子之所謂適者子之適非我之適也子之適有恃者也以淡泊適其口非淡泊口將不適耶以朴素適其體非朴素體將不適耶以自然適其心非自然心將不適耶故曰有恃之適也有恃之適是之謂適之不適適之不適則無徃而適矣吾之適詎子之謂耶吾之適不適扵淡泊而亦不適扵非淡泊也不適扵朴素自然而亦不適扵非朴素自然也必淡泊朴素自然而適者膠膠者也非淡泊朴素自然而適者皎皎者也吾則不知適而致夫淡泊朴素自然耶亦不知淡泊朴素自然而致夫適耶謂淡泊朴素自然而致夫適者非也謂適而致夫淡泊朴素自然者非也謂淡泊朴素自然無與乎適適無在乎淡泊朴素自然者亦非也淡泊也朴素也自然也適也渾渾乎與俱茫茫乎同歸放之荒荒而弗即付之𡨕㝠而弗追是之謂不適之適也適之適又安往而不適哉以不適之適而較夫適之適其有間乎其無間乎將以適之不適以鐫汝之年乎抑以不適之適以全汝之天乎客窈然無以對某曰子之辯亦善矣子之道亦勝矣某亦敬承教矣可不記之乎予曰唯遂書以為記瞻木軒記吳城東北隅有老氏之館曰寜真館之左廡有萃賔之堂曰聚雲堂之東偏有偃休之軒曰瞻木軒之陽有木孤幹亭立柯條下被者則陵杏焉初植杏而南歩許有大櫰數尋杏生倚之出其顛華葉明秀為館之勝及城被圍其櫰既伐杏亦併廢未幾故杏之根旁逹者發焉斯今杏也以無汚廢因挺特而起把而且拱矣不傾不偃若非杏者館之主者李君以其弟子𤣥修嘗讀書扵是也指以謂之曰若知世之爲物非有所依不能自幹者也今是杏乃能獨立如是可以人而不如木乎爾其朝夕視之以自儆也遂以之名軒焉明日𤣥修來告以是言求文爲軒之記嗚呼𤣥修誠志扵學矣乎每從余以逰蓋將以求益也今名軒之義乃師之言固盡之余亦可得已哉嘗觀夫木之生扵山也其脩竦端直而材者率林立者也連蹇踡擁而不材者多孤植者也林立斯有藉扵匡掖之功孤植則無得扵夾持之助惟人亦然矣學之成恒存乎引翼鐫磨其不成者則失教扵父兄師友也茍或非待乎匡掖夾持而有成無失扵引翼鐫磨而不進是則不以自立又以自棄者耳自立者固當以自法自棄者可不以自戒乎今𤣥修質性淳美好學向善雖無引翼鐫磨固望其戒扵自棄况有父兄師友之資也耶昔者富鄭公洛都之館有杏聳特髙峙時人異之以爲公遺其正直以訓其子孫也是杏也得無近似之乎則𤣥修之學師扵古逺有鄭公之訓法扵今近有乃師之言其成立之有望可信矣夫雖然𤣥修也能扵余之說屢誦而屢思之亦必求所以副人之望矣贈道衍上人序世謂沙門氏離去中國禮樂制度之事故其法縱弛曠肆過髙無實衆以此病之孰知其不足以蔽人之善哉北人渡河而㳺人則駭也蓋其俗故不善㳺而莫之信也今沙門有能修道徳攻文辭治先王之言者爲其法所泥希或重之余未嘗不爲之三復而歎仲尼稱不以人廢言而可以其法而遺其人耶呉沙門道衍上人髙爽通亮氣貌屼屼聽其言求其學隂察其所爲不合扵儒者無幾特有衣冠之異耳嗚呼余可以少斯人哉古言人之超乎其類非俊偉弗能也蓋上人所謂俊偉者非耶上人醫家子醫家固多隂徳後必大其在上人歟然不遂爲儒而治扵沙門氏何也當紛離潰擾毁酷恒人之所居獨沙門哉上人年方壯今天下亂已極且必該治治然後出扵時以發其所藴其上人之志歟不幸世或不治上人沙門以終其身蓋亦有其命焉雖然豈余之所望哉所以聒聒道此者非自喜欲以發夫不知上人者也上人豈以余言爲戾其法也夫送道衍之逕山序道衍上人呉人也魁磊髙岸氣度偉然恒自重其所負喜爲博貫該通之學其吐辭華陳論議往往峭㧞而深濬髙者既欲求逐扵古人下者亦不屑與其徒較是以鬱屈抵梧落落而難合予嘗觀其貌有以識其中是其所爲固知其逺扵世也其居婁水之上蓬藋蕭然居之不以爲陋閉門深坐或數月不出出遇髙山深林大溪長谷㝠搜遐覽亦或屢嵗不歸興之所至則長歌逺嘯慨忼悲激莫知其所以也每曵履行呉市塵埃中大夫士尠知之者間獨樂與予交不知其何求也且求慕古人以徇扵道不知爲世俗之爲信古人之所尚不知今時之所好知内之必當治而不能求務外之飾非我者衆是我者少毁者日來而知者未遇所以邅迴抑逆莫克伸其志也上人之與予交欲何求耶將益求其迕扵時邪欲求夫合扵世之道邪茍求合扵世之道而扵予焉不其愈難合已乎雖然當世之人安知終無與上人同其志者蓋知有所待也使終無合扵今將有合扵後世不合扵今而合扵後世其得其失亦必有所辯矣庸何患焉已而上人果有逕山書記之召來告行則喜予言之有徴也夫逕山天下之大刹書記其徒之髙選茍㣲知上人者孰能以是任之哉則知不待扵後世而今已有知之者矣雖然亦不足爲上人喜也蓋合不合在命可以合可以無合又在義焉上人亦何與哉若予者雖無可以求之扵後世然亦不能求合扵今也上人其往哉予亦終索居矣送浩上人序世之不可以意而求而亦不可以意而却者惟名爲然蓋有期之而莫能使來拒之而莫能使去者矣今有人焉窅然而居泊然而處知盡乎已而不知慕夫人固無事乎聲華矣然而不期聞而聞不期著而著者以其實之積也譬壤之沃焉不能使草木之無滋石有藴焉不能使巖巒之無澤也素軒浩講師宗原友扵予舊矣爲人通和而詳慎莊重而紆徐内典既精外學兼富然恒謙以自牧故人彌加禮重杭之􅆏亭松之崇先嘗虚席矣衆咸推之無異辭及請疏到吳師皆固謝不往是非諸名德所以望之之意然益髙其風致焉閲今已十有一年而師之學愈精行愈勵跡愈深而聞愈著矣洪武辛酉正月之吉呉典僧者顧會其屬曰吾職之重化𨗳而已今蘇爲東南會府報恩爲賢首五山以五山之大刹居會府之要區而講筵久不啟在政固當爾耶其各審擇所宜以補其處衆因曰必求所宜曩辭崇先之請者其人也即共舉師焉師亦亟辭或謂之曰出處各有時子莫之中不可執也何謂時人情焉耳今羣議已然勢不容止顧復䃘䃘無變將何爲哉言未既而檄下趣赴主司需考焉行有日其常所與㳺者咸賦詩以餞謂予宜序扵端夫名之不期聞而聞而拒之莫能使去者以其實之積也今師之實其固一日之積哉欲求草木之毋滋巖巒之毋澤吾知其不能已雖然順人情所以順時順時所以順理也亦何辭耶兹行也必有宗工鉅徳嚮之知師者今見師之出而益自信其知人之不妄者矣送浩師住報恩寺序善扵處已者斯善扵接物接物而善其處已可知矣然處已欲善而不欲有自善之心譬諸玉焉五徳之具天下古今共謂之非玉自謂也茍玉以自謂則不足以爲玉矣故凡人之善而自善者以量之不能勝而自覺其有也爵之所受爵之量也强之以爲觚則不勝不勝則溢矣雖欲不自覺可得乎是知善而不自覺必其量之宏而有所受者矣予友浩講師宗源其有所受者乎蓋其人也質粹而行髙才脩而學邃乃退然以自持欿然若無有先十有七年時嘗至龍河全室泐禪師方丈特禮遇殊厚徑山中竺咸謂予曰聞宗源嘗從子㳺誠逺器也全室將畀之髙職矣師即低回遜避卒謝以歸及主普光寳幢二刹徳望彌著武林諸山以􅆏亭舉之今左善世道公時住上竺爲製䟽辭期擬尤重師訖辭焉夫大方之宗師碩徳蓋莫逾扵全室愚庵用拙存翁融軒諸公者而皆扵師惓惓屬望如是非其才業之優處已接物之善能致是哉顧師則聲望日隆謙下日甚所謂徳量之宏善而不自覺者非師之謂其誰謂耶洪武庚午夏衆推師主席報恩師固讓而不獲也乃以四月八日迎師入山祝釐講道予有以知報恩之盛舊觀當還而南窓薰公之跡可繼矣蓋薰公之家靈鷲也而師實與同焉况人之待已重者視外必輕視外輕則有爲而不撓不撓斯可以成其爲耳今觀師之謙抑退讓皆其自待之重也自待如是視外何如哉吾將見其所爲有成而薰公不難繼矣是爲序澹如居士送圓講師序事之難莫難扵期所至而易莫易扵至所至期所至非難也而難之者期而易之則難也至所至非易也而易之者期而難之則易也蓋難其所期則志不懈易其所至則氣自倍以不懈之志而挾夫自倍之氣其能至也必矣夫東西家之相去甚近也茍無所事焉雖有聖人莫與之接也楚之距宋亦逺也茍志扵道焉雖北方學者莫先之也且古之所謂金石爲之不能堅水火爲之無所用者亦誠而已况不離乎曰用之常而無髙逺難行之事哉此志所在氣必隨之而不患乎至之不易也湛源圓講師之扵學也予知之稔矣蓋其資性敦慤無茍且之意故其所處多詳委而周悉其所業皆精實而淵慤方從事乎文辭也雖日星之明風雷之變若無關其視聽也洎研窮乎教典也雖飢渴燠寒疾痛痒痾若無與其口腹肌體也何也志有不暇也吾知師蓋不難扵所至而難扵所期不易其所期而易其所至者矣及融室翁之任報恩也是知師為法器師亦傾已尊事日親講筵數年之間竟獲大寳扵華藏扵是如事畋之得雋事耕之得穫事舟之得濟事構之得居所謂期所至而至所至焉然後知金石有不足間水火有不足蹈而髙逺難行之事有不足言矣洪武辛未正月衆以師補寳幢之席故事既舉當赴所司需試治裝告行所與㳺皆賦詩以送予則任初簡之責焉雖然亦何言也道扵天地間隨所在而皆是非語言文字之所能盡也然微語言文字將何以明夫道哉師也初既有得扵辭予復有得扵道也他日闡揚宗㫖使其徒咸得師之所得則融室之道益明而師之扵所自亦爲無負矣送李𤣥修詩序甚哉友道之不可不篤也能篤扵友道則其所以爲人者可知矣今夫我之尊也我得以仰承之我之卑也我得以俯視之扵仰承俯視之間其情有不能强盡者矣惟友也我之儔也世固有鬱積其衷而不可發敷扵父子兄弟之間者扵朋友乃能敷發之扵是而致其箴規焉勸勉焉切磋而砥礪漸磨而成就焉則友道之相資者爲何如哉此所以不可不篤也其道既篤而扵其暌離㑹合之際又有不期而然者扵其合也有不期之懽扵其離也有不期之戚蹔離而復合其懽淺蹔合而復離其戚深是皆其不期者要必制之以義焉若夫為親而勤扵其事事君而盡扵其職皆義之所在也茍有别也雖不能無惘然扵分手之時然終不紐其相聚之懽而爲無益之戚矣姑蘇李𤣥修𤣥門髙士也居太常樂歌之職幾年矣以二親在堂先嘗一歸省今年春復謁告來歸承親之歡者閱日月之交凡再兹將還職其所與㳺者咸賦詩以餞而徴予序扵其端予觀諸賢之詩雖與扵將離之懷而必勉之以慎扵其職雖美其不忘思親之念而又嘉其能盡事君之誠詞理粲然發乎情而止扵義予然後知𤣥修之與諸賢平時友道之篤也諸賢之扵𤣥修能盡交㳺之義也蓋非其友道之篤則不動其賦詠之情非盡交㳺之義則不能致切偲之益今既賦詠以發其情又切偲而致其益則其相愛而相資者何如哉予固不得而無言矣故爲之陳交友之道云虚白室詩序老子法中有士曰鍾希聲居吳之練圻練圻去吳城東南餘百里蓋瀕海之地也希聲雖居海濵而樂從士大夫㳺通敏而勤遜故大夫士亦樂與之也所居一室以其法中人語顔曰虚白彭城金君徳儒為記之予觀其文因知其為人也希聲既得君之記又求四方名人士之詩懇懇不倦閒來告予曰某不自揆竊獲諸君子之篇章以為華耀兹已成卷矣而未有序其首者茍得一言引之為寵不益加乎雖非所敢望而實所願也希聲其果勤若是已乎其勤如是可不告之以君子之道哉嘗觀扵天地間矣虛則通窒則塞虚則明窒則昧物皆然也今夫數尺之題數仞之堂其髙可矚逺矣而或面墻焉亦將何所見哉此室必虛而乃白也惟心也亦然虛則理著窒則欲昏理著則萬物在吾一心欲昏則一心役扵萬物君子小人所由以分也其可不自慎耶今希聲既名其室如此又求言扵大夫士而無倦其亦志扵君子之學也歟其能不泥其法也歟海萍説某詢無言上人居吳之婁江嘗觀扵海之濵有所值而興感遂以海萍自號因予友李錬師求攄其説因為思之夫言水之鉅莫至扵海言草木之㣲莫至扵萍以至㣲之草木而與至鉅之水相遭蓋邈乎其不相為情矣然海雖至鉅而其霑濡潤澤之理較之一勺之多未嘗有餘萍雖至微而其根萌生發之理較之千尋之材未嘗不足以理之無不足而觀夫理之無有餘然後知形有大小之殊而理則無殊扵小大也人之扵天地也亦然兩間之髙下如此其廣也數尺之形軀如此其𦕈也以如此其𦕈而處乎如此其廣之中寜異夫一萍之扵鉅海也哉然天地雖廣理則無間扵微人身雖眇理亦能充而大然後知天人雖殊而理則未嘗不一也天人之理一矣而人則尠能一之何也蓋夫人也其本固無二也其或氣囿扵生之初欲蔽扵生之後天人始離而二矣其因天理之明以開其物欲之蔽即學問之功以正其氣禀之偏自有諸已充之以至扵大而能化此聖人之所以能合夫天也茍自止以廢其已修之功縱欲以遂其不美之質强戾則覆其是非怠惰則甘扵汚下此愚人之所以益逺夫天也益逺夫天斯益逺扵人矣嗚呼人而求無逺扵人舍聖人將何所法也哉舍聖人將何所法也哉上人學浮圖者也而樂從士君子㳺必能求天人之理矣故説以貽之與道衍上人書行頓首斯道上人足下不相見使復通月共處一城若相去數百里然殊不能無惋惋僕以父母妻子之故生事繚繞弗得朝夕奔走以候足下斯道揭揭一身無反顧之累何不令僕時時望見顔色邪僕性朴野不能隨時追逐上下遭逢亂離所學固陋與世俗不偶屛處獨居誰復相顧斯道粗爲見知濶畧猶爾其他何所望哉㔻時與足下論朋友之道正不如此豈容一旦遽異所言私求其故未得其說及有人自城南來云見足下深自退藏若有所避然後知足下之不出有故矣始者與足下論朋友之道有不合流俗者固疑人不善也今僕果以是故招謗速尤令人畏避斯道之不出得無與僕類乎若然則古朋友之道不惟不可復行扵今亦不可復言扵今矣何也僕嘗言古者朋友有相責之義無相髙之心無相髙之心故友道篤而無間有相責之義故人争勉而自修是以友愛日篤而交致其益也今迺不然有相髙之心無相責之義蓋有相髙之心則恱善柔而親佞媚固不修相責之道矣相責之道既廢扵是親者前非疏者後議而違迕乖離語言譏誹之風作矣尚求所謂交相輔益者耶若夫士君子之所爲則宜稍振頹俗不當靡靡隨之使相責之義吾徒亦廢是朋友之道絶也而可乎蓋其悲之者深故其言之者切豈期惡異者聞之便起紛紛用爲尤謗世道如此聞之烏能不屛處獨居黙黙自守也今斯道之深自退藏意者亦坐是邪僕又以爲士君子平時觀古人之成壞理亂是非得失之迹亦能見善者善之見惡者惡之也使能因所善而爲勸因所惡而爲儆則我今效人人後亦將效我顧不偉邪矧今武夫𨽻史市子野人有向善之心者見儒衣冠亦知致敬曰讀書人也所謂敬讀書人者正以其能求古人之善以效之耳茍不能效之而又反之詎能徒愧所讀之書寕不有孤扵見敬者之心乎是以過不自量欲知修勵也然本出扵好善之誠不知乃速謗之道紛紛者愈甚矣又烏得不令人深避也今斯道之所主豈亦有是耶使斯道果皆若是則固僕之無可奈何者尚敢為斯道之責乎雖然亦不可因人之言而遽異所守也所守不變浮言將必自定茍必若紛紛之議人固不當爲善人而不為善與蟲魚鳥獸何殊僕雖不佞亦不敢自比扵蟲魚鳥獸以足下之敏逹髙明必自有處矣僕與足下外雖不同中實有同者蓋斯道非若他事佛奉師碌碌作沙門者也或迺謂僕収召異端不尊已道是蓋不明曉僕之心與斯道之所負者奚足與之辨耶聊爾及之以發一嘅嘆耳所欲言甚多非相見莫備道足下雖簡出其能强爲一來乎題道士髙九成知白巻知其白守其黒老氏之言也爲老氏者固當明其㫖予則知白字而有感焉白之為色色之本也能三入而纁六入而𤣥𤣥纁天地之正色則是染也所以成其白也茍紅焉紫焉君子恥近之則其白也喪矣夫人有美質而爲君子之學以成之斯知其質之美者也知其質之美而為君子之學猶知夫白之爲本而為纁爲𤣥者矣九成能從事扵學故以諗之素軒夜集詩引彊圉單閼牡月望之明日予與思尹湛源洎陸幼倫同過古永光僧院浩上人宗源房因留宿焉夕篹之餘乃開素軒煮芳茗焚香談詠身世兩忘曙光欲興猶不覺夜之徂邁也扵是相與賦詩以紀清集予思古云良辰美景賞心樂事四者難幷非逹人語也要知非風雨則良辰逺塵嚻斯美景會意皆賞心所安即樂事亦何待明月爲中秋菊花作重九耶詩成就書予引其首澹如居士題來鶴辭卷冠珮鏘鏘儼致齋清安堂上醮筵開九霄共仰孤鸞至萬里俄看衆鶴來寥唳清音風澹蕩回旋輕羽雪毰毸湏知感召由誠敬贊詠兼欣屬上才鐵嘯軒旌陽有遺𦙍亦賦仙人姿蕭散薄世榮結樓水之湄酒酣㺯鐡笛丹鳳鳴雄雌又如孫公和長嘯蘇門時爰名鐵嘯軒見者稱其宜雲間有吟翁時與同襟期昔倒樓上尊今看卷中詩翩翩繼芳躅屢誦騷人詞因之一憑䦨翛翛起遐思餘韻渺猶在春江烟樹滋題寒山拾得圖松風謖謖生夜凉白露欲濕練衣裳蒼蒼古苔遍幽石石根烟篠連疎篁攜手道人同徙倚應是禪床定初起笑指天邊明月光方寸要當如此耳贈無相湖海覔佳士氛埃歎銷沉獨有遺世踪不異古與今上人蒞名刹素聲著藂林㔻生無滯懷逸氣凌孤岑兹焉逺相過清風灑煩襟方欣共徜徉歘然起遐心歳月易云晏新陽復來尋去去何當還願貽金玉音毋令積遥思江山烟霧深和衍上人見寄二首行香子踪跡祗園談笑神仙到尊前人愛逃禪波瀾舌底風月吟邉似辯中安書中素醉中顛忘情世慮泉石因縁兩芒鞋幾度朝天歸來此日重話他年共夜忩燈春苑樹晚湖船時世推移造化難齊幾多般簸弄成虧䑕肝蟲臂臭腐神竒却又何論侏儒飽嵗星飢胷中磊磈眼底妍媸便將都付與希夷從前解事今已無知但睡時茶醒後酒興來詩詵上人留宿踏莎行是日俞明府鶴瓢道人同訪髙樹顛風疎篁嘯雨青山遶屋雲來去出林殘磬諷經餘撲簾輕霧燒香處閑客相過仙踪偶駐山僧更解留人住夜忩燈火茗鷗寛談不盡雞聲曙半軒集卷十二
