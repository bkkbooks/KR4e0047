body:
  text: 半軒集巻四明王行撰記彞齋記吴長洲沈伯凝氏好學而勤於古鼎彞尊敦之器金石法書之跡以至於圖畫象物珍異之玩一見輙能别識定其久近髙下是非良否之自湖海間號稱好古博雅者無不歎其知鑒家治一室左琴右書燕几在席題曰彞齋於其奉親教子之餘是休是處間嘗求予發夫義未有以復之也既而詢之曰所謂彞者與生俱生性所固有之常不増於聖人不虧於常人者也復何言耶且觀子之處家矣於親欲以盡其孝於弟欲以致其友於子欲以嚴其訓於外以和於内以肅固有之常兹見諸天倫已而又書其題焉則有言無所加無言無所損欲何言也耶伯凝曰然聞諸先生長者中人之資理易昏而欲易熾理易昏而欲既熾所固有者冺矣況下質乎故書於題朝夕瞻焉以自省而求夫固有之存願得語其要也噫伯凝誠可謂好學者矣好學而需言予可靳乎先哲有遺訓矣欲存其固有之常莫先於格致之功格致所以明夫事物之理也伯凝既多知鑒已推而廣之復何難哉夫格致以明其理然後力行以踐焉固有之常其不在乎彞也今既見其書於題將復見其有諸身矣伯凝作而曰教也如是敢不勉諸請書為齋之記洪武十四年冬仲吉南村記石湖之南有綺川焉圖經所載也今跡其地葢所謂莫舍者已村之聚三數百家前瞰具區後倚郡郭吴淞徑其左横山峙其右亦勝處也予友張季璉之居在焉季璉開敏有才具倚事談賞意度豁如學問既勤而文辭尤所嗜好自締予交見其日進而不已也嘗謂予曰靖節移居有云欲居南村非卜其宅樂與素心之人賞奇文析疑義耳言契於心地復相似今以南村自命矣予因笑曰家林去子之居裁一望雖不足自謂素心而文義則嘗從事矣來往無艱數與晨夕其可乎季璉聞之大喜是以不見未嘗不思見之未嘗不傾寫也他日至其居揭所謂陶菴之下有石屏樹其側髙可踰丈上刻八分書南村二大字字體類陳文惠公惟古勁過之下復小字書陶詩移居章首語石已多皴瘃非近時物也予甚異之季璉曰適得之耳因出其所記石隂文讀之事頗奇曲折見其記予然後乃知事固不容於偶然而亦莫非偶然也惟其偶然而始見有不偶然者焉昔聞有名其齋而不能自處者後之處其齋者名適應之嗟夫名齋者豈虞後人之應之而應之者亦固無意於處其齋也季璉之得斯石偶然耳而當時之刻石者乃適為之役焉此偶然而不偶然者見也雖然司馬長卿多文士也乃慕藺相如而名其名先長卿時亦有名相如者則文非所長也其亦同長卿之慕耶北宫黝似子夏而名未必同子夏欽鄴皆字子夏其果似子夏乎今季璉有契靖節之詩因以自號而刻斯石者其亦有此契耶是不可知也不可知不足論予則有所感焉綺川雖載於圖經而其名久不顯以無足為之表著者也今南村之名因季璉而已著後之事圖經者吾知其以南村明綺川矣季璉曰茍如子言願為記之以為後徵遂為記佳聲樓記凡聲皆足以動人而不能明動之之義聲而能明其義其惟言乎今夫聲之大而逺者雷也能動人之敬畏而不能使知敬畏之理聲之微而切者蟲也能動人之悲思而不能使知悲思之故聲之啁雜以讙者鳥獸也能動人之愛惡而不能使知愛惡之情聲之和暢而舂容優柔而窅𦕈者風與竹樹遇也能動人之愉懌憂傷而不能使知愉懌憂傷之道也嘗聆於樂矣五聲十二律更唱迭和以為八音之節葢繹繹然相續而不絶也及登歌也乃獨諦夫人聲焉以其辭之明而義之著也則人聲也其動人之至者乎古之人曰家有讀書之聲便佳矣所謂書詩書易春秋禮樂聖人之言所載讀而味之因其言究其理明所以為人之道以善諸已以淑諸人者也夫人聲動人之至者聖人之言又人聲之至也則聞之者烏得不感發興起而歎其佳也哉長洲沈達卿予友也志於教孫其子伯凝也勤於教子從予遊者曰程曰巽曰衡所謂孫若子也結樓面陽窓明几凈講習之所於也朝而琅然夕而泠然髙下抑揚詠歌諷誦諸生之讀書也過之者莫不聳然駐聽曰佳哉聲乎予聞而歎曰甚矣聖人之言之感人也豈惟古人聞而佳之今人聞之者莫不佳之也於是以佳聲題其樓焉逹卿父子迺前曰諸生之幸也承教於明師斯樓之幸也獲題於君子教既明勉其學以無渝題之著成其名於不朽茍得一言可以兼之矣嗟夫教之矣有不勉其成乎題之矣有不期其逺乎此固予之志也遂書以記之洪武十五年冬九月吉記韙軒記是與非公天下之論也而非非是是乃有未易公者焉亦在乎明夫理而已矣理既明則似是而非似非而是者不能惑吾之中而事有不可别者乎然而其父攘羊而子證之其事則是其理則非竊父而逃以避士師之論其事則非其理則是茍非學也烏能明夫是哉吴興沈生文矩資性通敏讀書賦詩􅗥出流輩嘗從予遊毎見其學日有進焉耳矣而處乎重慶之下熈熈怡怡家居嚴密棟宇宏邃其講習之所題曰韙軒來告曰生離講席日有荒落之懼願得一言以為朝夕之警焉於戯文矩其果志於學已乎夫韙之為言是也茍求夫是則無不可為之事矣然事之未至也講學以明其理則事之至也雖不求是自無不是矣茍怠於學而理不素明則雖欲求是又烏能得夫是哉然則欲求事之是當先明夫理欲明夫理當益厲夫學也今文矩以是名軒朝夕視之思無負其義則學日益進理日益明處事日益精而徳業日益新矣雖然平地為山雖覆一簣進吾往也豈假他人之力哉此予所望於文矩文矩亦當是予之言也夫居易齋記易古訓平夷也考之於經有與簡並言者矣有與樂並言者矣有與和並言有與直且諒並言者矣而子思子之書曰君子居易以俟命釋者謂易平地也居易者素位而行俟命者不願乎外不願乎外斯能素位而行素位而行所以不願乎外也而必曰君子者非君子不能也然平易之地常情不能無忽焉惟忽乎平易之地故有用智以求勝任數以使物者役役焉日勞其生以為勝可得而卒莫之得以為物可動而卒莫之動以至於氣疲神瞀乃徒歎夫力之不及也噫豈力之及不及哉理有不可違耳能知理之不可違而夷然居平易之地富貴貧賤夀夭禍福一委之富貴貧賤夀夭禍福而弗之計弗之計所以恒優游有餘而迄為所謂君子者矣沛國朱某父家姑胥之長洲有為以小篆法題其所居之齋曰居易來求文記之既為之敷其義而復告之曰齋居之題非徒為美觀記之之詞非徒以誦説要必體之于身也今某父齋顔之題如是必能書予之文揭諸壁間朝夕於焉以玩夫居易之義其將有所得矣有所得更當為攄其藴焉是為記何氏園林記吴城與杭相去逾三驛宋都杭吴為近輔地衣冠舊家多居之横山公有别業在今閭邱坊内人喚為孟園思陵常書城市山林四字賜之可以想見當時之景象矣宋亡園廢釋某者得之搆為僧舍謂之廣慈菴土木華盛矣洎吴内附菴盡毁為棄地者十五年而屬之何氏何氏㑹稽人居吴且三十載醫其世業也年開八袠學博而得其要術精而妙于用已疾無留艱者故雖字朝宗莫或輙字之惟稱可人翁焉翁既得是園積土為邱象越之曲山阿葢其舊所居處也因即其名而名之曲山山之左有礫阜曰玲瓏山山之麓有泉林有茶坡有按花塢有杏林有藥區至於桃有蹊竹有逕涵月有池藏雲有谷而曲山之南則將築為丹室闢為桂庭庭外為松門門之外曲澗繞之石渠通焉園之雜植龎萟亦皆森蔚葱蒨紛敷而芳郁日以清勝予總為目之曰何氏園林大夫士之遊觀者咸謂變廢區為佳境翁亦勤矣多詩以賦之翁嘗與予歩園中笑曰園之姓孟時固不意為僧居也僧居之盛安知為棄地地方棄又豈期夫歸之吾而獲大夫士之歌詠哉既往者如是未來者不可知丹室有成足以安吾之暮景餘則非所計矣予聞而歎曰翁真達人也盛衰消息相尋於無窮君子固不較也然以孟之崇貴釋之殷富盛衰之理有不可違者矣今翁之治兹園雖多清勝而不求夫悉備不至於甚盛聊假之為歌詠之資以樂其天爾代謝曷從而致耶況醫多隂徳嗣續有弗替豈孟之與釋所得而擬哉然則何氏園林吾將見其為永久之傳矣翁喜曰論至於斯可無記乎遂書以貽之洪武二十一年春二月甲子采菊亭記萬物囿於氣化而不自知惟氣化何如而已矣故潜焉而莫之飛植焉而莫之動菌則晦朔之不足木或千齡而有餘是孰為之者哉謂有為之者不可謂無為之者亦不可謂無為之者不可果孰為之也耶亦氣化而已矣今夫百榖之實飽人之腹一也而有先種而後熟者焉有後種而先熟者焉花卉之色悦人之目一也而有物生而即榮者焉有物成而始秀者焉物成而始秀惟菊焉耳葢榮於物生之時衆所同秀于物成之後其所獨物之獨也斯見其所守矣故君子有取焉古人有歎三徑之荒而吾松菊之存者夫菊卉類也乃得與歲寒之貞木並稱則夫其足取也可知矣毗陵華氏梁溪之盛族也變故以來不失舊家儀度而景莊氏乃以采菊題其所築之亭介來徵為記予因思之菊之為物在風霜揺落之時無美麗穠華之色而取之以名亭豈亦有其説乎葢夫菊也雖非穠麗而色則正矣況於風霜之時萬物揺落乃能粲焉而獨秀氣化使之然也夫氣化固無徳色於物而物又烏可不徳夫氣化也哉今華氏經世故變遷之餘能不失舊家儀度豈非氣化之然乎氣化固無徳色於人而人則不可不徳夫氣化也知徳夫氣化之徳則必視兹亭之匾覽兹亭之秀以益謹其守益正其色正其色而謹其守則既不倍夫氣化之徳又不孤夫名亭之義將與操歲寒之節者同見稱於君子矣噫其華氏之所以名亭者與他日質之景莊其必有以復我也行素軒記維揚李公弁居澄江之方橋有園池竹樹之勝以養親自娱樂方其少時嘗遨遊湖海間平夷險􅇖葢多歴之矣已而知世之事無有能得所不當得者因感夫君子素位而行之義題其所居之軒曰行素大夫士咸美其安於分而稱道之間來遊吴介以造予謁文為之記夫樂道人之善君子之心也況復求予言耶素其位而行非子思之言見於戴記者乎子思謂君子但因見在所居之位為所當為而不願乎其外故無入而不自得焉予嘗思之矣人之所患莫甚於有求所不當得之心懐求所不當得之心必無一時之不憂一事之可樂惟無慕乎外而安於其分則無一事之可憂無一時之不樂矣然至是也非夫力學之士葢有所不能焉今公弁以壯盛之年聰敏而勤勵乃能歛其喜事好功之心退然自守猶恐或未至而以行素題於軒其好學之志何如哉且古之所謂善事親者莫善於不辱其身而不辱其身之要乃實在夫安其分焉茍或不安其分則譏議隨之而及其親矣豈事親之道也哉今公弁存好學之心以事親為樂吾知其奉其親之色而必味其軒之題味其軒之題所以奉其親之色以瞻以思安分之心將不愈加謹乎安分之心愈謹則公弁也既得夫事親之樂而又益致其親之樂矣是為記洪武戊辰三月朔旦屋舟圖記吴陸振文氏居郡城中而别業在長洲之沙湖架屋渚間半出水上開户望逺若推篷然因題之曰屋舟及司倉鳯陽日想其處乃俾畫人寫其境象朝夕對之以自慰焉丁家艱歸出以示予徵為之記予與振文同郡也復有斯文之好欲辭得乎夫惟以官為家而罷無所歸此中世之大夫非盛時之君子也有可耕之田則不復自致於顯此庸人之論非君子之言也必也處鄉里之安而不憚於仕之逺仕於逺而不志鄉里之思庶不惑於庸人之言而可以學為君子矣振文家素饒雖更變遷未至有衣食累而乃不逺千里勤于公事可謂不惑於庸人之論矣然屑屑焉不能鄉井之忘至寫為圖以慰其朝夕之念則其為君子之學者又可見矣且至通而無滯莫如水盡水之用莫如舟舟水相遭無不濟者譬諸人焉水時也舟才也才與時遇道斯行矣今振文才既脩學既厲又值其時焉是鉅舶泛乎江河直前而無閼其致逺大之用而成逺大之業也不難矣是為記怡齋記顧季友氏性情平夷無過計曲慮事有不若意輙以理排遣去之終不留中致戚戚故人見其懽忻愉懌之時多恚懟伊欝之時少也家吴山之麓齋居洒然交友日集有以題徵予者為書之曰怡友反詰之曰齋謂之怡將怡其顔抑怡其心與怡諸已亦怡諸人與予曰不然如子所云有内外之分物我之間也以是求怡不得而怡矣葢凡人也内多惑則憂懼而不窮内既明則通融而無滯通融而無滯斯怡也矣然何為而能明哉亦學而已今夫讀書以究其理而理明即理以習其事而理安既明且安隨物應變無足以動其中者憂悲何自而生哉此怡之義也友曰怡既聞其義矣然不他之題而必題於是何也曰然傳不云乎為髙必因邱陵為下必因川澤則質之美者可與言道也季友性既平夷無過計曲慮不近於怡已乎而又益之問學之功砥礪之力則於所謂通融而無滯不難矣此題之之義也友既喻季友作而謝曰是豈友之語哉實我之教也敢請書之以為記三一齋記去吴城西南十里而近有澤為石湖予友金公信氏居焉公信有子曰澂年弱冠矣命之從予遊乃闢其居之西偏為屋四楹為修學之所間以名見請為題之曰三一且洎聞所以題之之義夫三以言乎始一以言乎終皆所以語學也亦必進澂而語之矣澂前謂之曰若知為學之道乎有三焉有一焉三以資其一一以成其三也何謂三曰賦予焉曰父兄焉曰師友焉何謂一曰勤而已矣葢賦予美之以質父兄資之以養師友淑之以教而已之勤則所以成之也得之賦予而有其質矣非養身將孰賴焉得之父兄而有其養矣非教道將孰明焉得之師友而受教矣非勤亦將何以致其成功也哉此三所以資其一一所以成其三也資者始而成者終為學之道備矣然世之質美者有之矣或工商而𨽻賤之無以全其美者造次顛沛失賴於父兄者也父兄之賢者有之矣而孤陋寡聞昧於君子之大道者窮鄉下邑不遇夫明師良友者也是三者皆在乎天而不可必得者也雖不可必得焉有飢寒窮困堅苦自力而有成者焉有間關涉歴千里事師而有成者焉然則不可必得者不待得之而所成自若也不待得之而所成自若果何以致之哉葢在天固不可必得在已者則無不可得也在已者何亦勤而已矣嗚呼以在已之無不可得而勝夫在天之不可必得非有志之士孰能與於此哉今澂也得之賦予者固不待言矣而所值無造次顛沛之虞所處非窮鄉下邑之陋是在天而不可必得者皆得之矣在天者皆得之在已者何難焉則學之成也不於澂而有望將奚望哉雖然不知學之道而不事乎學者勿怪也告之或不明知之有未盡而不力於學者弗咎也今告之明矣知之宜無不盡矣則澂也又烏肯不自治而甘自棄哉此予之所以望之也言未竟公信作而曰是言也豈獨以教澂雖某亦佩之矣豈獨某佩之在人人而宜佩之矣請書以為記蛻窩記句吴朱文奎父儒者也自少習舉子業治小戴氏禮既又旁及他經傳志記百家衆史博通該貫為文辭衍暢而炳蔚聲稱著聞今年幾六十矣于石湖之南綺川之上居焉方其遨遊場屋時孜孜焉思得時以用其學葢夢寐未嘗忘也及事有不偶則幡然改圖與田夫野人相逐於畎畆山澤之間熈熈怡怡若不知世有寵耀尊榮紛華利祿也家闢一室方不踰尋丈扁曰蛻窩葢亦久矣而所與往來無不惑之者以為蛻者出汚濁而升髙明之謂也窩者潜形伏迹延喘息以自存之所也兹名窩以蜕窩不能堪矣繫蜕以窩蜕并為累矣其意果安在乎予謂不然是葢有説也出乎汚濁之地而至於髙明之域人之所願也終之汚濁之不能出髙明之不能至者欲累之也求乎無欲莫先於寡欲能寡欲則髙明之域可望矣且所謂欲大要聲色臭味安佚自奉焉耳今安其四體而不求夫髙深廣邃之居以處乃自足於尋丈之窩焉豈非寡欲之一端與推是一端餘固可見則超乎髙明之域必自此窩始矣以蛻名之又何過哉行以質諸文奎文奎曰實某之志也請書以為記金氏墓祠記吴城西南有山蔚然抱郭者曰横山横山之左有支出而南騖者曰吴山吴山之東麓金氏墓祠在焉金氏墓祠者金氏之子孫守奉其先墓之祠宇也初金氏有名興宗以樸慎儉勤自致優裕子徳明克世其業貲用益饒始葬其父於是而立屋焉今祠是也由始葬三世有名文讓者磊落尚氣剛直有為不肯乗人險艱以徼便利人多畏重之年六十有四病且亟語其子莊曰吾宗故昌大而近浸銷落此殊疚心者也猶足自振者惟吾支耳觀汝所為必將有成吾宗其再立矣然吾祖宗自儉質起家至今百年濡澤廕休後人所賴可不知所自哉人於先墓多易忽忘汝其盡嚴奉之誠謹謹勿怠吾無遺憾矣莊於是頓首受教涕泣而佩服焉既終䘮首視祠宇撤而新之祠中所需次第充備乃洪武十四年夏五月朔旦來告于余且曰莊不敏服先人之訓十年於兹矣雖祠事勉􅁱不敢曠墜然以畢身而已茍子孫不知祖宗之艱勤遺言之教戒而無以善其後是先人之命有時而不用也歲月侵尋恐懼滋甚今願謁文刻石以昭示子孫使之繼繼承承具知所自而各勉焉以力其所當為則莊之責可以少紓矣敢再拜以請嗚乎孝思之誠深計逺慮其至是哉葢聞諸古矣事死之禮葬祭而已體魄既藏神依於主子孫之奉一於主焉此墓祭所以非古也然古人之祭也盡禮於奥足矣而復祭於祊何也以孝子之心不知神之所在故博求之恐其或在此或在彼也則祖宗體魄之藏又安知其神不有時而在乎此墓祭雖非古而中世以還禮有所弗禁也金氏之惓惓於刻石以示其子孫其亦知此道乎使其子孫因是而益儆其怠惰之心則凡報本之誠自不容於不盡矣能各盡其報本之忱則自身而家自家而隣里鄉黨薫陶漸漬顧不有關於名教也哉深計逺慮出於孝思之誠也予雖欲無言不可得矣是為記夀樸堂記松陵有地名綺川亦湖山兩間之一聚也居人三數百家務于耕稼而尊奉其鄉之耆徳以不違其教戒為善是以人無怠荒而俗多謹厚予友莫芝翁之居在焉莫氏吴興之仕族也方冠冕蟬聯時有深於盈虛之慮者不湛其懐土之習旁求善俗而分徙之因即以家于此兹凡幾世二百有餘年而芝翁紹之矣初其族之未徙也人固已推服之迨夫年既久而時既更留吴興者僅爾松陵之莫迄為一方之望至芝翁而加盛焉芝翁之居故有嘉樹葢樸也故老相傳初本之生亦常樸耳洎甹枿復生則日以滋大而脩榦聳立以承雨露柯條下被以覆本根至其向背左右揖遜之勢又非善畫者不能彷彿其形似故人之見之無不咨嗟歎賞愛玩之不欲舍去今莫稽其幾何年矣予嘗聞而異之夫所謂樸林野之間皆是也蔑之愛而獨愛於此乎及至而親見焉然後知愛之不為過而觀之因有省矣何省也省夫本根之所宜深固也惟其深固是以復生而益大凡物猶然人可不深其徳以為之本乎然物之與人類雖不同同一氣運也其木如是則莫氏之先所積其深厚矣子孫之昌也亦宜也哉已而芝翁於樹之隂面陽作堂題曰夀樸以寓其致恭先徳之意來徵文記之予于是又知芝翁之有見矣葢今人能仰夫先人之徳則欲其後之人亦仰吾之徳也後之人仰吾之徳則後人之徳將益修矣積徳相承其有既乎於戱徳之不窮世之不窮也樸以夀名其徒詡哉君子曰斯堂也固不可以不記斯言也尤不可以不書宜書之非直為一家之訓抑以為夫人之訓云洪武二十四年三月望記范魏公墨蹟歸復記宋魏國文正范公於皇祐辛卯冬仲在青社用黄素小楷書韓子伯夷頌遺京西轉運使蘇君舜元已自見重於時故有晏元獻杜正獻文忠烈蔡忠惠富蘇二文忠諸公題詠雖公子忠宣公昆仲卿相當世恒念手澤猶不能還繫家乗歴二百四十八年為元大徳辛丑廣陽李侯戡始得之燕都適拜吾蘇太守遂挈之而來下車首謁公祠訪問其子孫而與之吁侯之尊徳尚義有功先賢而畀及後人者何如哉當時若陵陽牟獻之剡原戴帥初吴興趙子昂臨川虞伯生金華黄晉卿豐城揭曼碩諸先生相繼美之以詞一以重公手蹟在天地間久而具存一以嘉侯得之四千里外適仕其鄉而歸其子孫若將有神物相之者必愈久而不可冺焉也矣嗣孫邦瑞什襲而寳藏之又後九十三年為大明洪武癸酉秋仲嗣守孫天章出示小子行謹歛祍而記其非出於偶然者乎其趾若公徳業之盛已見本傳并前後所書殆悉不容加喙云半軒集巻四
