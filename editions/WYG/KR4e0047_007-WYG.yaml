body:
  text: 半軒集巻七明王行撰說醉樵説華蓋山之樵有好飲者或目之曰醉嘗道置其薪而寐後之樵者盗其薪同樵者見之呼醉樵而語之曰而樵以飲爲事邪以薪爲事邪醉樵諤諤而復唯唯同樵者又曰而樵以飲爲事邪以薪爲事邪醉樵曰而以吾以飲爲事則以飲爲事而以吾以薪爲事則以薪爲事同樵者曰而不知盜盗而薪邪醉樵曰薪則薪焉盗則盗焉夫奚庸知也同樵者曰醉乎醉乎世未有若而之不醒者也盗而薪而弗知告之知而弗悟非蚩蚩邪醉樵乃囅爾而笑曰而何言之異邪而以吾爲醉則以所謂盗吾薪者爲醒邪而以醉為果醉而醒爲果醒邪而以醒為是而醉為非邪而以彼為得而我爲失邪而以得爲果得而失爲果失耶而以得為果得而失為果失宜以吾爲蚩蚩者也同樵者憮然有間曰而將混其醒醉而齊其失得乎而將逃扵有為而匿扵無為乎無爲則無事乎樵已乎醉樵曰噫嘻而知有爲之爲而不知無爲之爲而知而之爲樵而不知吾之爲樵吾爲而言吾之樵吾之樵也以精神為斧斤而發之於純一之硎以叚若木不足以當其銛扶桑不足試其鋩而大造則吾薪之根也元氣陰陽吾薪之幹也日月列星風雨霜露吾薪之柯條而擾擾之生物則吾薪之朽腐螙蝎也吾今剔其朽抉其螙棄遺其柯幹而得其根矣而以吾爲醉而然邪醒而然邪是為有爲邪無爲邪彼亦能盗吾之有而有之邪將弗能盗之邪同樵者無以對乃復頽然而就臥撼之而不甦呼之而不寤同樵者若忘若遺若諭若悟惝怳踟蹰負薪而去僂説婁江有僂焉畚其業農餘而織農作而售以為常歳戊戌婁民大疫東事弛畚弗得售或誡僂能殺而直將賈諸僂曰嘻詎以暫而奪吾常也織之不置畚愈積里多讓之僂唯唯明年吳大發民城杭僂用無留畚資直甚裕里賀之僂亦唯唯果何爲者邪業之不售守其常而不屈心無加憂功無加怠業之既售有其利而不驕功無加修心無加喜異哉噫士君子之所爲茍僂之若也吾知其扵道不逺矣莊生説甚哉莊生能行其道也以布衣而國君尊信之非有盛徳宜不如是竊怪其所為皆市人之道也太史公稱其亷直是豈然哉以金之故而欺其君復以金之故而賊其人市人有所不為㢘且直者爲之乎雖然生無足道也信之者可笑耳吾有以知戰國之君果若是庸庸也噫其君庸其臣則肆其民得遂其生乎至正辛丑冬讀越世家書雜説四首黄老之術儒者之徒弗言以其惑夫人之道也然曹参之興起文景之崇尚者黄老也武帝之好之公孫𢎞之用之者儒者也何武之治不逮於文景歟噫武之好儒非誠也𢎞之業儒非真也儒不純且無益况不眞乎文景則黄老之純者耳其治國優矣克儗扵唐虞矣乎唐虞之治其儒之治耶抑亦黃老之治耶雖然五榖種之美者也茍爲不熟不如稊稗黄老扵文景之世其稊稗之秋也歟居竒貨以徼利者候時而待價弗亟乎其信也是盖賈之良者焉貨之弗竒而急扵利則走市而鬻之走市而鬻之雖貴亦賤况賤者乎伊尹大公之貨竒貨也韞櫝亦久矣茍非求之者亟弗易出之也及出之則大行扵天下後世利不既博乎孔明學伊吕者也故有足稱焉王猛則嘗走桓温之市矣桓不見用直猛之貨未甚竒也然猶有不猛及者何如哉嗚呼彼操瑟立齊門而不售者迺欲誰之咎耶士之大節出與處而已矣盖出處在乎已所以出處在乎天在乎天時也在乎已其道歟衆出已獨處必有所存之志也衆處已獨出必有可行之道也衆出而隨之出衆處而隨之處則其所執下矣時處而處弗嫌人之皆處也時出而出弗忌人之皆出也忌人之皆出矯而處焉嫌人之皆處激而出焉則又詭竒而自異矣詭竒也執下也惑也仲尼曰或出或處蓋君子之道在焉觀人之節者據是而求之可以得其情矣古傳驗陳寳得其雄者王得其雌者伯咸謂此談者之夸辭也故褚遂良以對太宗飛雉之問而蘇軾氏譏之雖然軾亦不能無失也軾謂太宗時所集者雉有不足以問陳寳之符不知陳寳與雉相去能幾何也秦文之伯不及齊桓不聞齊桓得陳寳而後成也光武之治不及三代不聞三代得陳寳而後治也盖帝王之符德焉而已祝網之言湯之符也虞芮之化周之符也奚假諸羽毛鱗介之徴也哉世之論言者曰言有責也無責而言謂之訕然有責而後可言者今之制也無責而皆可言者古之道也均之治世不可以言治亂世不可以言亂亂而不言亂非言治也言治之所以也治而不言治非言亂也言亂之所以也治而言亂有所儆亂而言治有所勸既儆且勸其所習者革矣故狃扵治而弗能終治者有自大之心也安扵亂而弗能致治者有自棄之心也自大自棄皆不聞治亂之言者也自大扵治亂隨其踵矣况自大扵亂乎無責而不言世從而衰矣况有責而不言乎有責而不言上容之志見焉故知上容者所事必自大自大者所使多上容上容自大之相遭治亂可得而知矣富溪漁者説天目發源而下㵼大滙扵具區而東趨其流分派别汪停迅注隨地不同而富溪其一也水至富溪猶散行者之顧影留連而舒徐猶祀餘之敬存陶陶而遂遂故其精神所聚有豐厚之家焉吾友彦常居之彦常温雅和易㢲順謙抑産饒矣不自覺其饒資裕矣不自有其裕而下人惟恐或失焉大夫士多稱之乃以漁自命亦足以知其趣向矣今夫漁蓋志扵魚者也必修其網罟時其風烟約之以絲綸勤之以舟楫無不得魚者以盡其在已故也今彦常能志扵善而忘其饒裕無矜無驕不怠不傲接賔友以禮讓教子孫以敦實其盡已何如哉善斯得矣大夫士之稱之不亦冝乎於戲觀富溪之波瀾而知其有本者以發源之髙觀顧氏之子孫而知其有本者以先德之厚漁乎漁乎吾將見其得夫善也猶掣鯨扵東溟而不屑稽山之釣任公云乎哉任公云乎哉是爲説墨翁説吳隱人沈起宗居闤闠之中康莊之會煉墨以自食名其舍墨室號其躬墨翁人咸熟之遂遺其姓若字與名曰墨翁墨翁或謂之墨已名其室何名室已又號其躬何翁曰非爾知吾因以自警也始吾之扵人見夫欲言也含而不吐吐也留而不盡良爲病之何自苦哉及觀金人之戒至扵三緘焉則知含而不吐己幾失之出雖不盡所喪多矣夫墨黙也故因以自警也是則果終黙乎得屛而息箝而喙乎曰吾黙其所可黙不黙其所不可黙然可黙皆是不可黙惟二焉何也友也子也友也相輔以仁相勉以道茍一黙焉昧切偲之義矣子也飭之義方約之詩書茍一黙焉失訓教之道矣此其所不黙也曰嘻何黙之多而不黙之少哉論未白其以質諸予予曰未也子不可黙而有可黙也友不可黙而有可黙也忠告善道不可則止不止致辱焉非友而黙乎父子不責善責善則離離則不祥矣非子而黙乎曰如子言墨翁其愈墨耶曰身教從言教訟徒向之諄諄不致其藐藐耶且吾有所聞焉耳何聞聞諸仲尼仲尼云何君子訥扵言敏扵行鈍齋説鈍非君子所患茍不以鈍自期不鈍矣不鈍非君子所貴或以不鈍自許斯鈍矣鈍之與否受之於天非力之所為者以質言也鈍之與否雖得扵天亦人之所為者以學言也以質言者君子聽之以學言者君子勉之聽之者以言乎不鈍而不以言乎鈍不以言乎鈍雖聽之而不忘其勉之之道焉勉之者以言乎鈍而兼以言乎不鈍兼以言乎不鈍雖勉之而亦成其聽之之功焉則勉之也聽之也既各適其用而又相為用也不鈍而不能聽之是以不鈍自許也鈍而不能勉之是以鈍自棄也是皆下愚之類也茍力以反是焉則非聖賢之徒歟不鈍能聽之而不忽乎鈍者之自治吾扵顔也見之鈍而能勉之而不忘乎不鈍者之所至吾扵曽也見之是曽也非以鈍自棄顔也非以不鈍自許也不自許不自棄以至其極焉非賢聖其孰能也哉燕山王宗魯甫自號鈍齋徴予爲之說予觀宗魯之質非鈍者也而以鈍自名是不鈍而恒懼其鈍也恒懼其鈍肯以不鈍自許乎必能加勉之之功矣其進曷可量哉宗魯也其有志扵學者歟君子有曰賢希聖士希賢又曰顔何人耶希之則是吾扵宗魯有望矣臞齋説沈思敬氏居吳之練祁清修自守以體之弗腴也題其齋之顔曰臞間以徴予攄其説予嘗造其居焉客有指其顔者曰夫盛麗紛華人之所慕也而弗居舂容豐澤人之所悦也而弗取顧以是名豈將歛容下志儉約以自處乎老當益壯何古訓之不式也或曰非也吾聞之退者進之基損者益之始欲取而必與知白而守黒弱可以屈夫强柔可以勝夫剛是皆抑之所以揚之者也庸詎知其非臞以致夫腴乎予曰嘻是固然歟曷亦觀夫四運哉時之春也萬物敷暢而條逹氣融而色暢天地之間充滿洋溢可謂腴矣然物之生非物之成也洎夫秋也萬物凋落而揫斂氣凝而質堅天地之間沉寥蕭條可謂臞矣然物之生者至是而始成焉君子之爲學亦然幼而童童而冠冠而壯腴之時也然必四十乃不惑五十乃知天命人至五十猶時之秋也而學既成矣材之成乃以致夫用學之成乃以及夫物則腴也臞也果孰愈哉思敬也當富盛之年蓋嘗從事扵功名利禄之間矣今乃閒居静處潛徳而弗耀以教其子孫而善其鄉里則其及物者果腴之時耶臞之時耶以是名齋果非也耶果是也耶客無以爲對思敬曰願書以爲説朝宗字說學者必造聖賢之域猶水之必歸扵海也水而不歸扵海洿焉者也蓄而不遂者也學而不求造聖賢之域畫焉者也惰而不自勵者也水之洿焉水之所值然也非水之罪也學之畫焉學而自棄也非學者之罪耶盖惟無學耳茍學焉固不可以自畫也江生名漠而字曰朝宗取書江漢朝宗之義朝宗諸侯見天子之名以江漢之必歸扵海猶諸侯之必朝扵王故云夫江漢大水也登諸岷與嶓以至扵海其道里之逺逆折之艱亦甚矣雖逺且艱不歸扵海不已也今人之爲學求諸其身甚近也聖賢之域亦不外乎其身也無道里之逺逆折之艱也何爲而不自勵耶雖然無其志則無其功茍有志焉何所不至也江生既以是名又以是字其必有志扵學已有志扵學寜不底其成耶江生也茍能勉焉以無負其字之之義則余之説也盖可徴也已孟敷字説事爲之善者莫甚扵務其内而不務其外事為之不善者莫甚扵知有内而不知有外善其務内而不務外者非欲使之遺其外也先其本而後其末也不善其知内而不知外者非欲使之事其外也有其體而必致其用也今夫泉出于源混混焉不舍晝夜盈科而進放乎四海由本盛而末無不盛也其澤物之功爲何如哉茍雖有其源而不能渫治清潔下而不上爲時所舍則體雖存而用則亡矣尚何望其及物之功也哉盖事其内而不遺其外是培本以逹其末明體以適扵用也則其善也斯足謂之善矣潁川陳生名謙呉其家也其祖若父皆以温恭遜順之道自處故以謙命之生以予交其父祖間也來以字為請爲字之曰孟敷夫謙者卑下之道敷者施布之義也以卑下之名而傳之施布之字其亦有其説乎予嘗究夫謙矣盖謙有存乎已者焉有敷扵人者焉存乎已者内之謙不自滿足之心也敷扵人者外之謙温恭遜順之道也能存其不自滿足之心斯能敷其温恭遜順之道茍温恭遜順之道有不敷則不自滿足之心將不存矣此敷所以發其在内之謙使之施布扵外也故謙之六四曰無不利撝謙夫能發撝敷布其謙承上接下之道得矣又安往而不利之也哉雖然又有説焉人之爲學未易量其進止者以其有不自滿足之心也學而有不自滿足之心則所見愈明所處愈髙而所行愈逺所謂培本以逹末明體以適用者無所偏而温恭遜順之道自有不得不敷者矣孟敷識之當益勵其不自滿足之心以無忘父祖所以命名之義必有徴矣字李氏子説萬物本乎天人本乎祖木必有本而後枝葉生焉盖枝葉非本不生本非枝葉不芘枝葉而能芘其本斯盛矣子孫而能光其祖斯孝矣孝乎孝乎亦報本之道焉耳李氏子名嗣祖求字扵予予字之曰彦本彦本也能毋忘乎孝斯不孤予字之之義矣字蔣氏子説人有疑則思問能問則理可通而惑解然仲尼曰舉一隅不以三隅反則不復也其亦有不獲問者乎非然也不復不告扵不再問者耳再問是能證三隅矣烏可不白之耶有弗問問之弗知弗措也在勉之而已矣蔣氏子名思問求予字字曰公勉公勉也能致三隅之思斯不孤予字之之義矣字瞿氏子説前人之望其後之人無不欲其久逺而蕃昌也後人能纘承前人之業則由是而逺而不負前人之望矣纘承之道何如亦學而已勤扵學足以榮其先怠扵學足以忝厥祖學其可不務耶瞿氏子名纘求予字之字曰思承而告以纘承之道思承勉旃母或怠荒允纘前修俾逺而昌金容之字説處物之道莫大扵能容欲有容莫過扵自治能自治其所容也益大矣夫所謂容非姑息容忍之謂盖包含容養之謂也必欲自治者欲己之明也已茍不明則物之至吾前而眩瞀惑亂不能别其是非邪正而欲有容焉必致扵姑息而容忍矣已既明則善者吾知保而飬之使得自安不善者吾知涵而養之使之自化使之自化則不善皆歸扵善矣有容之大孰過扵此哉然所謂明非在乎一事一物之間而自治又非一朝一夕之功也亦嘗觀扵水乎夫水之在物盖至明而至難定者也惟其難定故雖明而恒汨扵泥而濁之不能致夫明之用要在乎力加澂之之功而已能加澂之之功則水既明而能容萬象之見矣惟心也亦然心之扵人盖至明而至易放者也惟其易放故雖明而恒蔽扵欲而昬之不能致夫明之用有甚扵水之汨撓也心之撓有甚扵水則澂心之功當不益加扵澂水之功乎能益加其功則心既明而能容萬理之著矣萬理既著則是非邪正之至者吾得以區而别之以各盡夫處之之方其所容者大而能盡其心之量是知澂心乃自治之本而能容乃澂心之驗也故非澂心無以爲有容之地非有容無以見澂心之功然有能澂心而不能有容者矣未有不能澂心而能有容者也不能澂其心而欲容夫物則所謂姑息容忍者矣其扵自治不亦倍乎茍能澂心而不能容物則又不足以盡夫心之量豈所謂能盡夫自治之道者哉是則能容也又所以盡自治之道也歟句呉金公信氏有子曰澂從予逰丐為之字予以其方嚮學也字曰容之而告以自治之道焉容乎勉之其能以包含容養爲之法姑息容忍爲之戒吾將慶其有成矣沈文矩字説呉興沈伯凝氏嚴扵教子家庭之間雍睦可觀仲子程既冠矣方其冠也請字扵賔曰文矩時固有三加之辭已今命之從予逰也復求予講夫矩之義以教之於戲予嘗思之矣弟子之扵師也其猶獵之扵原漁之扵澤各隨其力可以遂其得焉師之扵弟子也則猶礛錯之扵璞玉斤斵之扵杞梓機杼之扵蠶絲麻枲各因其材而必底其成焉今程也有可教之資伯凝有必成之望則予也烏可不勉之以底其成哉乃謂之曰亦嘗知夫規矩之謂乎規矩所以為方圓之器也今欲爲方而必求之矩是欲食而必食欲飲而必漿也其可以他求乎哉茍能知矩之為方已而不能以功自程是知食之治飢而不勤扵耕漿之治渴而不勤扵鑿弗能遂所求矣然有能不憚扵勤而自力者而不知漿之在鑿食之在耕則亦自程其功而不知矩之所以爲方者㝠行觸途進退何據哉惟學也亦然學所以爲君子也窮理盡性爲君子之道也爲君子而必事乎窮理盡性斯為方而事乎矩者也知窮理盡性為君子之學而不能致日新之功斯知用矩而不力扵自程者也知自力扵君子而不知窮理盡性之學斯能自程而不知用矩者也噫能自程而不知用矩不至扵方而已知自力扵君子而不知窮理盡性之學則疑仁而陷扵墨翟疑義而陷扵楊朱其害詎可言哉此所以知矩而必力扵程能程而必求夫矩也雖然矩之與程其亦有先後乎吾聞之矣先明諸心知所往然後力行以求至焉爲學之序也今名之者蓋教以力行字之者實誨之知往予之説則又勉之並進其功也嗚呼程乎其敬若翁之望毋忘而師之勉哉李氏子字士期説橫山金公信氏通敏有襟度恒自振奮不欲後扵人有子曰澂從予逰漸通義理既求字之而為之説矣有壻曰頤姓李氏又求爲之字而勉之夫欲成其子固人之情也復欲成其壻焉則所謂恒自振奮不欲後扵人豈不信哉乃進頤而謂之曰古之記禮者百年曰期頥釋之者曰頥養也人至百年無所不受其養也所以謂之期者人夀以百年為期也今宜志曰士期期乎聽之予則又有説焉今夫人之生子也必期之曰是必享百年之夀也以百年期其子者是愛其子也及長而學也要必期之曰是必為君子也以君子期其子則愛其子豈不愈扵期之以夀乎人之始有知也必自期曰我其享百年之壽乎以百年自期者是愛其身也及就學也要必曰我其為君子乎以君子自期則愛其身豈不愈扵自期以夀乎期以夀則扵身也有限期為君子則垂名扵無窮且期以夀則既有限而又或不可必期爲君子則既無窮而又可必也自期者不扵其可必而扵其不可必豈所謂善自期者哉然期以夀蓋夫人而然期以君子則非知學者不能也古人有言立志以明道希文自期待又曰伊尹顔淵大賢也學之雖未至亦可爲賢人是非能期為君子者乎可以為法矣期乎勉哉茍勿徒期之以有限而必期之以無窮斯所謂善自期矣斯不孤夫字之者之説矣斯能體夫求爲之字者之心矣是爲説沈文權字説姑蘇沈氏以雄貲鉅族聞海内有子名㢲字文權簡厚寡黙迺父伯凝謹扵教子命之從余㳺間爲之請其字之説余不得而辭也觀其字之之義蓋取繫辭傳所謂㢲以行權者焉於戲聖人之陳九卦所以明夫反身修徳以處變之道而終之以㢲以行權權豈易言者耶雖然余則有説焉君子之處事莫切扵㢲也能㢲順扵理處事之道斯得矣欲㢲扵理將何所先其惟學乎夫學以究其理而㢲順以行之無不可為之事矣故曰㢲德之制也今㢲也廕庥乎重慶之下方當其富有之年致其問學者有餘功資其問學者有餘力齋居清肅忩户閒靚明師良友之是親巻帙簡編之是習則其學之成也不有望乎雖然行逺自邇登髙自卑不可以躐等進也故九卦之陳必有其序焉基所以立柄所以持心不外而善端存守不變而恒且久懲忿窒慾以修身遷善改過以長善自騐其力不變其所然後能㢲順扵理以制事變其至扵權極矣權豈易言者耶雖然㢲也年富日益强學當日益進優柔㢲入以至仁熟義精扵事優游有餘裕此行權之義在體之何如耳用爲之説陳㢲民字說吳有良扵毉人之術者姓陳氏字仲原年登八袠矣而和厚恭慎其所業書在九家者流雖自有其説然其間有不能不涉吾書者仲原必尋其逹道循階陟戺以求其所以然故其比他業是業者有通博之聲焉仲原之子希武恂恂殊敬飭見士君子未嘗有惰容士君子見之亦未嘗不歎其家庭之有素也希武之子曰謙既冠矣所筮之賔爲字之曰㢲民三加有辭成人之道備著而其所以字之義則來請其説焉於戲謙名而字巽誠有其説是取扵釋夫地中有山之卦者之義也地中有山其卦名謙釋之者曰謙巽也以巽釋謙何也巽之爲義順夫理也謙之爲義有而不有也盖有而有之屬乎私有而不有屬乎公公理也有而不有能順夫理矣此巽所以釋謙也然嘗觀扵事矣有成而後毁也有盈而後虧也有盛而後衰也有得而後失也有而不有斯能有矣故謙之彖曰君子有終焉譬諸學也有若無實若虛則可造聖賢之域亡而為有虛而為盈約而爲泰則難乎有恒足以見之矣今巽民得天與之美資承父祖之嚴訓名以命之字以申之既深切而著明矣巽民也宜益諟夫名之字之之義以母忘父祖之攸訓哉花用端字説東邱花用端名本自南粤㳺東呉介余友瀏陽湯時中來見且致其所以見之意焉觀其人氣貌沈渾動容周旋安舒而慎飾詢其年踰冠耳而志尚殊正樂從士君子㳺處一聞講說經義論古今事理輒歆歆喜見扵面因歎曰貴㳺而青年有若是賢耶固可以見其質之美矣間而來告曰某之名若字既承君子之嘉惠而其所以字之義則有未之悉者茍得聞其義以佩服之斯至幸也敢請余然後知用端之質誠美矣能不為攄其説乎盖凡物皆有本也而本之爲義實始扵木焉夫本者木之所由以生者也故本之固者其木脩本之端者其木直既脩且直則材之成也足任工師之用矣顧脩之與直乃有不得而兼者焉然能脩而不直工師不顧能直雖不脩亦弗之棄矣噫其直也非由扵本之端其可得耶今字用端者因名以取義將不在兹乎且夫用端之資扵家者有温厚之地賦扵天者得懿美之質其本端而且固矣又何慮夫脩之與直不得而兼也哉雖然本固矣無使夫佚欲以撼之本端矣益加夫學問以培之始扵其賦扵天與資扵家者無負焉盖固而無撼則本日深而愈固端而益培則本日盛而愈端愈固而愈端則吾將見用端也良材之成與丸丸之木同致夫棟隆之吉矣是爲說半軒集巻七
