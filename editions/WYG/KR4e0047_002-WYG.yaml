body:
  text: 半軒集巻二明王行撰銘論策題書文引雜著古節堂銘有序父母之情之至者莫甚於欲其子孫之蕃且逺也措一慮焉必計之曰無傷於徳以致吾子孫之累乎處一事焉必計之曰無倍於理以貽吾子孫之憂乎何也葢父母者子孫之所自出而子孫又父母之所以托之者也太史公曰為十年之計者種之以木為百年之計者種之以徳言似隘矣種以木豈特為畢身之謀種以徳又烏止百年之計哉君子之澤之止於五世者特以言其繼之者不及原闕耳使繼之者得其人其澤又僅五世而已乎然種徳固足以致其後之蕃且逺而後之人又烏能知前人種徳之意哉茍不知其意而怠於自修則反以忝於先而負其托矣此古人所以有種木以寓其種徳之意者也范魏公嘗手植二松於庭後之子孫仰之曰是遺我以貞堅後凋之訓也於是有歲寒之堂焉更三百年猶不朽也五世云乎哉則其種木以寓其種徳之意者為何如其能副前人付托之意者又何如耶古人則既然矣而學夫古者今復見焉袁君仲和其人也仲和居吴之練圻市植五檜於堂之前挺然羣立葢以得夫范氏種松之㫖也仲和歿子四人曰原理曰某咸好學自勵懼或怠其成業朝夕徘徊於五檜之側曰噫吾先人之手澤也其操有如此乎遂以古節題其堂焉其有合夫歲寒之意哉於戯前人既師於古矣後人又師於古焉則袁氏子孫之蕃逺也兹非其始也夫兹非其始也夫金侯徳儒既為堂之記而某又徴予言因為之銘銘曰惟古人兮慮孔周培厥徳兮貽孫謀儼手澤兮堂下紛雨露兮相樛維桑梓兮恭敬止矧遺訓兮繫在爾式榖兮似之以燕翼兮堂之基基有堂兮堂有題仰則瞻兮俯以思閲歲年兮無圯凛氷霜兮弗移於戯噫嘻朝斯夕斯子子孫孫勿替引之庭翠軒銘有序生意在天地間未嘗息而隱顯則各有時焉方其隠也為顯之本及其顯也實隠之發窮隂凝寒天地閉塞生意若息也春陽一舒萬彚敷暢生意則藹然矣觀生意者當觀於閉塞之時而閉塞之理又可於敷暢而得之周元公不去庭前草要存生意葢方究夫隂陽動靜之際欲人即顯以識其隱也崑山周性初世業醫藥人多奇效疾咸歸之聲稱甚著予友豐浜余君士平以人徒美其聲之著而未知其學之功且性初之氏元公同也因用晦菴贊公之語題其軒曰庭翠葢喻人即其聲而識其學也君既為之記性初又徴予文遂銘之曰究觀生意隱顯一源夫亦何心大化自然然是言也以言夫天欲求生意敬集吾義勿正勿助曰養厥氣而謂然者學之所至所至既爾我氣充而人或未至庶其教之譬之於醫己躬靡虧爰克診人孰病攸為在天吾聽在己吾謹謹我之修實天之順若醫之良自治是師欲以巳治治人不治顯乎隱乎罔非生意有扁在軒庭草交翠豫軒銘有序句吴金公信氏其名曰莊交于予三年矣予毎嘉其字之有意於自警也夫莊整齊嚴肅之謂也整齊嚴肅而信焉則非所謂色莊者矣以是為字非有意於自警然乎且公信之為人守慎畏禮毎㑹飲而歸必詢其從者曰向得無失禮於座人乎對曰無之乃始安息推是而往為善孰禦哉相與以來葢亦日異而月不同矣予則欲因其源而利導之使以沛然也故題其燕休之所曰豫軒豫素定之義也素存乎敬則臨事而莊有不待言信固在其中矣噫其亦公信之志也與復為之銘曰莊以持已敬為之基内外有殊信見乎施繄字與名互發其意扁豫於軒益表斯義厥惟自強有志竟成猗與韙與視我斯銘耕讀齋銘力服於田望乎有秋勤事於書繄道是求有書有田既耕以讀越若亂離世資自足君子謀道飢或忘之曷微學矣奚徒飽為足易致荒安則生怠弗怠弗荒道焉斯在昭昭我銘在數十言咨爾學者齋居視旃嘉樹軒銘崇軒翼翼婁東潯嘉樹繁蔚成髙林前人培植根柢深欲使後裔庥其隂祝融典時熾爍金清風汎涼濯裾襟式坐以卧歌復吟陳觴展冊舉可任繄此大惠遺子衿後裔要識前人心我為斯銘比規箴子孫永保其毋侵沈學菴自志銘并序學菴予友也為人謙慎自將與物無忤勤於問學手未嘗釋巻尤思益人纂修外科新錄本草發揮精華十二經藥治療遡源廣切韻圖檢例増補廣韻七音字母及墨法集要調膳錄等為書凡如干種或行世或傳家無不精實詳備人多資之洎晚年為慮滋逺故自誌其全歸之處余既讀而復嘉之用系以銘銘曰有生者不諱死非以理之固然與亦修諸己以聽諸天耳雖云遲暮寧不足以樂餘年耶順以安之歸全而已此學菴所以自為之誌而余為銘焉者也迨夫手足啟而歛為某月某日幽室閟其扄為某月某日則距其銘之時歲復幾遷矣於乎斯銘也誠君子之終事而為永久之傳也哉貞節堂銘貞節之堂曰疇居母賢子孝婁東隅温陵故鄉僑乃吴母也氏莊陳繄夫夫湛鉅淵子幼孤自稱未亡禮攸模厥志一定竟不殊風操凛凛氷霜如子孩以童詩復書撫循勉飭教養俱逮冠而壯立室家生産弗怠貲庸腴締好勿向常流趋來則罔非君子徒户階屨盈賔席敷室中經史書與圗琴瑟几頴尊罍觚坐談聖賢義理攄執禮毎下心恒虛士林翺翔致令譽惟學之嗜他無湏升堂喜夀懼運徂清温定省循朝晡㫖甘毳滑靡所無母也樂只子色愉至斯謂非有成歟微母志堅能爾且孰題兹扁匪誇諛為記厥事今鴻儒玉堂餘暇筆屢濡辭宏義正為發舒迺知世道自隆汚民彛天理終弗渝嗚呼於記其徴諸三代異尚論聖人之有所作為也不求以同於人亦不求以異於人適其宜而已矣其治天下也不出奇以自髙不立名以自别順於時而已矣譬之人焉冬焉而必裘夏焉而必葛渴焉而必飲飢焉而必食人之常也茍或寒而人皆裘而我獨葛焉暑而人皆葛而我獨裘焉渴而人皆飲而我獨食焉飢而人皆食而我獨飲焉是則所謂出奇以自髙立名以自别不欲以同於人而求以異於人矣豈聖人之用心也哉漢之論三代者曰夏尚忠商尚質周尚文嗚呼胡為而為是説也尚者有意専務於此而不屑於彼之謂也謂之有意専務於此而不屑於彼者豈足與言聖人之全體大用也哉忠也質也文也三代固有不同也而為尚之云者是不知三代之所以忠所以質所以文者矣胡為而妄為之説耶今夫木之生也始而甲焉坼焉而幹焉然後枝葉花實從之也葢方其甲坼也己具夫枝葉花實於中矣則枝葉花實者所以發夫甲坼而幹者也謂甲坼也枝葉花實也為二物哉昔者包羲氏教民火食也而未及於粒食焉雖未及於粒食而粒食之理已具於中矣神農氏教民耒耜以粒食豈固欲異於伏羲也葢亦因時制宜觸類而長以發伏羲之所未發而已軒轅氏作車以載于陸而未及乎舟也未及于舟而舟之理己具于中矣夏后氏作舟楫而行于川葢以發軒轅之所未發者耳苟謂包羲軒轅専務于炮炙輪輿而不屑于耕稼舟楫謂神農夏后専務於耕稼舟楫而不屑於炮炙輪輿者皆以衆人之心窺聖人者也故尚忠尚質尚文云者皆後世之人妄為之説而非當時之言也何也夏后氏之興也天下猶未平洪水横流泛濫於中國民不得而寧榖不得而熟禹乃掘地導水而注之海驅蛇龍而放之菹由是天下之民僅免為魚鱉而為之君者方且静以息之惠以養之烏可輕有所變更作為以煩動之哉當是時也雖欲不以渾朴治之不可得也然史之贊禹亦曰文命敷於四海謂夏果遺於文乎商之起也以七十里之小東征西怨南征北怨卒放桀于南巢以拯生民于塗炭天下之人去桀之暴歸湯之仁孜孜焉洗心拭目以仰望其徳化於是乃告萬方作明君改正朔易服色當是時也雖欲不漸為形質制度以治之烏可得哉然觀其張網之祝恒性之誥謂非商之忠可乎周之文也始於太王至於文王三分天下已有其二矣武王奉文考之命以伐紂救民周公承文武之徳以輔君攝政于是申井田之制厲六官之式修禮樂敦揖讓齊法度養之教之文物典章煥然大備而夫子以郁郁稱之當是時也天下之民歸周已久矣天下之安定也非一日矣而又三聖人之相繼監三代之損益雖欲不文其可得乎然夫子之稱之也非美其徒文而美其文質之得宜也謂周其無質乎由是而觀三代之治雖不同稱有不能不同者矣則其所以異者葢不得不為之異非固欲為之異也雖然則又有説焉凡天下之物有形者必有壊天下之事有跡者必有弊堯舜禹之相傳為天下計也非有一毫容心于其間也而其弊也亂臣賊子以之而藉口則忠也質也文也焉得而無弊哉葢忠之弊也鄙野而無禮故流於愚則繼之者不得不以質救之質之弊也使氣而剛勁故至於叛則繼之者不得不以文救之而文之弊𤨏屑而委靡致以不振能乎繼之者非禹湯文武周公不能也使繼之而有禹湯文武周公亦必有以繼之矣嗚呼三代之治之所以不同者為天下計非有所容心于其間也無所容心于其間其弊猶若是使有所容心于其間則吾知夏不得而為夏商不得而為商周不得而為周矣宋太祖論為人君者用人以為臣此用臣之權在君理之順者也為人臣者立人以為君則立君之權在臣理之逆者也理之順者百世行之而無異理之逆者茍非叛亂不得已者不敢行焉然而有立君之權而君有不忘之者何也葢其君以為彼之權既足以立我則亦足以廢我故即位之初未得國柄常惴惴焉卑詞下禮髙爵重祿以悦之而是臣之重權益重居位浸久已得國柄而忌其偪己則孜孜焉深求其過為之詞以去其立君之權摧挫屈抑以消其偪已之勢甚有欲迸其生而殘之者豈是君固有忍于是臣也哉特以其權既如是不思有以釋之則其勢愈偪而已將受其制則有不可測者藏于其中此謂利害切身而不得不為之所者也漢文之即位也禮絳侯甚恭而帝目送之其目送之無他忌之之心形于外也故其為相未幾而遽允其求罷之請再相未幾而遽遣之就國一聞疑似之言立下之獄而略無纎毫顧藉幸而絳侯敦厚木強不足以致人之深忌故得保其要領不然雖有太后之言吾知其不能免矣漢宣之繼大統也霍光毎朝必歛容禮下之驂乗之時若負芒刺無他畏之也畏之則忌之加甚矣幸而霍光小心謹慎足以緩其君之見忌之心故能僅以身免然至於子孫則遂殘滅之矣夫孝文仁主也孝宣賢君也豈好于寘此二臣也哉亦迫於勢之然耳矧文宣之立也以同姓至親有當立之理周霍之立之也為社稷計無貪功之心而君臣之間猶且如是則夫叛亂之臣背所當事之君扶立異姓攘其君之位而與之以覬非望者其能無間然耶且其所立之君自知非己當得而得之必内多計慮内多計慮則所謂忌其勢之偪己而思有以釋其權者滋又甚矣若太祖是也太祖之得天下也非有同姓之親當立之理與夫朝廷之大臣皆委心而歸向者也特王審琦等數人仗其兵威逐其君而納之耳則審琦等之功之大何以加哉而數人者又皆桀鷔貪狠而非敦厚小心者也夫功大者望報必深而貪很者其欲難厭彼髙擁立君之權以責無涯之報則為其所立者又將何以待之又安能不生忌之之心而思有以釋其權也哉此太祖所以不能髙枕而安卧也然而太祖豁達大度不欲用其權術而乃發其至誠披其肝膽諭之以安危曉之以禍福而數人者亦皆豁然開悟慨然自解其權君臣交歡共享其樂後之人人皆知太祖為得處之之道非文宣之所及而不知其亦有以也葢太祖之英雄神武素有以伏此數人而數人亦自知己之材智非太祖之敵是以帖然聽其頥指故能君臣之間兩全其義不然雖有善處者吾知其必不足於相殘矣或曰太祖之諭數人以田宅貨財兹説類夫語販夫賈豎之言非所以待豪傑奇偉之士也而數人之聽之亦太祖之幸焉耳嗚乎彼數人者誠何異於販夫賈豎其志實不出貨財田宅之間而已尚何豪傑奇偉之可疑乎若夫豪傑奇偉之士則固盡忠於君以保其國而忍為兹叛亂以為富貴之資也哉太祖論下處天下至尊之位者當存天下至公之心存至公之心則君子小人之至於前者莫能遁其情而匿其迹君子小人既辨則天下無不可為之事是以明君賢主所以生則致雍熈之治死則遺子孫以安者也漢髙帝之訃身後也曰蕭相國死曹參代之曹參死王陵代之陵少戅陳平多智可以助陵而平不可以獨任周勃厚重少文然安劉氏必勃也後皆如其言無不驗葢髙帝于時以至公之心觀此數人數人之情莫得而隱故能逆料事幾既明且哲如此也唐太宗謂朝之羣臣可託幼孤無如李勣故使髙宗以僕射任之與其盡忠輔治然武氏為后盡殺唐宗室幾滅唐祚皆勣之為之也夫勣􅁸於羣盜雖有將材而非臨大節不可奪者以太宗之賢亦難知之也惟勣累立戰功方加寵遇以私愛蔽其至公之心是以昧於顧託以取害於當時貽譏於後世也惟太祖也亦然太祖之信任趙普謂普吾社稷臣也所謂社稷之臣者為國忘身侃然君子不以事君為容悦以安社稷為悦者也而普則庇姦營私徇情背義至使其君授受不明曖昧以死陵土未乾嗣子見殺社稷之臣固若是耶夫普之偏刻貪忌無君子之節太祖非不知也特以其輔翼有功溺於私愛是以累知人之明遺子孫之患不能無愧於漢髙也嗚乎彼之存至公則利隨此之溺於私則害至公私之間利害如是人君世主可不慎哉余又歎夫太祖以聰明英武之姿開造基業而其所為乃有類唐之代宗者亦可怪也夫君之於臣所謂辨其君子小人者最為急也其臣誠君子也與之可無間矣誠小人也固非所當用然不幸其有功於國無可去之理則不可不思所以待之之道焉葢小人之有功必恃恃則驕驕則恣既驕且恣尠有不為亂者所謂待之之道亦有以制其驕恣之心使之無至於亂而已矣昔漢孫程等援立順帝可謂大有功矣然程等皆奄官小人特利以自恃順帝知此是以就其爭功即加震怒削官徙封遣之就國恝無矜念其恝無矜念者豈其少恩哉亦所以制其驕恣之心也夫順帝漢中才之主惟能一時不溺於私而其所為便同英武自今觀之猶偉然可嘉也代宗乃不然元載粗鄙小人初無勲徳自以去魚朝恩有功驕矜自恣代宗知其然不思有以制其驕恣之心更俯從其非理之請至載罪惡著盈勢不容已又不能明討而誅之乃藏踈逺小臣於其省之中立黨人排以謀去載類夫小人之相排陷者豈帝王明白正大之所為哉此所以為代宗之庸愚也太祖之有天下也趙普固嘗立功矣然普以小人之量恃其舊勲多為縱横則不可不制也當其奪人田宅䑓臣言之太祖非權不能制其驕恣之心反辱䑓臣以張其氣及其畧無顧憚心不能堪下制罷之可也迺夜召竇儀誘之計普隂非儀不肯然後籌於盧多遜遜因得行其久蓄之姦計于是而為之謀以黜普矣普之罷未至類於元載也而太祖去普之迹甚類于代宗之去載且以代宗之庸愚固無足怪太祖聰明英武而亦為是之為何也葢太祖之初得位方徳普功縱其所為一切不問此太祖以私愛蔽其至公於待普之始故不暇為君臣之間杜漸防㣲久逺之慮也及徳普之心漸衰追思前日縱普之所為無非可悔恨者普又不知自戢且復恣横是以蓄憤積怒思以深刻治之遂入姦臣之計此太祖以私恩蔽其至公于待普之終故不暇審黜罸之重輕顧帝王之大體也然則太祖之於普始終愛惡一任其私是故逼於庸愚而不復自知矣嗚乎順帝惟一時不溺於私雖云中才所為便同於英武太祖惟不能存其至公雖以聰明英武所為無異於庸愚公私之差得失如是人君世主可不慎哉可不慎哉郡庠公試策題問左史紀言右史紀事古史之體也然紀言者紀其言辭號令紀事者紀其動止事為則為職也豈常人所能任哉必也明足以窮萬物之理才足以適天下之用知足以通難知之意文足以發難顯之情然後能著善惡之迹明得失之故使後之人得以信之耳不然則善者不幸而不章惡者或幸而得隠不足以為史矣史職之難有如是乎粤自左右史廢後之紀述者以言與事合而為一左右史之體始混左傳傳春秋者名非史也其體則右史混於左史焉國語紀列國之語名非史也其體則左史混於右史焉左氏以下其體雖混而未至於大亂也及司馬遷為史記創為帝紀世家列傳書表志而左右史之體始大亂然自遷而後代之為史者皆宗之豈遷之史乃賢於古之史乎豈遷果能任為史之職如向之云云者乎不然何其累世而不知改也蘇轍作古史以謫遷之非是已然有古之名而未能復古之體何也荀悦漢紀以紀名而多論司馬光為通鑑編年祖左傳而論事似荀悦其亦不足於遷乎古人有言欲求右史之體考之書欲求左史之體考之春秋朱子之通鑑綱目學春秋者也其果左右史之體乎為史之體合古今而折𠂻之其果宜于分而二乎宜于合而一乎諸君日於經學之餘從事于史必能深著其説請攄所藴誠相與講焉與王常宗書行頓首常宗有道足下别兹屢日殊積懐思才有所羈使弗得朝夕相見亦可歎也比體中何如寒燠不齊正宜寛廣自釋以加調䕶毋徒欝欝為也士大夫生逢亂離已為不幸困處圍城之中是重不幸也况足下倉卒非意誤觸於兹非不幸之尤者乎以僕之家居安處仰可以承父母之顔色俯可以接妻子之笑言猶或恍然動思則惕懼悚驚如狂如失迺知足下離膝下之歡絶室家之愛㷀㷀孤影客館蕭然不能不戚怨憂悲而忘鄉井之念也雖然此人情之所同而於道則有異焉道非固以矯情而逆性亦顧其重焉者耳今夫為人之子則當保父母之遺體以紹祖宗之緒其事則常其責至重足下素所講而知之況足下之所負又不止於如是也太夫人在堂無他兄弟奉養承先府君付託之重而志有所未伸士君子之所為須循合禮度則足下之責不其尤重已乎既重其責其身烏可不自重也古人論調養之道云心閒則外患不入然則心不閒外患且入矧憂戚耶醫家謂憂甚則傷心心身之主也主既傷百骸四體其得泰然乎茍不能寛廣自釋有若萬分之一食飲不甘起止不適吾恐其憂將有甚於膝下之遺鄉井之逺也徒為無益之戚貽患於躬常人猶不可況所負尤重于常人者哉且以先府君積徳後必大今足下之才之學足以徴之雖母子暫隔既不忘孝養之忱則天與善人必自有處烏可不自愛以靜竢之乎若云困厄浸久不得不憂則一城之中詎獨足下事己無奈何當一委諸命焉足下講道素明必計之尤熟又何説之待僕僕之説是謂薦巧于工埀獻聰于師曠多見其不知量然其忠則或可采也足下無亦取其忠而埀聽乎洗硯堂記一二日繕寫奉上餘非面莫究謝雨文噫吴之農亦曰勞思山而耕岨音苴山戴石也而墾脂濡膏瀝僅免于飢葢十日不雨則無穫矧欝隂久閟而驕陽扇威使稌之方者弗得興黍之褎者弗得滋所以冲冲怲怲于神而有祈信感焉而遂通兹答我而不遺甫潔圭之是進已隂雲而四垂倐雷而轟忽電而馳風蕩漂而横厲澍渙汗以旁施惟涸載盈惟磽斯肥茁秀于槁發榮於萎繄無霑而不沛實有年之可期既豐于公亦覃其私巵有㫖釀饁有新炊以饇厥衆以餉其師寧力之致皆神之釐可悃愊之弗伸而報謝之不時爰濯罍於行潦仍擷藻於清漪庸三奠以見誠式九頓而陳詞瞻靈焱於寳轡庶明神之在兹畫前詩引聞之鏡中覩影得數十里於咫尺之間畫裏㸔山見千萬重於縑素之末非盈非縮何慮何思大而小之歛萬於一以小觀大一本萬枝曰解於斯心目無礙春雲島嶼飄飄藻麗之章秋水江天蕩蕩空明之景緑隂清晝白雪晴朝席上煙霞尊前林壑撫編如寂開巻粲然時則有若逸韻騷人醉鄉詩客風軒月榭雨夕燈宵各持所長墨芳牋瑩喚中山之毛頴召𢎞農之陶泓同㑹文塲相與從事交云得雋在適所宜古云醉花宜晝醉雪冝夜醉樓宜暑醉水宜秋引而伸之能事畢矣文規隱侯之裔英妙之年愛客好文解賞欣詠牙籖矗架縹帙盈牀按抑揚擊盞而歌皆交游刻燭之賦奇珍異品己自成百福之香匳操簡舉觴要我發四時之春色攄詞忘陋領意攸陳寄勝題引詩本有聲之畫發繅繢於清音畫乃無聲之詩粲文華於妙楮一舉兩得在乎此焉言夫畫也極山水草木禽魚動植之姿言夫詩也盡月露風雲人物性情之理春生秋實一揮灑而已成地下天髙在詠歌而咸備以運其不見不聞之思遂成其可喜可愛之觀所謂言語精英胸懐邱壑者矣文權生學唫喜畫悦性怡情或以有聲引其無聲或以堪題麗於堪寫如大如小且方且圓萃為一編名曰寄勝明忩凈几緗縹瑶籖裊芳匳雲篆之香啜素盌雪花之茗時展而玩以樂逺賓之心載賦以歌庸適燕閒之興優游弄翰談笑題辭怡情萟苑題引穠華粹色麗矣必松筠間之則麗而清幽泉古石臞矣必彩翠羃之則臞而潤譬相人之術焉嗇而無餘骨豐而無餘肉斯足以入相矣此怡情藝苑所以富潤而清修也若夫當青妙之年處紛華之域乃能好文欣藝耽賞愛吟則是碧雲池館不徒美於春芳紅樹崗巒擬必成其秋實者矣以立得楓江之秀有萊子之歡以奉㫖甘之餘不孤遊適之興佳時勝地攄抱開襟雅韻古音手談口奕十日水而五日石鴻戱海而鵠游天欲探象外之幽奇或吐胸中之豪爽非夫好者孰致斯哉是以明忩净几縹帙華籖時一展之情可怡矣雖然和而節也在乎好禮之家麗以則焉乃見詩人之賦致聲吴今以醫鳴而宏其聲者曰韓公茂氏實宋魏國忠獻王十一世孫也吴為東南一都㑹挾藝術以游揚兹郡者不少而醫其尤也然數醫指必首屈于公茂夫以都㑹之地醫復多於他藝術而數醫必先于公茂公茂之為醫可知已公茂年未至耋老也耋老者之聲多後之夫年未耋老而耋老者之聲不先於公茂公茂之為醫可知己予始疑公茂之致其聲之若是何以也洎熟之乃知其固有以而無足異也嘗見夫疾者之來求之也不視其所以求之之豐嗇也視其疾之亟否也否亟也非徒豐而且勢焉亦弗之先也茍亟也非徒嗇而且窶焉必弗之後也疾有弗治治必盡其情也藥有弗用用必底其良也此其疾之走之而聲之歸之也予謂其固有以而無足異也非耶髙陽許瀾伯予交也嬰疾之日加劇予告諸公茂公茂為趋來診之咍曰是其幾不受藥矣然可治什一不可治什九吾盡吾情為耳己而疾屢變隨變輙應之瀾伯竟得起噫公茂之急於義也素知之不因瀾伯始知之也然因瀾伯則固益知之矣瀾伯徳公茂之深而謂幣不足以將其誠言不能以究其意故徴余文以發之雖然不徴余文余得已於言哉余得己於言哉公茂也乃今而後益致其聲之宏矣作致聲報施有施必有報而報必視其所施皆天理然也嘗聞之積徳者後必大余謂不然非所以報積徳也茍大者不知大之所自則必無所施無所施其報也亦竭矣故曰非所以報積徳也然則奈何曰積徳者後必賢茍賢矣必能知所自知所自必能有所施有所施則其報無窮矣鄉先正有曰自祖宗來積徳百餘年而始發於吾可不知所自乎又嘗曰不為相必為醫葢存心於活人也非賢而有所施者乎故其子孫至於今而不替鄉友王為善以醫名門三世矣其祖徳齋翁嘗掌宛陵醫政一時名人鉅卿皆所尊禮而寒門賤家有所請求應之如恐後㝠㝠之積固有在哉已而彦禮父繼以其道鳴浙河之西聞望益盛余嘗獲親之平和慈愛無滯於中視人呻吟如已疾痛其為隂徳槩可知矣彦禮父歿為善事兄立方如事父師立方教為善如教弟子兄弟之間有怡怡之和悦有翼翼之嚴敬故其學業日益精活人日益多聲望日益著且重而為善猶以為未足彌加淬厲嘗兄金華朱丹溪先生著醫家書數十巻行世而傳後誠有以發前人未發之藴使欝者達閉者開而疑者釋葢大有功於醫矣且立言必本於人倫明乎物理知其由儒而入也曰儒其不可以學乎茍有得於儒吾醫其益暢矣於是復取經史衆説而兼讀之玩味討論懇懇無倦余每與之談觀其言之所向志之所趋將不至丹溪不己也於戱誠不至丹溪而不己積徳生賢余言又可徴矣夫丹溪儒而有得於醫而為善醫以兼事乎儒雖先後不同所至宜無不一也且今為善之年校丹溪事醫之年又先數歲有志竟成寧不可至也哉兹喜余之言有徵又嘉為善之志可尚故書以贈之立志居可逸之地而不自逸有善治之聲而益自治此其人之志可嘉矣葢古之人恒自審其已者顧吾能盡吾之所當為否也又烏知所謂可逸之地善治之聲也哉然可逸之地善治之聲未有人不樂之者也今乃有之而不顧焉是非立志以古人自期者曷能爾耶長洲張生文源年甫弱冠動止如老成人厥甫怡雲處士愛之惟義方是教其外舅沈翁伯凝又與予交累代嘗遣之學於予予觀文源承奕世綺紈之饒無所為而不遂其意可謂居可逸之地而乃益自朂勵講習彌篤至為詩詞或設一言措一語意不自足則竟夕忘寐其不自逸為何如持身甚嚴行髙而氣和恂恂焉不宫褐之寛博人皆曰恭儉恭儉可謂有善治之聲矣而乃内外交謹凡體於身之禮一無少忤則其益自治者又何如耶夫學莫先於立志有其志則能成其功譬諸射焉志既正體既直良我弧善我矢必抵於正鵠斯可期於中不中將不已焉今文源之志以古人自期則必道益加修學益加進不至於古人不已傳曰立志以明道希文自期待孔子嘗論志不可奪文源立志宏逺而無所揺奪誠不至古人不已也可嘉哉作立志半軒集巻二
