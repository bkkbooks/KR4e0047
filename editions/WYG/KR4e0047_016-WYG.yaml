body:
  text: 刋半軒集後録半軒先生為吳中碩儒名揚勝國入我朝尤綽綽著乎遐遠也習童時嘗聆先贈承德府君談先生學之博才之豐而文之雄未嘗不聳動座人愚固䝉昧已誌之矣稍長不幸先君棄背無所質問後獲先生所著學言稿觀之益深敬信及聞杜東原老師自言從廬山陳五經五經實先生弟子嘗述聞扵五經者爲之傳具載履歴甚詳倂示半軒集乃元末諸作尤為粹美再扵舊交姜晞説所得楮園集甚夥然與前二袠亦有同者皆抄本亥豕魯魚紛乎其間乃彚而録之誦而味之更其訛闕其疑如是自佔畢逰仕途踰三十禩矣迨官廣東重加釐正爲十二卷緫名之曰半軒集鍥梓埀成鄉契許廷章寄來數十篇作補遺扵後兹委政歸復扵士友陳思耘朱野航處假有多者抄入吳山陳文顯故儒家也言其故祖允中嘗從先生扵書館抄的本因時有忌久藏不出近出示簿帙已殘毁比城中諸稿多異題四五十首遂欣録補完噫先生之學之才發之扵文者殆與造化相爲悠久奚待梓傳與否惟習自丱角知慕愛鄉先生先君之言猶在耳兹已老茍猶怠緩不扵斯文求就緒則是好之未至反如不好者也觀者幸矜念云𢎞治辛亥桂月望同郡後學張習謹識
