body:
  text: 半軒集卷十明王行撰詩題畫清霜入林山葉赤炯炯寒蟾照空碧千尺孤峰倚絳霄俯仰乾坤一秋色髙懷本與山水同間蹤得伴漁樵翁縱談不及塵世事笑指天外南飛鴻披圖景象看如此雙目頓令清似水欲憑粉墨寫蓬瀛更拂溪藤尋畫史題倪元鎮畫平生泉石共襟期身後園林失舊姿最是令人久相念詩中圖畫畫中詩東海倪君瓚字元鎮居南蘭陵之梁溪家故多資不樂進取以詩酒縱適山林泉石間每援筆自圖其所遊境象好事者多得之庸人俗流求終不與晚年家益索時往來吳城中隨處宿留一日雲間人有以財自雄者聞君名使使致綺縠縑布雜物直數百千館下君笑曰此人亦知有我耶將受之使因出楮箑三數握前曰主願得佳迹為玩君艴然曰是欲工藝我耳乃盡以所遺散與坐間寒客及陪臺賤夫不留毫髮謂使曰趨持扇去語而主我畫不可賄得也其自重如此此幅其盛年迹也法度修整氣韻清逸君逝矣見之令人增念因詩于上其不肯畫扇一事當時甚髙之不記久皆忘矣故書如此噫元鎮雖非大雅士亦豈易得哉鄭禧之松林才子圖橫空微霞淡初卷一片蒼雲隔層巘逺壑清風拂樹來煙鬛捎捎總如翦蹇驢隨意歷山岡此景此情應兩忘忽驚啼鳥翠微裏催我佳句投奚囊人生樂事知多少獨有吟情超世表為瀉詞源浥畫圖晴壁髙堂楚山曉寄綺川故人雲木翳長夏間齋有餘思緬彼湖上山日夕生妍姿佳約既已屢歡遊阻前期芳條含晚榮碧草餘舊滋終當遂良覿賦詠髙秋時寄題聚碧軒喜遂投間意開軒出竹林髙空蒼雪墮永夏緑雲深縹帙涵晴色湘簾駐晚陰須知子猷興千載一虛心題畫恭先髙尚道翁先生嗣子種學績文逈出流輩方以英妙之年隱迹林野人咸樂其栖遁豫則愛其能靜焉夫靜所以去躁也古人云險躁不能理性非靜無以成學是則恭先其理性者歟其成學者歟出畫需題因書于上時洪武丙午秋楮園識一曲清灣幾曲山白雲紅樹夕陽間髙秋賸有登臨興不憚攜琴日往還題許瀾伯先塋圖我二親歸藏久矣今見此圖乃知許氏之思不異豫之思也肺腑流出之言觀者勿校其工拙藏親已云竟思親那可忘寫親藏魄處朝夕似親傍題自作畫戊辰三月望過湯氏小林居時中留宿漉酒之餘適水墨在案因灑翰滿紙不覺淡雲濃樹隱映虛逺而青山穆然自不改色豫方歎靜者有常而動者無滯時中乃曰是足為畫也已明日裝潢成卷徴題為寫當時意趣如此髙館良宵睡思遲葛巾重著半醺時都將滿抱林泉興付與間忩墨半池題聽松卷長松知幾樹樹樹著清風飛雨夜初急怒濤秋更雄醉歸山月裏髙卧石樓中那復鈞天夢知音自不窮寄題逺山樓漾水迢迢逺空當樓歷歷遙峯髙捲湘簾獨坐煙中幾朵芙蓉煙楚蒼茫際曉霜空浩蕩凝秋何限江山逺意披襟獨倚層樓酬韓蒙庵巾箑之惠紓遲有愧情見乎辭永夏倦炎燠頽陽劇朝􅚐慨彼鬱鬱懷益此靡靡煩旋當嵗華晏凝隂霜霰繁果烈不可任乃復思晴暄寒暑互侵虐弱質詎長存故人念衰朽交情彌見敦輕箑貽夏涼重巾致冬溫溫涼適其宜安我旦與昏斯惠良匪薄胡能答瑶琨東風入林廬春事看已殷群彚紛自暢新泉生故源時物諒足娛髙居况邱園爰欣慰遲暮相從詠道言次韻沈學庵間居雜興三首學庵髙尚以所賦間居雜興三章見示不揆輒填其韻焉一章言其自得二章言其居處三章亦聊以道豫之情味也然才劣辭俚蓋有不勝其意者矣録以似之粲焉是寵庭户無塵雜軒楹淨掃除爐煙消晚坐簾日照晨梳清逸吟邊興騫騰醉裏書時看問竒者來覔子雲居樹影覺秋疏山光映晚除溪毛和雨薦石髮任風梳艾藥忩餘篆藝暉架有書呼兒具毫楮應欲賦間居間懷聊自適老態詎難除白髮從千丈清風每一梳衆峰陪獨詠孤枕伴群書况有能吟侣時來慰索居松雲二士圖晴靄翠紛紛春橋水乍分山家在何處松外萬重雲幽石暖差差苔華緑漸滋不辭同晚步溪上有新詩碧嶂猿聲後清宵鶴思前孤亭群樹底堪與坐談玄滿地寫松陰元芝擬共尋樵蹤渾不見知得此山深相識更相逢前山此路通桃煙連幕翠只在白雲中贈櫛生沈志道吳有隱君子姓沈氏翺翔士林而不肯用其學于仕年踰六十矣鍊墨以自食因號墨翁有子志道能讀書篤厚勤謹嘗曰吾力不足以務農吾巧不足以為工商固不為也則將何所于食耶乃修櫛髮之業焉以為理人之髮可以自治心之躁動理人之耳可以自治目之忤視以是而食所得多矣故其以櫛名特善于他以櫛名者是足以見墨翁之家教也今將治裝西遊其父攜來與豫别且求贈以詩云安眠海運朝黃宫髮如日出蒙霜松含風老梳起為櫛習習萬竅聰明通市門有客亦何者山花滿髻雙顴紅肩囊朝出暮復返彈鑷逺送孤飛鴻嗟兹兩事誰所記豫章太史眉山翁自非此藝有妙適孰肯置爾詩囊中况今子復異于衆雅有古意蟠心胸清隂緑樹畫簷靜湘簾拂拂生微風青雲撒地絲萬縷綰束不厭冠巾重豫年漸衰歎種種時亦藉子修儀容子今逺行事逰歷湖海賸有神仙蹤煙霞塵土偶相遇會須更逹純陽聰寄蔡漁村兩年江館得相親俄復荷衣染市塵幾度相思更相羡清風明月屬間人憶同江渚問梅花把酒吟詩興總佳此日塵埃城郭裏每看雲鳥落天涯題赤壁賦意圖羽扇風前故迹洞簫聲裏髙秋悵望美人何處江山應識重遊墨竹寒牖晚風聲細涼池夏日陰清隱隱碧雲鳴鳳仙人何處吹笙桂月㺯笛便面月色與天香相將浥露涼絃中有流水幽韻入清商題子昻書歸去來詞卷首畫淵明像次書歸去來詞而題曰大德四年秋九月吳興趙孟俯書後又畫幽篁拳石而復題云既書歸去來餘興未已乃作竹石淵明亦當愛此耶虛館坐清曉髙秋零露時佳菊秀可餐寒葩含晚滋芳馨發孤思寫此歸來詞餘興猶未已玄玉生瓊枝孰謂公子懷不與幽人期撫卷三歎息繄年非義熙題九華山圖為陳二守池陽古鄣郡江左聞佳聲峨峨九華山謫仙之所名其巔紫霄逈其下滄波澄千巖白雲起萬象清風生兹地既靈秀草木皆欣榮中有隱者居奕世傳芳馨潛德耀厥後應召趍宸京悠悠乘倅車來治姑蘇城政化爰已洽惠我東南氓公暇有登覽逺目增雙明新圖貌故山足慰瞻雲情君親本同事于焉著忠誠撫卷興我詠遙峯天際橫梅花卷漠漠素雲迷空山雪霽時齊開一萬樹都是向南枝清影照碧水寒香隨晚颸誰言林處士獨解為題詩休牧圖禾黍髙低壟畝寬一春勤苦一秋安泉甘草美涼隂卧不用家人接牡丹題生挽卷生死若晝夜始終理之常知者付自然昧者徒悲傷觀兹綴語言預計身後藏要令執紼人相挽歌其章自非曠逹士孰不諱死喪死喪何足云逝波日茫茫四運迭相代臘謝適春芳載歌生挽詩憂樂兩俱忘題畫八首濃翠幕晴嵐春山古寺間鳥啼花落處曽共扣禪關群嶂繞溪青晴來馬足輕不辭山路逺隨處聽啼鶯江檻俯清潯髙秋水氣深楸枰互相對機事亦何心春水逺浮天悠悠一釣船樵青且沽酒絲上鯉魚鮮晚岫含殘日寒波蕩逺空層欄人獨倚秋思渺無窮隱迹混樵蹤幽居碧澗東秋光勝春色紅樹白雲中極目楚天遙湖亭晚興饒平波千萬頃鷗影落青霄一水泛秋光千山共夕陽江鄉無限好都屬釣魚郎畫二首髙館疏簾晚乍開讀書聲裡故人來山中本自無塵土催得家童掃緑苔雨後飛泉下碧湍長松修竹草堂寒無人解識髙人意溪上青山獨自看題子庭竹石喬柯髙空飛飈激清商一夜黃落滿澗岡百蟲銷聲流水澀獨有古木凌寒霜層崖削鐵斧鑿在亂石磊磊秋雲荒蓁藂交榮灌莽盛緑青紫翠碧與蒼條枯幹壯忽盡掃依舊煙篠連風篁我嘗見之興歎息觀變乃能知厥常茲因遺楮聊示幻便與所見爭毫芒波翻墨池漫傾㵼雨入溪山同混茫豁然晴目快先覩槎牙蕭瑟撑髙堂逃禪石室到爾柏以墨寓戲成清狂書墻涴壁正如此癡戇醉顛安足當惟應老巨差或近吐氣矹硉終難方亦知造化不可量筆端賦形誰翕張蛟蚪虎兕鸞鳳凰攫身騰躍勢欲翔天機神妙露復藏我今作詩喚蒙莊空山樗櫟夀莫強與子共入無何鄉次韻張伯純見寄一從髙迹隱林坰城郭登臨不共行流水髙山誰得解暮雲春樹幾多情平湖逺漢空明裏落日群峰紫翠橫已喜芳鄰近得接好懷那惜向君傾讀書齋間齋寂無營忘我外馳意韋編在燕几芳席藹蘭氣薿薿庭草深沄沄澗水駛永坐絃我詩清風自南至雪後西灣訪友道中即事山中風雪下三日日出未消溪上寒行路不辭穿窈窕人家何處有琅玕初春草色緣沙見數樹梅花隔水看此景欲摹難潑墨擬將粉筆寫林巒髙房山寒江孤島圖千山萬山重復重煙嵐草樹深莫窮髙堂大袖示寬廣要以筆力誇竒雄青紅蒼翠滿縑素缺處殘碧分遙峯雖云眼底供一快未見濶逺開心胸歷觀畫史每如是意謂此法由來同昨嘗凌秋溯揚子一舸縹眇乘長風洪波舂天渺無際出沒但有孤輪紅中泠盤陀瞬息過回首浮玉雲濤中乃知山水有佳處到此始覺飛埃空當時海嶽應飽見落墨便自超凡庸不將層疊競工巧遂使氣象齊鴻濛平生愛畫惟愛此苦恨妙法無能攻九州之表有人物意匠倣佛宗南宫莫言未入米家奧百年猶數房山翁兹圖咫尺便千里生綃數幅徒為功亦知盤礴意有在正欲逐米追髙蹤愛之歌詠乃常理好事况有天隨宗同觀何人江海客氣似貫月書艎虹文辭瀾翻沛難禦奔走風雨驅豐隆古稱珠玉在我側濡翰自愧言非工黃塵城郭久見困何地間靜能相容詩成忽復三歎息矯首長望青冥鴻虎丘春霽圖群巘抱西郭一峯出平田孤秀凌太清旁絶絡與聯古迹遍林谷干將閟重泉劃開千尺崖下見清泠淵翠壁絢霞彩葩詞詠千賢于時屬青春霽色明髙天鳴鳥亦已和衆卉紛自妍夙駕爰此逰襟懷遂悠然豈曰事賞心觀俗古所傳來牟蔽丘壠饁耕滿疇阡樂土有若兹勤政復勉旃願同擊壤氓熙熙度餘年題趙元臨髙房山鍾觀圖北苑貌山水見墨不見筆繼者惟巨然筆從墨間出南宫實逰戲父子並超軼豈曰董是師賡歌偶同律髙侯生古燕下筆蛻凡骨舂容米家氣犖確老僧質沄沄水墨中探破造化窟嘗圖得鍾觀景象照雲日長松更飛泉霞彩互飄歘今朝見兹畫臨寫意無失慘淡入窈𡨕稜層隔岑蔚乃知趙雲子後欲復竒逸髙堂時一舒六月氣蕭瑟平生丘壑性塵土欣已拂因之興我懷山中斸苓术為王立方題雪峰孤眺圖層空飛雪夜漫漫獨倚危闌向曉看縱使萬山同一色不妨孤嶂出髙寒東皋子出畫徴題而書其上如此凝陰沍寒萬彚不舒而愈見嵬峭比陽春一敷所以蔚然而深秀也惟此人知此道楮園寄陳惟允時否賢才隱年飢瘦稚啼倦遊同縮蝟起舞訝聞雞祕語推圖讖荒愁怯鼓鼙磨碑求著作先與草淮西中秋張來儀宅賞月隱君家住虹橋南美景良辰性所耽適當平分秋色夜賞月邀朋同盍簪座間文會總知已胸襟灑落無留含仰觀太虛雲霧卷星宿斂迹山藏嵐穹穹窿窿天上下萬里一色埀青藍須臾白蓮出東海凌髙直湧憑誰探漫流金波徹銀汞光輝如晝明相涵玉蟾吐彩耀孤鏡冰輪碾空脫兩驂只疑顧搗靈藥因依桂影長毿毿諸公樂玩豪興發浮觴覔句崇髙談爭竒衒巧各有味如啖蜜蠟回香甘謪仙問歌詞韻勝陽春寡和吾當慙却憐此月不易得一别一載理所諳商飈扇涼繁露泫啼螿繞階淒以韽後期未審果何境不如引滿直抵酣于焉就室相枕藉鄰雞喔喔將鳴三次韻楊孟載見寄懷刺歸來卧枕書白雲滿榻閉門初草玄未信揚雄病禮法從知阮籍疏短障夕陽悲蟋蟀方塘秋水老芙蕖南村口燥呼難得一任狂風捲弊廬次韻髙季迪見寄草載誰詢獨處情翛然江郭養餘清老顔照水同梅瘦短髮臨風鬬雪明寒鴈聯行輕落渚晚鴉結隊逺歸城匆匆歲暮相思切又辱沙塘折簡行贈均田民部何員外嘗觀夏禹貢揚州下下田歷商至周漢唐宋幾千年漸稱極膏腴庶盛鮮與肩邇來困戈鋋隴畛相棄捐雖云東南賦多瘠少厚全恭遇維新朝限均際幅員所以委明公疆理來旬宣口分與世業多寡無陂偏一以國制重一以民務便頃畝弗浮隱釐撮那盈朘置奠邦本固肇造熙皥天山河誓帶礪聖祚萬世延吾民歌帝力王道其平平送顧光逺赴廣東行省郎中嘉謨翊新命昭代人文熙選職從要津分司奠南維畨禺隔星紀雄藩控華夷方伯古諸侯贊畫郎署資所以藉異才弼亮符休期養士負材器撫民息瘡痍炎瘴千里清雨澤三春施故鄉别宿契去去當其時丈夫貴有為詎作兒女悲停杯贈馬策髙翔粲容儀何必守章句終年困蓬藜送侍書宋仲溫出任鳳翔同知善書聞宇內盛事起江東楷草嘉攸習鍾王信許宗千金堪立價百日豈論功徑捷橫空鶴盤旋戲海鴻入神繇獨悟馳譽忽遐通薦剡來原籍觀光詣法宫抽毫濡太液揮翰代天工御賞符前轍輿評邁古風杯沾銀鑿落佩曵玉玲瓏逺甸多民瘁深憂切帝衷一朝蒙峻擢萬里赴提封仁煦為邦易敷宣脫頴同専城昭聖化别駕佐時雍邊境戈鋋息郊原户口充寶雞鳴角角岐鳳叶雍雍拭目文華展流傳史册中送莫禮敬應聘之京頻年湖上讀書多束帛戔戔忽見過霄漢明良圖治理林泉英俊遍遮羅登朝簠簋材偏美調鼎鹽梅味較和只恐西風秋欲起四鰓回憶渺煙波聞徐幼文轉河南布政因寄憶昔交遊重鄉邑孔思周情總英特喜君文采尤出竒玉樹臨風擬標格倐承剡薦登天衢切任耳目官黃樞澄清式攬范滂轡獻替或引辛毗裾出巡南州動山嶽金吾將軍膽欲落澡明滯獄沛甘霖掃却炎氛淨邊廓紫薇花開分省春左轄步履凌星辰尋升諸侯古方伯一柱兀障中霄雲綬綰銀章造民福立勳定繼臯夔躅蹇豫林下渺相思翹首長空翥黃鵠滕用亨諸篆體歌維周大篆成史籕宣聖傳經製蝌蚪總因倉頡見鳥迹象形置書變來久李斯小篆類玉筯鍾鼎魚蟲分衆手碧霄鸞鳳漫回翔滄海蛟螭互蟠紐有如垂露楊桞葉或似委薤劍環首許慎程邈評已彰餘子紛紛亦何有有唐陽冰號髙古常榻鴻都嶧山譜新泉丹井尚幸存纓絡麒麟折叉股刻符摹印氣候形義理深關非小補南陽髯翁學古書雅與秦漢參錙銖古文竒字蕩胸臆豈若俗工訛魯魚自言初習勝國時玉雪左丞吾所師荻莖錐沙指畫腹草年勤苦求妍姿嗚呼方今世雍熙明良際遇千載期大書功德勒金石絶勝草草人間碑與韓公望衍斯道逰穹窿山次韻留題顯忠寺春來看山奚獨後佻狹少年豈不有雲山登眺本清事今朝始逢知已友共操小舸過西郊抵岸芒鞋競行走群峰雲擁怒猊攫髙松風撼長鯨吼謾攜仙子採樂筐願縮天人散花手磴危苔滑側身緣力疲仰嘆前無偶翠微深處聳招提殿宇虛明敞窗牖到時少憩借禪床老衲呼茶我需酒一尊未罄起吟哦任使流光換辰酉乘興去探法雨泉蜿蜒瀉出蒼崖口洄湍響激玉霄琳舞沫逆灑山椒杻諒兹幽勝天所畀恣意飽觀寧用趣况皆無辱又無榮故鄉佳景耽宜久詎因貶謫抱羈憂全勝當年栁州栁寓懷呈王太守觀把劍欲一舞援琴思一彈彈協太古心舞激壯士肝彈舞非衒技深愧相知難出處分已然中道敢不安但恐韶光邁清霜殞叢闌所以陋雞栖梳刷排鵷鸞雲霄一展舉九萬凌風翰昔似丹穴雛志薄金琅玕今同涸轍鮒鬐鬛摧泥蟠吐沫不自濡引領空長嘆至人傾天瓢何吝一滴慳毋令東海若慙絶西江瀾江館有懷王為善江館坐間夕客懷聊自寬思君不可道清夢若為安露氣寒花馥霜華晚葉丹蔥蔥好城郭延首向西看次俞有立客中九日君在江村我在家各巡籬落看黃花一庭間日遲遲景兩岸微茫淺淺沙不使好懷留世故偶因佳節感年華身輕隨處聊堪樂况有吟哦解歎嗟雪航大野饒積雪溪山同混茫軒窗時眺望虛邃若舟航曉霽浮玉色夜寒流月光山隂餘興在吟咏不能忘春江釣艇圖春日初長倦讀書夕陽流水蕩空虛扁舟聊復持竿去意在青山不在魚水雲居秋水春雲萬里空酒壺書卷一孤篷多情最是間鷗鷺留得詩人作釣翁贈地理師素業承家學有師江湖聲譽舊聞知風生客座談天處雲滿山衣相地時已向支干搜隱祕更于龍虎探幽竒何當示我青囊術為爾憑軒一賦詩冬景六言溪上人煙釣家雪餘鴻迹泥沙路入雙崖窈窕花開幾樹枇杷秋景小幅煙碧帶霜紅秋深處處同晚晴山更好詩在野航中題郭巨逢金卷為親忘子亦堪憐鋤底黃金豈偶然簡册本期敦薄俗晉人曾説鄧攸賢仕女障子讀罷文忩女史針日長庭院正春深遊蜂舞蝶間情思那解當時匪石心髙林雪竹㺯月吟風一萬竿翠雲繚亂拂青鸞嵗寒别有精神在宜憑闌干雪裏看先月樓二首水邊樓館絶纎埃髙捲湘簾碧嶂開一點飛蟾破秋色清光先入座間來結樓臨水上風景問如何明月夜先到清光秋更多髙簷埀碧漢低檻俯金波想得憑空闊長吟復浩歌倪雲林竹樹幽篠弄寒姿喬柯霜後時吟忩有殘墨畫得醉中詩吳仲圭墨竹煙葉正青青軒忩曉思清開簾看春雨江上有歌聲杏田畫月下相逢縞袂寒松枝清露濕煙鬟祇因翠羽能歌舞留得春風滿醉顔寄唐伯慎未見即云别别懷安可忘平生雙醉眼四海一詩囊喬木蒼雲合髙樓白日長屏山逺相望煙水正微茫宜晚軒青山無古今松柏有歲年不為時所易詎將春共妍兹軒號宜晚庭除帶林泉勝地愜髙爽間門謝啾喧青紅復蒼翠山光雜溪煙懿彼軒中人閲世情淡然明霞暈晴頰微霜點秋顛開口無别語娓娓羲皇前膝上玉雪絃手中瑶華編豫每與談笑髙懷欲騰騫餘年釋塵纓休佚諒所便為我賦招隱毋云孤願言題畫水色映蒹葭遙山更晚霞扁舟載詩去秋思滿天涯重覔舊池臺孤村夕照開間情聊共寫攜得素琴來梅花折枝圖映水一枝開春從筆底來髙樓漫吹笛終不點蒼苔半軒集卷十
