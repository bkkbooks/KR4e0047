body:
  text: 半軒集卷十一明王行撰詞贈送朱彥祥沈隱侯守東陽建八詠樓其地又有雙溪之勝故曰明月雙溪水清風八詠樓朱公子彥祥家本吳喜逰歷時寓東陽一住餘十載今年六月還訪親舊秋復南轅約來春攜其德曜驥子歸復故宇臨岐無以寓情因尋林鐘商曲有名清風八詠樓者南宋詞林所製也調既適時譜又合東陽故事填一闋以餞云逺興引逰踪遍踏天涯芳草偏愛雙溪好有隱侯舊跡層樓雲表碧霞丹嶂看縹眇憑䦨吟嘯偶佳遇留搗𤣥霜歲星旋又周了歸期誰道無據幾回首興懷故林猿鳥今日相看暫得翠尊同倒南翔仍訴幽抱擬待春空杳與鵷雛鴻侣共還池島和季琳端陽值雨水調歌頭葵陽閟晴彩榴火濕朱光不知今日何日烟靄漲蒲塘已過清明時節未近重陽氣候對景自斟量應是家家雨梅子要催黃向朝來尋舊事問江鄉共言當此佳序那肯負年華雖阻繡茵鬬草不廢翠蕤剪艾更結綵絲長昌歜縷香玉情味付霞觴寫意秋水晴霞客裏光隂那更是厭厭春雨有如許霑帷濕幔灑窗飄户十日曉寒添故絮一天暮色淒平楚待新晴何處倚吟肩東樓柱芳草際烟橫渚修竹外花連塢便重整酒壺茶具詩豪琴譜狂似次公從更醉豪如謝掾休誇舞有情懷只好共漁樵為賔主寫懷水龍吟塵路風花暖空晴絮遊絲賸有縈牽處客懷幸自不禁愁啼鵑又恁催歸去細草春沙埀楊古渡忘機可得如鷗鷺平湖却也慰人心片帆不礙烟中樹顧氏隱居一江春水黃花翠竹臨溪處正是幽人住不嫌拄杖破蒼苔便道有時烟雨也須來隔簾塵土紛紛起久厭襄陽市若能招我作西鄰從此一溪流水兩家分鄒氏隱居一江春水白雲紅樹秋山下一片江南畫門前流水帶晴沙更是繞籬寒菊正開花如何眼砥逢佳處偏許幽人住也須來此置茅茨莫待有人相寄草堂資春霽沁園春昨夜園林才聽雨鈎簾滿眼晴色濃靄旋消淡風微揚軟絮柔絲輕織乍翻暖翼傍簷新燕低無力遍徙倚池上畫䦨雲影亂澄碧謾道逝水飛塵相將九十詔光誰解分得况千金清宵一刻花香月色兩相宜客裏倦懷時自適幾許吟嘯才情更付遊人醉邊芳草舊時南陌惜春如夢令一日尋芳一度一樹繁花一步回首又何時流水亂紅無數春暮春暮幽草緑隂庭户春館書事江月令向暖漸生慵思尋春似减情忺酒懷詩興揔懨懨只有看山不厭薄晚正須憑檻新晴鎮自鈎簾幾多濃翠曉來添話與白雲休占答平逺翁送金桃浣溪沙一夜東風落絳葩幾番醲露染丹砂熟來風吹似仙家滴處芳香沾玉笋破時顔色勝金芽小兒三採不須誇聯芳詞青陽肇令淑氣載新萬卉未芳梅先應候繼梅而艷惟杏能之梅杏聯芳春物滋麗韶華九十二卉開端杏雖晚生見梅之清深知加敬故度夷則商一曲以美之曲曰品字令梅亦愛杏之麗因答以夾鐘商之曲曰迎春樂春見二卉交歡不能自默亦度林鐘羽一曲以嘉賞焉曲曰解語花夫梅杏皆色以事春者乃能不妬忌而相敬愛贊美如此可謂賢矣既賢之其詞不可不録故録之録之者緱嶺仙人之裔不知其名人稱之楮園叟云飛瓊環珮在縹眇香雲影裡氷絲瑩蹙霞綃帔瑶階玉砌雪月看初霽不奈妖妍相嫵媚任天然風致綽約仙姿真絶世衆芳無地先得春風意右品字令裁霞剪雪芳枝艷正微醉潮丹臉露華濃洗淨殘烟染更不用間粧㸃碎錦穠香空復念臨曉鏡碧波微灧無那似嬌嬈算只有春能占右迎春樂寒消雪㸃暖㺯烟絲又去年時候蕙芽初透輕澌盡蹙蹙翠波風皺淺黃暈栁微隱映瓊芳孤秀最愛他纎指輕輕折暗香盈袖艷質固應低首却休慙穠麗不似清瘦也還知否可人處飛燕玉環都有羅浮夢後更莫問前村沽酒但好教膩白嬌紅鎮年年如舊右解花語雪景便面如夢令滿眼落花飛絮回首瓊林玉樹驢背是何人得了灞橋詩句歸去歸去春在醉鄉深處訪王光福之常烟水居青山相送迎烟蒼蒼水茫茫間訪幽人烟水鄉扁舟孤興長蒲含霜柳含霜蒲栁蕭蕭青又黃水雲鷗鷺藏半軒集卷十一
