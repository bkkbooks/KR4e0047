body:
  text: 半軒集目錄别集類五明巻一賦箴頌辭辯喻擬贊巻二銘論䇿題書文引雜著巻三記卷四記巻五序巻六序巻七說巻八題跋巻九墓誌銘巻十詩巻十一詞巻十二方外雜體文補遺方外文補遺臣等謹案半軒集十二巻明王行撰行字止仲長洲人少授徒於城北齊門洪武初有司延為學校師後館涼國公藍玉家玉薦之太祖得召見玉誅行亦坐死同時以黨禍誅者惟行與孫蕡最有文名然蕡特為玉偶題一畫無所攀援於其間其詩今在蕡集中亦别無假借溢分之語而行則性喜談兵當元末兩浙兵起時甞黙坐籌其勝負與所親言之恒百不失一二益以自負及藍玉延之課其子遂數以兵法說玉頗與密議又與道衍深相投契甞告以盍有所待不當以其法老盖負其桀黠之才有不肯槁死牖下者故其所作往往踔厲風發縱横排奡極其意之所馳騁而不能悉歸之醇正頗肖其為人詩格亦清剛蕭爽在北郭十子之中與髙啟稱為勁敵就文論文不能不推一代竒才也乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8a5f29904510be0993a01b4e8c8de1ed547ef52b4bd997aad643ee55a1b4b279
