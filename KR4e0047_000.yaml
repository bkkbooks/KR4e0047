body:
  text: 半軒集目録别集類五明卷一賦針頌辭辨喻擬贊卷二銘論䇿題書文引雜著卷三記卷四記卷五序卷六序卷七說卷八題跋卷九墓志銘卷十詩卷十一詞卷十二方外雜體文補遺方外文補遺臣等謹案半軒集十二卷明王行撰行字止仲長洲人少授徒於城北齊門洪武初有司延為學校師後館涼國公藍玉家玉薦之太祖得召見玉誅行亦坐死同時以黨禍誅者惟行與孫蕡最有文名然蕡特為玉偶題一畫無所攀援於其間其詩今在蕡集中亦别無假借溢分之語而行則性喜談兵當元末兩浙兵起時嘗默坐籌其勝負與所親言之恆百不失一二益以自負及藍玉延之課其子遂數以兵法說玉頗與密議又與道衍深相投契嘗告以盍有所待不當以其法老蓋負其桀黠之才有不肯槁死牖下者故其所作往往踔厲風發縱橫排奡極其意之所馳騁而不能悉歸之醇正頗肖其為人詩格亦清剛蕭爽在北郭十子之中與髙啓稱為徑敵就文論文不能不推一代竒才也乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c114c34172aa76c65b291960f728b8536f32b0c99175e2aefa28dc5a7c80ff53
